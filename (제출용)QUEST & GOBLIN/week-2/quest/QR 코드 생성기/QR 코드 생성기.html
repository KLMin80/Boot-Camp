<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- QR 코드 생성 라이브러리: qrcode-generator (안정적, canvas 렌더링 지원) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    /* QR 캔버스를 선명하게 (안티앨리어싱 비활성화) */
    .qr-canvas { image-rendering: pixelated; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // --- Button ---
    function Button({ variant = "primary", size = "md", disabled = false, onClick, className = "", children, ...props }) {
      const base = "inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]";
      const variants = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-sm",
        secondary: "bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus:ring-slate-400",
        ghost: "bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-300",
        danger: "bg-rose-600 text-white hover:bg-rose-700 focus:ring-rose-500 shadow-sm",
      };
      const sizes = {
        sm: "text-sm px-3 py-1.5",
        md: "text-sm px-4 py-2.5",
        lg: "text-base px-6 py-3",
      };
      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    // --- Card ---
    function Card({ className = "", children }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200/70 ${className}`}>
          {children}
        </div>
      );
    }

    // --- Textarea ---
    function Textarea({ label, value, onChange, placeholder, rows = 4, maxLength, className = "" }) {
      return (
        <div className={className}>
          {label && (
            <label className="block text-sm font-semibold text-slate-700 mb-2">{label}</label>
          )}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            maxLength={maxLength}
            className="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-800 placeholder-slate-400 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          {maxLength && (
            <div className="mt-1 text-right text-xs text-slate-400">
              {value.length} / {maxLength}
            </div>
          )}
        </div>
      );
    }

    // --- ColorField ---
    function ColorField({ label, value, onChange }) {
      return (
        <div className="flex items-center justify-between gap-3 rounded-xl border border-slate-200 px-3 py-2.5">
          <span className="text-sm font-medium text-slate-700">{label}</span>
          <div className="flex items-center gap-2">
            <span className="text-xs font-mono text-slate-400 uppercase">{value}</span>
            <div className="relative w-8 h-8 rounded-lg overflow-hidden border border-slate-300 shadow-inner">
              <input
                type="color"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                className="absolute -inset-2 w-[calc(100%+1rem)] h-[calc(100%+1rem)] cursor-pointer"
                aria-label={label}
              />
            </div>
          </div>
        </div>
      );
    }

    // --- Slider ---
    function Slider({ label, value, min, max, step = 1, unit = "", onChange }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-medium text-slate-700">{label}</span>
            <span className="text-sm font-semibold text-indigo-600">{value}{unit}</span>
          </div>
          <input
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={(e) => onChange(Number(e.target.value))}
            className="w-full h-2 rounded-lg appearance-none cursor-pointer bg-slate-200 accent-indigo-600"
            aria-label={label}
          />
        </div>
      );
    }

    // --- SelectGroup (세그먼트 버튼) ---
    function SelectGroup({ label, options, value, onChange }) {
      return (
        <div>
          <span className="block text-sm font-medium text-slate-700 mb-2">{label}</span>
          <div className="grid grid-cols-4 gap-1 p-1 bg-slate-100 rounded-xl">
            {options.map((opt) => (
              <button
                key={opt.value}
                type="button"
                onClick={() => onChange(opt.value)}
                className={`text-sm font-semibold py-1.5 rounded-lg transition ${
                  value === opt.value
                    ? "bg-white text-indigo-600 shadow-sm"
                    : "text-slate-500 hover:text-slate-700"
                }`}
              >
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // --- Toggle (스위치) ---
    function Toggle({ label, description, checked, onChange }) {
      return (
        <div className="flex items-center justify-between gap-3 rounded-xl border border-slate-200 px-3 py-2.5">
          <div>
            <span className="block text-sm font-medium text-slate-700">{label}</span>
            {description && (
              <span className="block text-xs text-slate-400 mt-0.5">{description}</span>
            )}
          </div>
          <button
            type="button"
            role="switch"
            aria-checked={checked}
            aria-label={label}
            onClick={() => onChange(!checked)}
            className={`relative inline-flex h-6 w-11 flex-shrink-0 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 ${
              checked ? "bg-indigo-600" : "bg-slate-300"
            }`}
          >
            <span
              className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform ${
                checked ? "translate-x-6" : "translate-x-1"
              }`}
            />
          </button>
        </div>
      );
    }

    // --- EmptyState ---
    function EmptyState() {
      return (
        <div className="flex flex-col items-center justify-center text-center py-12 px-6">
          <div className="w-20 h-20 rounded-2xl bg-slate-100 flex items-center justify-center mb-4">
            <svg className="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
              <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z" />
              <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75h-.75v-.75zM13.5 13.5h.75v.75h-.75v-.75zM13.5 19.5h.75v.75h-.75v-.75zM19.5 13.5h.75v.75h-.75v-.75zM19.5 19.5h.75v.75h-.75v-.75zM16.5 16.5h.75v.75h-.75v-.75z" />
            </svg>
          </div>
          <h3 className="text-base font-semibold text-slate-700">QR 코드가 여기에 표시됩니다</h3>
          <p className="mt-1 text-sm text-slate-400 max-w-xs">
            왼쪽에 텍스트나 URL을 입력하면 실시간으로 QR 코드가 생성됩니다.
          </p>
        </div>
      );
    }

    // ========================================
    // 🏷️ 로고 렌더링 유틸 (KL Company 스포티 배지)
    // ========================================
    // 외부 이미지 없이 canvas에 직접 그린다.
    // - 둥근 사각형 배지 + 흰색(배경색) 패딩 → 뒤 QR 모듈을 가려 인식 방해 최소화
    // - "KL"을 헤비 이탤릭 산세리프로 크게, "COMPANY"를 작게
    // - 빗금 스피드라인 + 강조 악센트 컬러로 스포티한 느낌
    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    // 중앙 logoBox(정사각형 영역) 안에 스포티 로고를 그린다.
    function drawKLLogo(ctx, cx, cy, boxSize, opts) {
      const {
        padColor = "#ffffff",      // 로고 뒤 패딩(배경) 색
        badgeColor = "#1e293b",    // 배지 본체 색
        accentColor = "#6366f1",   // 강조(악센트) 색
        textColor = "#ffffff",     // 텍스트 색
      } = opts || {};

      const half = boxSize / 2;
      ctx.save();

      // 1) 흰색(배경색) 라운드 패딩 — QR 모듈을 가려 로고를 깔끔하게 분리
      const padPad = boxSize * 0.06;
      roundRect(ctx, cx - half - padPad, cy - half - padPad,
                boxSize + padPad * 2, boxSize + padPad * 2, boxSize * 0.26);
      ctx.fillStyle = padColor;
      ctx.fill();

      // 2) 배지 본체(둥근 사각형)
      const bx = cx - half, by = cy - half;
      roundRect(ctx, bx, by, boxSize, boxSize, boxSize * 0.22);
      ctx.fillStyle = badgeColor;
      ctx.fill();

      // 3) 스피드라인(빗금) — 배지 안쪽에서만 보이도록 클립
      ctx.save();
      roundRect(ctx, bx, by, boxSize, boxSize, boxSize * 0.22);
      ctx.clip();
      ctx.strokeStyle = accentColor;
      ctx.globalAlpha = 0.9;
      const lineW = boxSize * 0.06;
      ctx.lineWidth = lineW;
      ctx.lineCap = "round";
      // 우상단 코너에 대각선 스피드라인 3줄
      for (let i = 0; i < 3; i++) {
        const off = boxSize * (0.18 + i * 0.16);
        ctx.beginPath();
        ctx.moveTo(bx + boxSize - off, by);
        ctx.lineTo(bx + boxSize, by + off);
        ctx.stroke();
      }
      ctx.restore();

      // 4) 악센트 하단 바 (스포티 포인트)
      const barH = boxSize * 0.10;
      ctx.save();
      roundRect(ctx, bx, by, boxSize, boxSize, boxSize * 0.22);
      ctx.clip();
      ctx.fillStyle = accentColor;
      ctx.fillRect(bx, by + boxSize - barH, boxSize, barH);
      ctx.restore();

      // 5) "KL" — 헤비 이탤릭, 크게
      ctx.fillStyle = textColor;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const klSize = boxSize * 0.46;
      ctx.font = `italic 900 ${klSize}px "Arial Black", Arial, Helvetica, sans-serif`;
      ctx.fillText("KL", cx, cy - boxSize * 0.06);

      // 6) "COMPANY" — 작게, 자간 강조 느낌
      const coSize = boxSize * 0.12;
      ctx.font = `italic 700 ${coSize}px Arial, Helvetica, sans-serif`;
      ctx.fillStyle = accentColor;
      ctx.fillText("C O M P A N Y", cx, cy + boxSize * 0.24);

      ctx.restore();
    }

    // ========================================
    // 🧩 QR 코드 표시 컴포넌트
    // ========================================
    // qrcode-generator 라이브러리로 모듈 데이터를 계산한 뒤 직접 canvas에 그린다.
    // (라이브러리 내장 createImgTag 대신 canvas를 쓰면 PNG 다운로드/색상 제어가 쉬움)
    function QRCanvas({ text, size, fgColor, bgColor, errorLevel, margin, showLogo, logoAccent, canvasRef }) {
      useEffect(() => {
        if (!text) return;
        const canvas = canvasRef.current;
        if (!canvas) return;

        // qrcode-generator: qrcode(typeNumber=0(자동), errorCorrectionLevel)
        const qr = qrcode(0, errorLevel);
        qr.addData(text);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const totalModules = moduleCount + margin * 2; // 여백(quiet zone) 포함
        // 선명한 출력을 위해 정수 픽셀 크기 계산
        const cellSize = Math.max(1, Math.floor(size / totalModules));
        const actualSize = cellSize * totalModules;

        canvas.width = actualSize;
        canvas.height = actualSize;

        const ctx = canvas.getContext("2d");
        // 배경
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, actualSize, actualSize);
        // 모듈(전경)
        ctx.fillStyle = fgColor;
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(
                (col + margin) * cellSize,
                (row + margin) * cellSize,
                cellSize,
                cellSize
              );
            }
          }
        }

        // --- 중앙 로고 ---
        // 로고는 코드 영역(여백 제외) 한 변의 약 18%로 작게 유지 → 인식률 보호
        if (showLogo) {
          const codePx = moduleCount * cellSize;       // 여백 제외한 QR 코드 영역
          const logoBox = Math.round(codePx * 0.18);   // 한 변 기준 18%
          const cx = actualSize / 2;
          const cy = actualSize / 2;
          drawKLLogo(ctx, cx, cy, logoBox, {
            padColor: bgColor,
            badgeColor: fgColor,
            accentColor: logoAccent,
            // 전경색이 매우 밝으면 텍스트가 안 보이므로 배경색을 텍스트로 사용
            textColor: bgColor,
          });
        }
      }, [text, size, fgColor, bgColor, errorLevel, margin, showLogo, logoAccent, canvasRef]);

      return (
        <canvas
          ref={canvasRef}
          className="qr-canvas rounded-lg shadow-md max-w-full h-auto"
          style={{ width: size, maxWidth: "100%" }}
          aria-label="생성된 QR 코드"
        />
      );
    }

    // ========================================
    // 📄 Page Component
    // ========================================
    function QRGeneratorPage() {
      const [text, setText] = useState("https://www.naver.com");
      const [size, setSize] = useState(320);
      const [fgColor, setFgColor] = useState("#1e293b");
      const [bgColor, setBgColor] = useState("#ffffff");
      const [errorLevel, setErrorLevel] = useState("H");
      const [margin, setMargin] = useState(4);
      const [showLogo, setShowLogo] = useState(true);
      const [logoAccent, setLogoAccent] = useState("#6366f1");
      const [copied, setCopied] = useState(false);

      const canvasRef = useRef(null);
      const trimmed = text.trim();
      const hasContent = trimmed.length > 0;

      // 로고가 켜져 있으면 인식 안정성을 위해 오류 복원 수준을 H로 강제한다.
      const effectiveErrorLevel = showLogo ? "H" : errorLevel;

      // 로고를 켤 때 자동으로 H로 올린다(이미 H면 유지).
      useEffect(() => {
        if (showLogo && errorLevel !== "H") {
          setErrorLevel("H");
        }
      }, [showLogo]);

      const errorLevelOptions = [
        { label: "L", value: "L" },
        { label: "M", value: "M" },
        { label: "Q", value: "Q" },
        { label: "H", value: "H" },
      ];

      // --- PNG 다운로드 ---
      const handleDownload = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const url = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.download = `qrcode-${Date.now()}.png`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }, []);

      // --- 클립보드 복사 (이미지) ---
      const handleCopy = useCallback(async () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        try {
          await new Promise((resolve, reject) => {
            canvas.toBlob(async (blob) => {
              try {
                await navigator.clipboard.write([
                  new ClipboardItem({ "image/png": blob }),
                ]);
                resolve();
              } catch (e) {
                reject(e);
              }
            }, "image/png");
          });
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        } catch (e) {
          alert("이 브라우저에서는 이미지 복사를 지원하지 않습니다. 다운로드를 이용해주세요.");
        }
      }, []);

      const handleReset = () => {
        setSize(320);
        setFgColor("#1e293b");
        setBgColor("#ffffff");
        setMargin(4);
        setShowLogo(true);
        setLogoAccent("#6366f1");
        setErrorLevel("H");
      };

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-10">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-sm">
                <svg className="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm0 3h3v2h-3v-2zm-5 0h3v3h-2v-1h-1v-2zm0 4h2v2h-2v-2zm3 0h5v2h-5v-2z"/>
                </svg>
              </div>
              <div>
                <h1 className="text-lg font-bold text-slate-900 leading-tight">QR 코드 생성기</h1>
                <p className="text-xs text-slate-500">텍스트·URL을 실시간 QR 코드로 변환하세요</p>
              </div>
            </div>
          </header>

          {/* Main */}
          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
            <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
              {/* 입력 / 옵션 패널 */}
              <div className="lg:col-span-3 space-y-6">
                <Card className="p-5 sm:p-6">
                  <Textarea
                    label="텍스트 또는 URL"
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    placeholder="여기에 텍스트나 URL을 입력하세요 (예: https://example.com)"
                    rows={4}
                    maxLength={1000}
                  />
                </Card>

                <Card className="p-5 sm:p-6 space-y-5">
                  <h2 className="text-sm font-bold text-slate-900 flex items-center gap-2">
                    <svg className="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.397.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z" />
                      <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    옵션
                  </h2>

                  <Slider label="크기" value={size} min={120} max={640} step={20} unit="px" onChange={setSize} />

                  <Slider label="여백 (Quiet Zone)" value={margin} min={0} max={10} step={1} unit="칸" onChange={setMargin} />

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <ColorField label="전경색" value={fgColor} onChange={setFgColor} />
                    <ColorField label="배경색" value={bgColor} onChange={setBgColor} />
                  </div>

                  {/* 중앙 로고 옵션 */}
                  <div className="space-y-3">
                    <Toggle
                      label="중앙 로고 (KL Company)"
                      description="QR 중앙에 스포티한 로고 배지를 표시합니다."
                      checked={showLogo}
                      onChange={setShowLogo}
                    />
                    {showLogo && (
                      <ColorField label="로고 강조 색상" value={logoAccent} onChange={setLogoAccent} />
                    )}
                  </div>

                  <div>
                    <SelectGroup
                      label="오류 복원 수준"
                      options={errorLevelOptions}
                      value={effectiveErrorLevel}
                      onChange={(v) => { if (!showLogo) setErrorLevel(v); }}
                    />
                    {showLogo ? (
                      <p className="text-xs text-amber-600 mt-2 flex items-start gap-1.5">
                        <svg className="w-4 h-4 flex-shrink-0 mt-px" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                        </svg>
                        로고 사용 중에는 인식 안정성을 위해 H(30%)로 자동 고정됩니다.
                      </p>
                    ) : (
                      <p className="text-xs text-slate-400 mt-2">
                        L(7%) · M(15%) · Q(25%) · H(30%) — 높을수록 손상에 강하지만 더 조밀해집니다.
                      </p>
                    )}
                  </div>

                  <div className="pt-1">
                    <Button variant="ghost" size="sm" onClick={handleReset}>
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                      </svg>
                      옵션 초기화
                    </Button>
                  </div>
                </Card>
              </div>

              {/* 미리보기 패널 */}
              <div className="lg:col-span-2">
                <div className="lg:sticky lg:top-24">
                  <Card className="p-5 sm:p-6">
                    <h2 className="text-sm font-bold text-slate-900 mb-4">미리보기</h2>

                    {hasContent ? (
                      <div className="animate-fade-in flex flex-col items-center">
                        <div
                          className="flex items-center justify-center p-4 rounded-xl border border-slate-100"
                          style={{ backgroundColor: bgColor }}
                        >
                          <QRCanvas
                            text={trimmed}
                            size={size}
                            fgColor={fgColor}
                            bgColor={bgColor}
                            errorLevel={effectiveErrorLevel}
                            margin={margin}
                            showLogo={showLogo}
                            logoAccent={logoAccent}
                            canvasRef={canvasRef}
                          />
                        </div>

                        <div className="mt-5 w-full space-y-2">
                          <Button variant="primary" size="lg" onClick={handleDownload} className="w-full">
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                            </svg>
                            PNG 다운로드
                          </Button>
                          <Button variant="secondary" size="md" onClick={handleCopy} className="w-full">
                            {copied ? (
                              <>
                                <svg className="w-4 h-4 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                                </svg>
                                복사됨!
                              </>
                            ) : (
                              <>
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                  <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
                                </svg>
                                이미지 복사
                              </>
                            )}
                          </Button>
                        </div>

                        <p className="mt-4 text-xs text-slate-400 text-center break-all max-w-full px-2">
                          {trimmed.length > 60 ? trimmed.slice(0, 60) + "…" : trimmed}
                        </p>
                      </div>
                    ) : (
                      <EmptyState />
                    )}
                  </Card>
                </div>
              </div>
            </div>

            <footer className="mt-10 text-center text-xs text-slate-400">
              실시간 QR 코드 생성기 · qrcode-generator + React + Tailwind CSS
            </footer>
          </main>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <QRGeneratorPage />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
