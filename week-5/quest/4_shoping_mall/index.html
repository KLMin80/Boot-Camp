<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMME — 남성의류 셀렉트샵</title>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨져 화면이 백지가 된다.
       Babel 은 반드시 7.x 로 고정. React/ReactDOM/Tailwind 도 정확히 핀. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* Tailwind 로 처리 불가능한 부분만 최소한으로 */
    html { scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; }

    /* 토스트 슬라이드 인 애니메이션 */
    @keyframes shop-toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .shop-toast-in { animation: shop-toast-in 0.22s ease-out; }

    /* 모달 페이드 인 */
    @keyframes shop-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .shop-fade-in { animation: shop-fade-in 0.18s ease-out; }

    /* number input 스피너 제거 (수량 직접입력은 안 쓰지만 안전망) */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* 스켈레톤 펄스 */
    @keyframes shop-pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    .shop-pulse { animation: shop-pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body class="bg-neutral-50 text-neutral-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 구조분해
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef, useContext, createContext } = React;

    // ========================================
    // 상수 / API 계약 (백엔드 server.js 와의 계약)
    // ========================================
    // ✅ 상대경로. localhost 하드코딩 금지. 엔드포인트 문자열에는 /api 를 중복으로 붙이지 않는다.
    const API_BASE_URL = '/api';

    // 토큰/유저는 localStorage 의 고정 키에 저장한다 (백엔드 계약).
    const STORAGE_KEYS = { token: 'shop.jwt', user: 'shop.user' };

    const BRAND = 'HOMME';
    const ORDER_MESSAGE = '🛒 주문 기능은 준비 중입니다!';

    // ========================================
    // API 레이어 — apiFetch / ApiError
    // - id 는 BIGSERIAL 이라 JSON 에서 문자열일 수 있음 → 비교는 항상 String() 으로.
    // - 어떤 응답이든 401 이면 토큰 비우고 로그아웃 처리 후 로그인 화면으로.
    // ========================================
    class ApiError extends Error {
      constructor(message, status, payload) {
        super(message);
        this.name = 'ApiError';
        this.status = status;
        this.payload = payload;
      }
    }

    // AuthContext 가 로그아웃 핸들러를 등록 → apiFetch 가 401 시 호출.
    // (모듈 스코프 변수로 두어 컴포넌트 트리 밖에서도 접근 가능하게 한다.)
    let onUnauthorized = null;
    const registerUnauthorizedHandler = (fn) => { onUnauthorized = fn; };

    /**
     * 공통 fetch 래퍼.
     * - JSON 바디 자동 직렬화, Authorization 헤더 자동 부착(토큰 있을 때).
     * - 401 이면 공통 핸들러(onUnauthorized) 호출 후 ApiError throw.
     * - 응답 바디가 비어있거나 JSON 이 아니어도 안전하게 처리.
     */
    async function apiFetch(endpoint, options = {}) {
      const token = localStorage.getItem(STORAGE_KEYS.token);
      const headers = { ...(options.headers || {}) };
      let body = options.body;

      if (body && typeof body === 'object' && !(body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        body = JSON.stringify(body);
      }
      if (token) headers['Authorization'] = `Bearer ${token}`;

      let res;
      try {
        res = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers, body });
      } catch (networkErr) {
        // 네트워크 자체 실패 (서버 다운 / CORS / 오프라인)
        throw new ApiError('서버에 연결할 수 없어요. 네트워크 또는 백엔드 상태를 확인해 주세요.', 0, null);
      }

      // 응답 바디 파싱 (실패해도 무시)
      let payload = null;
      const text = await res.text();
      if (text) {
        try { payload = JSON.parse(text); } catch (_) { payload = text; }
      }

      if (res.status === 401) {
        if (typeof onUnauthorized === 'function') onUnauthorized();
        throw new ApiError('세션이 만료되었어요. 다시 로그인해 주세요.', 401, payload);
      }

      if (!res.ok) {
        const msg = (payload && typeof payload === 'object' && (payload.message || payload.error))
          ? (payload.message || payload.error)
          : `요청에 실패했어요. (HTTP ${res.status})`;
        throw new ApiError(msg, res.status, payload);
      }

      return payload;
    }

    // 가격 포맷 (정수 원 → "12,000원")
    const formatKRW = (n) => `${Number(n || 0).toLocaleString('ko-KR')}원`;

    // ========================================
    // 🎨 디자인 시스템 — 순수 프리젠테이셔널 (비즈니스 로직 없음)
    // 미니멀 모노톤(블랙/화이트/그레이) 무드. variant→클래스는 항상 완전한 문자열로 정적 매핑.
    // (Tailwind CDN JIT 는 런타임 조립 클래스를 인식 못 하므로 정적 매핑 필수.)
    // ========================================

    // ---- Button ----
    const BTN_BASE =
      'inline-flex items-center justify-center font-medium rounded-none tracking-tight ' +
      'transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 ' +
      'focus:ring-neutral-900 disabled:opacity-40 disabled:cursor-not-allowed select-none whitespace-nowrap';

    const BTN_VARIANT = {
      primary:   'bg-neutral-900 text-white hover:bg-neutral-700 active:bg-neutral-800',
      secondary: 'bg-white text-neutral-900 border border-neutral-900 hover:bg-neutral-900 hover:text-white',
      ghost:     'bg-transparent text-neutral-700 hover:bg-neutral-100 active:bg-neutral-200',
      danger:    'bg-white text-red-600 border border-red-300 hover:bg-red-600 hover:text-white hover:border-red-600',
    };

    const BTN_SIZE = {
      sm: 'text-xs px-3 py-1.5 gap-1',
      md: 'text-sm px-5 py-2.5 gap-1.5',
      lg: 'text-base px-7 py-3.5 gap-2',
    };

    function Button({
      variant = 'primary', size = 'md', type = 'button', disabled = false,
      loading = false, onClick, className = '', children, ...rest
    }) {
      const cls = [
        BTN_BASE,
        BTN_VARIANT[variant] || BTN_VARIANT.primary,
        BTN_SIZE[size] || BTN_SIZE.md,
        className,
      ].join(' ');
      return (
        <button type={type} disabled={disabled || loading} onClick={onClick} className={cls} {...rest}>
          {loading && (
            <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
            </svg>
          )}
          {children}
        </button>
      );
    }

    // ---- Input ---- (forwardRef 로 내부 엘리먼트에 ref 전달 → 자동 포커스 가능)
    const Input = React.forwardRef(function Input(
      { label, type = 'text', value, onChange, placeholder, error, disabled,
        id, autoComplete, required, className = '', ...rest }, ref
    ) {
      const inputId = id || `inp-${Math.random().toString(36).slice(2, 9)}`;
      const base =
        'w-full px-3.5 py-2.5 text-sm bg-white border rounded-none ' +
        'transition-colors focus:outline-none focus:ring-2 focus:ring-offset-0 ' +
        'placeholder:text-neutral-400 disabled:bg-neutral-100 disabled:cursor-not-allowed';
      const stateCls = error
        ? 'border-red-400 focus:border-red-500 focus:ring-red-200'
        : 'border-neutral-300 focus:border-neutral-900 focus:ring-neutral-200';
      return (
        <div className={className}>
          {label && (
            <label htmlFor={inputId} className="block text-xs font-medium text-neutral-600 mb-1.5 tracking-wide">
              {label}{required && <span className="text-red-500 ml-0.5">*</span>}
            </label>
          )}
          <input
            ref={ref}
            id={inputId}
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            autoComplete={autoComplete}
            aria-invalid={!!error}
            aria-describedby={error ? `${inputId}-err` : undefined}
            className={`${base} ${stateCls}`}
            {...rest}
          />
          {error && (
            <p id={`${inputId}-err`} className="mt-1.5 text-xs text-red-600" role="alert">{error}</p>
          )}
        </div>
      );
    });

    // ---- Card ----
    function Card({ className = '', children, ...rest }) {
      return (
        <div className={`bg-white border border-neutral-200 ${className}`} {...rest}>
          {children}
        </div>
      );
    }

    // ---- Badge ---- (헤더 장바구니 수량 등)
    function Badge({ children, className = '' }) {
      return (
        <span className={
          'inline-flex items-center justify-center min-w-[1.15rem] h-[1.15rem] px-1 ' +
          'text-[0.65rem] font-semibold leading-none rounded-full bg-neutral-900 text-white ' + className
        }>
          {children}
        </span>
      );
    }

    // ---- Modal ---- (간단 공용 모달; 안내 등에 사용)
    const MODAL_SIZE = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
    function Modal({ isOpen, onClose, title, size = 'md', children, footer }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
        window.addEventListener('keydown', onKey);
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 shop-fade-in"
             role="dialog" aria-modal="true" aria-label={title || '대화상자'}>
          <div className="absolute inset-0 bg-neutral-900/50" onClick={onClose} aria-hidden="true" />
          <div className={`relative w-full ${MODAL_SIZE[size] || MODAL_SIZE.md} bg-white border border-neutral-200 shadow-xl`}>
            {title && (
              <div className="flex items-center justify-between px-5 py-4 border-b border-neutral-200">
                <h2 className="text-base font-semibold tracking-tight">{title}</h2>
                <button onClick={onClose} aria-label="닫기"
                        className="text-neutral-400 hover:text-neutral-900 transition-colors p-1 -mr-1">
                  <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            )}
            <div className="px-5 py-5">{children}</div>
            {footer && <div className="px-5 py-4 border-t border-neutral-200 flex justify-end gap-2">{footer}</div>}
          </div>
        </div>
      );
    }

    // ---- Spinner ---- (인라인 로딩 표시)
    function Spinner({ className = 'h-6 w-6 text-neutral-400' }) {
      return (
        <svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none" aria-label="로딩 중" role="status">
          <circle className="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
        </svg>
      );
    }

    // ---- ProductImage ---- (onError 시 깔끔한 회색 플레이스홀더로 폴백; 깨진 이미지 아이콘 금지)
    function ProductImage({ src, alt, className = '', wrapClassName = '' }) {
      const [failed, setFailed] = useState(false);
      const showPlaceholder = failed || !src;
      return (
        <div className={`relative overflow-hidden bg-neutral-100 ${wrapClassName}`}>
          {showPlaceholder ? (
            <div className="absolute inset-0 flex flex-col items-center justify-center bg-neutral-100 text-neutral-400 p-3 text-center">
              <svg className="w-8 h-8 mb-2 opacity-60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="1" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 15l-5-5L5 21" />
              </svg>
              <span className="text-[0.7rem] leading-tight line-clamp-2 font-medium">{alt}</span>
            </div>
          ) : (
            <img
              src={src}
              alt={alt}
              loading="lazy"
              onError={() => setFailed(true)}
              className={`w-full h-full object-cover ${className}`}
            />
          )}
        </div>
      );
    }

    // ========================================
    // 🔀 라우터 — 가벼운 해시 기반 라우터
    // ========================================
    const RouterContext = createContext(null);

    function getHashPath() {
      const raw = window.location.hash.replace(/^#/, '');
      const path = raw.split('?')[0] || '/';
      return path.startsWith('/') ? path : `/${path}`;
    }

    function Router({ children }) {
      const [path, setPath] = useState(getHashPath());

      useEffect(() => {
        const onHash = () => setPath(getHashPath());
        window.addEventListener('hashchange', onHash);
        // 최초 진입 시 해시가 비어있으면 홈으로 정규화
        if (!window.location.hash) window.location.hash = '#/';
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = useCallback((to) => {
        const target = to.startsWith('#') ? to : `#${to.startsWith('/') ? to : `/${to}`}`;
        if (window.location.hash === target) {
          // 같은 경로면 hashchange 가 안 뜨므로 강제로 동기화 + 스크롤 상단
          window.scrollTo({ top: 0 });
          setPath(getHashPath());
        } else {
          window.location.hash = target;
          window.scrollTo({ top: 0 });
        }
      }, []);

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    const useRouter = () => useContext(RouterContext);

    // matchRoute: 동적 파라미터(:id) 지원. 이 앱은 정적 경로만 쓰지만 표준 형태 유지.
    function matchRoute(pattern, path) {
      const pSeg = pattern.split('/').filter(Boolean);
      const aSeg = path.split('/').filter(Boolean);
      if (pSeg.length !== aSeg.length) return null;
      const params = {};
      for (let i = 0; i < pSeg.length; i++) {
        if (pSeg[i].startsWith(':')) params[pSeg[i].slice(1)] = decodeURIComponent(aSeg[i]);
        else if (pSeg[i] !== aSeg[i]) return null;
      }
      return params;
    }

    // Routes / Route: 선언적 매칭. 첫 매칭만 렌더, 없으면 fallback.
    function Routes({ children, fallback = null }) {
      const { path } = useRouter();
      const routes = React.Children.toArray(children).filter(Boolean);
      for (const route of routes) {
        const params = matchRoute(route.props.path, path);
        if (params) return React.cloneElement(route.props.element, { params });
      }
      return fallback;
    }
    function Route() { return null; } // 선언용 (Routes 가 props 만 사용)

    // Link: 해시 네비게이션
    function Link({ to, className = '', children, onClick, ...rest }) {
      const { navigate } = useRouter();
      const handle = (e) => {
        e.preventDefault();
        if (onClick) onClick(e);
        navigate(to);
      };
      return (
        <a href={`#${to}`} onClick={handle} className={className} {...rest}>
          {children}
        </a>
      );
    }

    // ========================================
    // 전역 컨텍스트 — Auth + Cart + Toast
    // ========================================

    // ---- Toast Context ---- (성공/안내 피드백)
    const ToastContext = createContext(null);
    const useToast = () => useContext(ToastContext);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const idRef = useRef(0);

      const remove = useCallback((id) => {
        setToasts((list) => list.filter((t) => t.id !== id));
      }, []);

      const show = useCallback((message, opts = {}) => {
        const id = ++idRef.current;
        const tone = opts.tone || 'default';
        setToasts((list) => [...list, { id, message, tone }]);
        const ttl = opts.duration || 2400;
        setTimeout(() => remove(id), ttl);
      }, [remove]);

      const TONE_CLS = {
        default: 'bg-neutral-900 text-white',
        success: 'bg-neutral-900 text-white',
        error:   'bg-red-600 text-white',
        info:    'bg-white text-neutral-900 border border-neutral-300',
      };

      return (
        <ToastContext.Provider value={{ show }}>
          {children}
          <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] flex flex-col items-center gap-2 w-[calc(100%-2rem)] max-w-sm pointer-events-none">
            {toasts.map((t) => (
              <div key={t.id}
                   className={`shop-toast-in pointer-events-auto px-4 py-3 text-sm font-medium shadow-lg w-full text-center ${TONE_CLS[t.tone] || TONE_CLS.default}`}
                   role="status">
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    // ---- Auth Context ----
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEYS.user);
          return raw ? JSON.parse(raw) : null;
        } catch (_) { return null; }
      });
      const [bootChecking, setBootChecking] = useState(true); // 최초 토큰 검증 중

      // 세션 저장 / 비우기
      const persistSession = useCallback((token, nextUser) => {
        if (token) localStorage.setItem(STORAGE_KEYS.token, token);
        if (nextUser) localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(nextUser));
        setUser(nextUser || null);
      }, []);

      const clearSession = useCallback(() => {
        localStorage.removeItem(STORAGE_KEYS.token);
        localStorage.removeItem(STORAGE_KEYS.user);
        setUser(null);
      }, []);

      // apiFetch 의 401 공통 핸들러로 등록 → 어떤 요청이든 401 이면 세션 비움.
      useEffect(() => {
        registerUnauthorizedHandler(() => clearSession());
        return () => registerUnauthorizedHandler(null);
      }, [clearSession]);

      // 최초 로드: 저장된 토큰이 있으면 /auth/me 로 유효성 검증
      useEffect(() => {
        let alive = true;
        const token = localStorage.getItem(STORAGE_KEYS.token);
        if (!token) { setBootChecking(false); return; }
        apiFetch('/auth/me')
          .then((data) => {
            if (!alive) return;
            if (data && data.user) persistSession(null, data.user);
          })
          .catch(() => { /* 401 은 apiFetch 가 이미 clear. 그 외도 안전하게 무시 */ })
          .finally(() => { if (alive) setBootChecking(false); });
        return () => { alive = false; };
      }, [persistSession]);

      const login = useCallback(async (email, password) => {
        const data = await apiFetch('/auth/login', { method: 'POST', body: { email, password } });
        persistSession(data.token, data.user);
        return data.user;
      }, [persistSession]);

      const signup = useCallback(async (email, password) => {
        const data = await apiFetch('/auth/signup', { method: 'POST', body: { email, password } });
        persistSession(data.token, data.user);
        return data.user;
      }, [persistSession]);

      const logout = useCallback(() => { clearSession(); }, [clearSession]);

      const value = useMemo(() => ({
        user, isAuthenticated: !!user, bootChecking, login, signup, logout, clearSession,
      }), [user, bootChecking, login, signup, logout, clearSession]);

      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    // ---- Cart Context ----
    // 모든 변경 응답이 전체 장바구니 객체 { items, totalQuantity, totalPrice } 를 돌려준다.
    const CartContext = createContext(null);
    const useCart = () => useContext(CartContext);

    const EMPTY_CART = { items: [], totalQuantity: 0, totalPrice: 0 };

    function CartProvider({ children }) {
      const { isAuthenticated } = useAuth();
      const [cart, setCart] = useState(EMPTY_CART);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const normalize = (data) => ({
        items: Array.isArray(data?.items) ? data.items : [],
        totalQuantity: Number(data?.totalQuantity || 0),
        totalPrice: Number(data?.totalPrice || 0),
      });

      const refresh = useCallback(async () => {
        if (!isAuthenticated) { setCart(EMPTY_CART); return; }
        setLoading(true); setError(null);
        try {
          const data = await apiFetch('/cart');
          setCart(normalize(data));
        } catch (err) {
          if (err.status === 401) setCart(EMPTY_CART);
          else setError(err.message || '장바구니를 불러오지 못했어요.');
        } finally {
          setLoading(false);
        }
      }, [isAuthenticated]);

      // 로그인 상태 변화 시 장바구니 동기화 (로그인하면 로드, 로그아웃하면 비움)
      useEffect(() => {
        if (isAuthenticated) refresh();
        else setCart(EMPTY_CART);
      }, [isAuthenticated, refresh]);

      const addItem = useCallback(async (productId, quantity = 1) => {
        const data = await apiFetch('/cart', { method: 'POST', body: { productId, quantity } });
        setCart(normalize(data));
        return data;
      }, []);

      const updateQuantity = useCallback(async (cartRowId, quantity) => {
        const data = await apiFetch(`/cart/${cartRowId}`, { method: 'PATCH', body: { quantity } });
        setCart(normalize(data));
        return data;
      }, []);

      const removeItem = useCallback(async (cartRowId) => {
        const data = await apiFetch(`/cart/${cartRowId}`, { method: 'DELETE' });
        setCart(normalize(data));
        return data;
      }, []);

      const value = useMemo(() => ({
        cart, loading, error, refresh, addItem, updateQuantity, removeItem,
        totalQuantity: cart.totalQuantity,
      }), [cart, loading, error, refresh, addItem, updateQuantity, removeItem]);

      return <CartContext.Provider value={value}>{children}</CartContext.Provider>;
    }

            <div className="h-3 w-full bg-neutral-100 shop-pulse" />
            <div className="h-5 w-1/3 bg-neutral-200 shop-pulse" />

    function ProductListPage() {
      const { isAuthenticated } = useAuth();
      const { addItem } = useCart();
      const { navigate } = useRouter();
      const { show } = useToast();

      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [addingId, setAddingId] = useState(null); // 현재 담는 중인 상품 id

      // 비로그인 담기 시 안내 모달
      const [loginPrompt, setLoginPrompt] = useState(false);

      const loadProducts = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const data = await apiFetch('/products'); // 공개 엔드포인트

          setError(err.message || '상품을 불러오지 못했어요.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadProducts(); }, [loadProducts]);

      const handleAdd = async (product) => {
        if (!isAuthenticated) { setLoginPrompt(true); return; }
        setAddingId(String(product.id));
        try {
          await addItem(product.id, 1);
          show(`'${product.name}' 담았어요.`, { tone: 'success' });
        } catch (err) {
          if (err.status === 401) {
            // 401 → apiFetch 가 세션 clear. 로그인 안내.
            setLoginPrompt(true);
          } else {
            show(err.message || '담기에 실패했어요.', { tone: 'error' });
          }
        } finally {
          setAddingId(null);
        }
      };

      const goLogin = () => {
        setLoginPrompt(false);
        navigate('/login');
      };

      return (
        <div className="max-w-6xl mx-auto px-4 py-8 sm:py-12">
          {/* 히어로 */}
          <div className="mb-8 sm:mb-12">
            <p className="text-xs tracking-[0.3em] text-neutral-400 uppercase mb-2">New Arrivals</p>
            <h1 className="text-2xl sm:text-3xl font-bold tracking-tight text-neutral-900">

            </h1>
            <p className="mt-2 text-sm text-neutral-500 max-w-xl leading-relaxed">
              과하지 않은 디테일과 정제된 실루엣. {BRAND}가 제안하는 미니멀 남성 워드로브를 만나보세요.
            </p>
          </div>

          {/* 본문 상태 분기 */}
          {loading ? (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
              {Array.from({ length: 8 }).map((_, i) => <ProductSkeleton key={i} />)}
            </div>

            <StatusBox
              icon={
                <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" /><path strokeLinecap="round" d="M12 8v4m0 4h.01" />
                </svg>
              }
              title="상품을 불러오지 못했어요"

                </svg>

    }

    // ---- 인증 페이지 (로그인 / 회원가입 공용) ----
    function AuthPage({ mode }) {
      const isSignup = mode === 'signup';
      const { login, signup, isAuthenticated } = useAuth();
      const { navigate } = useRouter();
      const { show } = useToast();

      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [passwordConfirm, setPasswordConfirm] = useState('');
      const [fieldErrors, setFieldErrors] = useState({});
      const [formError, setFormError] = useState(null);
      const [submitting, setSubmitting] = useState(false);

      const emailRef = useRef(null);

      // 이미 로그인 상태면 홈으로
      useEffect(() => {
        if (isAuthenticated) navigate('/');
      }, [isAuthenticated, navigate]);

      // 모드 진입/전환 시 이메일 입력 자동 포커스 (forwardRef 덕분에 동작)
      useEffect(() => {
        const t = setTimeout(() => emailRef.current && emailRef.current.focus(), 60);
        return () => clearTimeout(t);
      }, [mode]);

      const validate = () => {
        const errs = {};
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
        if (!email.trim()) errs.email = '이메일을 입력해 주세요.';
        else if (!emailOk) errs.email = '올바른 이메일 형식이 아니에요.';

        if (!password) errs.password = '비밀번호를 입력해 주세요.';
        else if (password.length < 6) errs.password = '비밀번호는 6자 이상이어야 해요.';

        if (isSignup) {
          if (!passwordConfirm) errs.passwordConfirm = '비밀번호를 한 번 더 입력해 주세요.';
          else if (password !== passwordConfirm) errs.passwordConfirm = '비밀번호가 일치하지 않아요.';
        }
        return errs;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setFormError(null);
        const errs = validate();
        setFieldErrors(errs);
        if (Object.keys(errs).length > 0) return;

        setSubmitting(true);
        try {
          if (isSignup) {
            await signup(email.trim(), password);
            show('회원가입이 완료되었어요. 환영합니다!', { tone: 'success' });
          } else {
            await login(email.trim(), password);
            show('로그인되었어요.', { tone: 'success' });
          }
          navigate('/'); // 성공 시 홈으로
        } catch (err) {
          // 서버 상태코드별 친절한 메시지
          if (err.status === 401) {
            setFormError('이메일 또는 비밀번호가 올바르지 않아요.');
          } else if (err.status === 409) {
            setFieldErrors((prev) => ({ ...prev, email: '이미 가입된 이메일이에요.' }));
            setFormError('이미 가입된 이메일이에요. 로그인해 주세요.');
          } else if (err.status === 400) {
            setFormError(err.message || '입력값을 다시 확인해 주세요.');
          } else if (err.status === 0) {
            setFormError('서버에 연결할 수 없어요. 백엔드(server.js) 실행 상태를 확인해 주세요.');
          } else {
            setFormError(err.message || '요청에 실패했어요. 잠시 후 다시 시도해 주세요.');
          }
        } finally {
          setSubmitting(false);
        }
      };

      const switchTo = isSignup ? '/login' : '/signup';

      return (
        <div className="max-w-md mx-auto px-4 py-12 sm:py-20">
          <div className="text-center mb-8">
            <p className="text-xl font-bold tracking-[0.2em] text-neutral-900">{BRAND}</p>
            <h1 className="mt-4 text-xl font-semibold text-neutral-900">
              {isSignup ? '회원가입' : '로그인'}
            </h1>
            <p className="mt-1.5 text-sm text-neutral-500">
              {isSignup ? '이메일로 간편하게 가입하세요.' : '다시 오신 것을 환영해요.'}
            </p>
          </div>

          <Card className="p-6 sm:p-8">
            <form onSubmit={handleSubmit} noValidate className="space-y-4">
              <Input
                ref={emailRef}
                label="이메일"
                type="email"
                value={email}
                onChange={(e) => { setEmail(e.target.value); setFieldErrors((p) => ({ ...p, email: undefined })); }}
                placeholder="you@example.com"
                autoComplete="email"
                error={fieldErrors.email}
                required
              />
              <Input
                label="비밀번호"
                type="password"
                value={password}
                onChange={(e) => { setPassword(e.target.value); setFieldErrors((p) => ({ ...p, password: undefined })); }}
                placeholder="6자 이상"
                autoComplete={isSignup ? 'new-password' : 'current-password'}
                error={fieldErrors.password}
                required
              />
              {isSignup && (
                <Input
                  label="비밀번호 확인"
                  type="password"
                  value={passwordConfirm}
                  onChange={(e) => { setPasswordConfirm(e.target.value); setFieldErrors((p) => ({ ...p, passwordConfirm: undefined })); }}
                  placeholder="비밀번호를 한 번 더 입력"
                  autoComplete="new-password"
                  error={fieldErrors.passwordConfirm}
                  required
                />
              )}

              {formError && (
                <div className="px-3.5 py-2.5 bg-red-50 border border-red-200 text-sm text-red-700" role="alert">
                  {formError}
                </div>
              )}

              <Button type="submit" variant="primary" size="lg" className="w-full" loading={submitting}>
                {isSignup ? '회원가입' : '로그인'}
              </Button>
            </form>
          </Card>

          <p className="mt-6 text-center text-sm text-neutral-500">
            {isSignup ? '이미 계정이 있으신가요?' : '아직 회원이 아니신가요?'}{' '}
            <Link to={switchTo} className="font-semibold text-neutral-900 underline underline-offset-2 hover:text-neutral-600">
              {isSignup ? '로그인' : '회원가입'}
            </Link>
          </p>

          <p className="mt-4 text-center">
            <Link to="/" className="text-xs text-neutral-400 hover:text-neutral-700">← 쇼핑 계속하기</Link>
          </p>
        </div>
      );
    }

    // ---- 장바구니 행 ----
    function CartRow({ item, onInc, onDec, onRemove, busy }) {
      // 단가: lineTotal / quantity 로 역산하지 않고 백엔드가 준 price 를 그대로 신뢰.
      return (
        <div className="flex gap-3 sm:gap-4 py-4 border-b border-neutral-200 last:border-b-0">
          <Link to="/" className="flex-shrink-0">
            <ProductImage
              src={item.imageUrl}
              alt={item.name}
              wrapClassName="w-20 h-24 sm:w-24 sm:h-28"
            />
          </Link>

          <div className="flex-1 min-w-0 flex flex-col">
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <h3 className="text-sm font-semibold text-neutral-900 truncate" title={item.name}>{item.name}</h3>
                <p className="mt-0.5 text-xs text-neutral-500">단가 {formatKRW(item.price)}</p>
              </div>
              <button
                onClick={() => onRemove(item)}
                disabled={busy}
                className="flex-shrink-0 text-neutral-400 hover:text-red-600 transition-colors disabled:opacity-40 p-1 -mr-1"
                aria-label={`'${item.name}' 삭제`}
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.87 12.14A2 2 0 0116.14 21H7.86a2 2 0 01-1.99-1.86L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16" />
                </svg>
              </button>
            </div>

            <div className="mt-auto pt-3 flex items-end justify-between gap-2">
              {/* 수량 스텝퍼 */}
              <div className="inline-flex items-center border border-neutral-300">
                <button
                  onClick={() => onDec(item)}
                  disabled={busy}
                  className="w-8 h-8 flex items-center justify-center text-neutral-700 hover:bg-neutral-100 disabled:opacity-40 transition-colors"
                  aria-label="수량 줄이기"
                >
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                    <path strokeLinecap="round" d="M5 12h14" />
                  </svg>
                </button>
                <span className="w-9 h-8 flex items-center justify-center text-sm font-semibold tabular-nums border-x border-neutral-300" aria-live="polite">
                  {item.quantity}
                </span>
                <button
                  onClick={() => onInc(item)}
                  disabled={busy}
                  className="w-8 h-8 flex items-center justify-center text-neutral-700 hover:bg-neutral-100 disabled:opacity-40 transition-colors"
                  aria-label="수량 늘리기"
                >
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                    <path strokeLinecap="round" d="M12 5v14M5 12h14" />
                  </svg>
                </button>
              </div>

              {/* 줄 합계 */}
              <p className="text-sm font-bold text-neutral-900 tabular-nums">{formatKRW(item.lineTotal)}</p>
            </div>
          </div>
        </div>
      );
    }

    function CartPage() {
      const { isAuthenticated, bootChecking } = useAuth();
      const { cart, loading, error, refresh, updateQuantity, removeItem } = useCart();
      const { navigate } = useRouter();
      const { show } = useToast();

      const [busyId, setBusyId] = useState(null); // 변경 중인 cart row id

      // 비로그인 접근 차단: 로그인 화면으로. (부트 검증이 끝난 뒤 판단)
      useEffect(() => {
        if (!bootChecking && !isAuthenticated) navigate('/login');
      }, [bootChecking, isAuthenticated, navigate]);

      const withBusy = async (rowId, fn, failMsg) => {
        setBusyId(String(rowId));
        try {
          await fn();
        } catch (err) {
          if (err.status !== 401) show(err.message || failMsg, { tone: 'error' });
          // 401 → apiFetch 가 세션 clear, 위 useEffect 가 로그인으로 보냄.
        } finally {
          setBusyId(null);
        }
      };

      const handleInc = (item) =>
        withBusy(item.id, () => updateQuantity(item.id, item.quantity + 1), '수량 변경에 실패했어요.');

      const handleDec = (item) => {
        if (item.quantity > 1) {
          return withBusy(item.id, () => updateQuantity(item.id, item.quantity - 1), '수량 변경에 실패했어요.');
        }
        // quantity === 1 에서 - 누르면 삭제
        return withBusy(item.id, async () => {
          await removeItem(item.id);
          show('상품을 삭제했어요.', { tone: 'info' });
        }, '삭제에 실패했어요.');
      };

      const handleRemove = (item) =>
        withBusy(item.id, async () => {
          await removeItem(item.id);
          show(`'${item.name}' 삭제했어요.`, { tone: 'info' });
        }, '삭제에 실패했어요.');

      const handleOrder = () => { alert(ORDER_MESSAGE); };

      // 부트 검증 중 또는 리다이렉트 직전: 로딩만 노출
      if (bootChecking || !isAuthenticated) {
        return (
          <div className="max-w-3xl mx-auto px-4 py-20 flex justify-center">
            <Spinner className="h-7 w-7 text-neutral-400" />
          </div>
        );
      }

      const { items, totalQuantity, totalPrice } = cart;
      const isEmpty = !loading && items.length === 0;

      return (
        <div className="max-w-3xl mx-auto px-4 py-8 sm:py-12">
          <h1 className="text-2xl font-bold tracking-tight text-neutral-900 mb-6">
            장바구니
            {totalQuantity > 0 && (
              <span className="ml-2 text-base font-medium text-neutral-400 align-middle">{totalQuantity}개</span>
            )}
          </h1>

          {loading && items.length === 0 ? (
            <div className="py-20 flex justify-center">
              <Spinner className="h-7 w-7 text-neutral-400" />
            </div>
          ) : error ? (
            <StatusBox
              icon={
                <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" /><path strokeLinecap="round" d="M12 8v4m0 4h.01" />
                </svg>
              }
              title="장바구니를 불러오지 못했어요"
              description={error}
              action={<Button onClick={refresh}>다시 시도</Button>}
            />
          ) : isEmpty ? (
            <StatusBox
              icon={
                <svg className="w-14 h-14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3" aria-hidden="true">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13L5.4 5M7 13l-2 5h12M9 19a1 1 0 11-2 0 1 1 0 012 0zm9 0a1 1 0 11-2 0 1 1 0 012 0z" />
                </svg>
              }
              title="장바구니가 비어 있어요"
              description="마음에 드는 상품을 담아보세요."
              action={<Link to="/"><Button variant="primary">쇼핑 계속하기</Button></Link>}
            />
          ) : (
            <div className="grid lg:grid-cols-3 gap-6 lg:gap-8 items-start">
              {/* 아이템 목록 */}
              <div className="lg:col-span-2">
                <Card className="px-4 sm:px-5">
                  {items.map((item) => (
                    <CartRow
                      key={String(item.id)}
                      item={item}
                      onInc={handleInc}
                      onDec={handleDec}
                      onRemove={handleRemove}
                      busy={busyId === String(item.id)}
                    />
                  ))}
                </Card>
                <div className="mt-4">
                  <Link to="/" className="text-sm text-neutral-500 hover:text-neutral-900 inline-flex items-center gap-1">
                    ← 쇼핑 계속하기
                  </Link>
                </div>
              </div>

              {/* 주문 요약 */}
              <div className="lg:col-span-1">
                <Card className="p-5 sm:p-6 lg:sticky lg:top-24">
                  <h2 className="text-sm font-semibold text-neutral-900 mb-4 tracking-wide">주문 요약</h2>
                  <dl className="space-y-2.5 text-sm">
                    <div className="flex justify-between text-neutral-600">
                      <dt>총 수량</dt>
                      <dd className="tabular-nums">{totalQuantity}개</dd>
                    </div>
                    <div className="flex justify-between text-neutral-600">
                      <dt>상품 금액</dt>
                      <dd className="tabular-nums">{formatKRW(totalPrice)}</dd>
                    </div>
                    <div className="flex justify-between text-neutral-600">
                      <dt>배송비</dt>
                      <dd className="text-neutral-400">무료</dd>
                    </div>
                  </dl>
                  <div className="my-4 border-t border-neutral-200" />
                  <div className="flex justify-between items-baseline">
                    <span className="text-sm font-semibold text-neutral-900">총 결제금액</span>
                    <span className="text-xl font-bold text-neutral-900 tabular-nums">{formatKRW(totalPrice)}</span>
                  </div>
                  <Button variant="primary" size="lg" className="w-full mt-6" onClick={handleOrder}>
                    주문하기
                  </Button>
                  <p className="mt-3 text-[0.7rem] text-center text-neutral-400 leading-relaxed">
                    데모 앱입니다. 실제 결제는 진행되지 않아요.
                  </p>
                </Card>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 404
    function NotFoundPage() {
      return (
        <div className="max-w-3xl mx-auto">
          <StatusBox
            icon={<span className="text-5xl font-bold text-neutral-200">404</span>}
            title="페이지를 찾을 수 없어요"
            description="주소가 올바른지 확인해 주세요."
            action={<Link to="/"><Button>홈으로</Button></Link>}
          />
        </div>
      );
    }

    // ========================================
    // 🚀 App — 합성 + 백엔드 헬스체크
    // ========================================
    function AppShell() {
      // 백엔드 감지: null=확인중, true=정상, false=미감지
      const [backendOnline, setBackendOnline] = useState(null);

      useEffect(() => {
        let alive = true;
        // 헬스체크는 apiFetch(401핸들러) 거치지 않고 직접 호출 — 단순 감지 목적.
        fetch(`${API_BASE_URL}/health`)
          .then((res) => { if (alive) setBackendOnline(res.ok); })
          .catch(() => { if (alive) setBackendOnline(false); });
        return () => { alive = false; };
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          {/* 백엔드 미감지 시 경고 배너 (정적 서버로 열었을 때 대표적 실패) */}
          {backendOnline === false && <BackendWarning />}

          <Header />

          <main className="flex-1">
            <Routes fallback={<NotFoundPage />}>
              <Route path="/"       element={<ProductListPage />} />
              <Route path="/login"  element={<AuthPage mode="login" />} />
              <Route path="/signup" element={<AuthPage mode="signup" />} />
              <Route path="/cart"   element={<CartPage />} />
            </Routes>
          </main>

          <Footer />
        </div>
      );
    }

    function App() {
      // Provider 순서: Router → Toast → Auth → Cart (Cart 는 Auth 상태에 의존)
      return (
        <Router>
          <ToastProvider>
            <AuthProvider>
              <CartProvider>
                <AppShell />
              </CartProvider>
            </AuthProvider>
          </ToastProvider>
        </Router>
      );
    }

    // ========================================
    // 렌더
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
