<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="단군마켓">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9048"/>
      <stop offset="1" stop-color="#ff6f0f"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="30" fill="url(#bg)"/>

  <!-- 상투(topknot) + 동곳 -->
  <circle cx="64" cy="16" r="7.5" fill="#4a3524"/>
  <rect x="60.5" y="15" width="7" height="13" rx="3" fill="#4a3524"/>

  <!-- 머리·망건(headband) -->
  <path d="M31 54 Q64 22 97 54 Q64 41 31 54 Z" fill="#4a3524"/>
  <rect x="31" y="49" width="66" height="8" rx="4" fill="#3a2a1a"/>

  <!-- 귀 -->
  <circle cx="31" cy="72" r="7" fill="#f6c393"/>
  <circle cx="97" cy="72" r="7" fill="#f6c393"/>

  <!-- 얼굴 -->
  <ellipse cx="64" cy="70" rx="33" ry="34" fill="#ffdcaf"/>

  <!-- 볼터치 -->
  <circle cx="45" cy="78" r="6" fill="#ff9e5e" opacity="0.5"/>
  <circle cx="83" cy="78" r="6" fill="#ff9e5e" opacity="0.5"/>

  <!-- 눈썹 -->
  <path d="M45 63 q7 -5 14 -1" stroke="#4a3524" stroke-width="4.2" fill="none" stroke-linecap="round"/>
  <path d="M69 62 q7 -4 14 1" stroke="#4a3524" stroke-width="4.2" fill="none" stroke-linecap="round"/>

  <!-- 눈 -->
  <circle cx="53" cy="72" r="3.6" fill="#3a2a1a"/>
  <circle cx="75" cy="72" r="3.6" fill="#3a2a1a"/>

  <!-- 수염(beard) -->
  <path d="M39 84 Q40 106 64 114 Q88 106 89 84 Q77 93 64 93 Q51 93 39 84 Z" fill="#fbf5ec"/>
  <!-- 입(미소) -->
  <path d="M57 85 q7 6 14 0" stroke="#c8623a" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
