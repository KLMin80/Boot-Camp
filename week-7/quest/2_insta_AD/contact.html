<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="fonts_embed.css">
<style>
  html,body{margin:0;background:#141414;}
  *{box-sizing:border-box;}
  .sheet{width:2060px;padding:56px 60px 60px;background:#141414;
    font-family:'Malgun Gothic',sans-serif;}
  .head{display:flex;align-items:center;gap:18px;margin-bottom:34px;}
  .head svg{width:66px;height:auto;}
  .head svg path{fill:#fff;}
  .head .t{color:#fff;font-family:'Anton',sans-serif;font-size:30px;letter-spacing:2px;}
  .head .t b{color:#d7ff00;}
  .strip{display:flex;gap:40px;}
  .slide{width:620px;}
  .slide img{width:620px;height:620px;display:block;border-radius:10px;
    box-shadow:0 14px 40px rgba(0,0,0,0.5);}
  .cap{display:flex;align-items:center;gap:12px;margin-top:20px;}
  .cap .n{font-family:'Anton',sans-serif;color:#d7ff00;font-size:26px;}
  .cap .l{color:#fff;font-size:22px;font-weight:700;}
  .cap .d{color:#8a8a8a;font-size:19px;}
</style>
</head>
<body>
  <div class="sheet">
    <div class="head">
      <svg viewBox="0 7 24 10" xmlns="http://www.w3.org/2000/svg"><path d="M24 7.8L6.442 15.276c-1.456.616-2.679.925-3.668.925-1.12 0-1.933-.392-2.437-1.177-.317-.504-.444-1.143-.383-1.916.063-.774.35-1.6.865-2.478.428-.72 1.033-1.522 1.813-2.404-.219.354-.409.71-.573 1.068-.638 1.394-.75 2.559-.334 3.494.464 1.04 1.5 1.56 3.108 1.56.394 0 .81-.033 1.246-.099.437-.066.89-.166 1.359-.3L24 7.8z"/></svg>
      <div class="t">JUST DO IT · <b>3-CARD CAROUSEL</b></div>
    </div>
    <div class="strip">
      <div class="slide"><img src="nike_carousel_1.png" alt="1"><div class="cap"><span class="n">01</span><span class="l">후킹</span><span class="d">— 질문으로 스크롤 정지</span></div></div>
      <div class="slide"><img src="nike_carousel_2.png" alt="2"><div class="cap"><span class="n">02</span><span class="l">본문</span><span class="d">— 관점 전환 + 3원칙</span></div></div>
      <div class="slide"><img src="nike_carousel_3.png" alt="3"><div class="cap"><span class="n">03</span><span class="l">CTA</span><span class="d">— 제품 + 지금 쇼핑하기</span></div></div>
    </div>
  </div>
</body>
</html>
