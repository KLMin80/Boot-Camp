<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Nike 캐러셀 2/3 — 본문</title>
<link rel="stylesheet" href="fonts_embed.css">
<link rel="stylesheet" href="carousel.css">
</head>
<body>
  <div class="card">
    <!-- 배경: 미세 그라데이션 + 초대형 고스트 Swoosh 워터마크 -->
    <div class="scrim" style="background:radial-gradient(130% 110% at 78% 30%, rgba(38,40,32,0.55) 0%, rgba(10,10,10,0) 55%);"></div>
    <svg class="ghost" style="width:1180px;right:-210px;top:250px;" viewBox="0 7 24 10" xmlns="http://www.w3.org/2000/svg"><path d="M24 7.8L6.442 15.276c-1.456.616-2.679.925-3.668.925-1.12 0-1.933-.392-2.437-1.177-.317-.504-.444-1.143-.383-1.916.063-.774.35-1.6.865-2.478.428-.72 1.033-1.522 1.813-2.404-.219.354-.409.71-.573 1.068-.638 1.394-.75 2.559-.334 3.494.464 1.04 1.5 1.56 3.108 1.56.394 0 .81-.033 1.246-.099.437-.066.89-.166 1.359-.3L24 7.8z"/></svg>

    <div class="layer">
      <div class="topbar">
        <svg class="swoosh" viewBox="0 7 24 10" xmlns="http://www.w3.org/2000/svg" aria-label="Nike"><path d="M24 7.8L6.442 15.276c-1.456.616-2.679.925-3.668.925-1.12 0-1.933-.392-2.437-1.177-.317-.504-.444-1.143-.383-1.916.063-.774.35-1.6.865-2.478.428-.72 1.033-1.522 1.813-2.404-.219.354-.409.71-.573 1.068-.638 1.394-.75 2.559-.334 3.494.464 1.04 1.5 1.56 3.108 1.56.394 0 .81-.033 1.246-.099.437-.066.89-.166 1.359-.3L24 7.8z"/></svg>
        <div class="pageind"><i></i><i class="on"></i><i></i></div>
      </div>

      <div style="margin-top:60px;">
        <div class="eyebrow"><i class="tick"></i><span>Nike Running</span></div>
        <h2 class="headline" style="font-size:76px;">한계는<br><span class="accent">사실</span>이 아니다.</h2>
        <p class="sub">믿는 순간 한계가 되고,<br>다시 쓰는 순간 기록이 된다.</p>
      </div>

      <div class="points">
        <div class="point"><span class="n">01</span><span class="t">어제보다 딱 1km 더</span></div>
        <div class="point"><span class="n">02</span><span class="t">포기 대신, 한 걸음 더</span></div>
        <div class="point"><span class="n">03</span><span class="t">기록은 매일 갱신하는 것</span></div>
      </div>
    </div>
  </div>
</body>
</html>
