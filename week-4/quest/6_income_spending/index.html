<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>익명 연봉·지출 비교 💸 — 내 위치는 어디쯤?</title>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨진다(백지 화면).
       Babel 은 반드시 7.x 로 고정한다. React/ReactDOM/Tailwind 도 정확히 핀.
       데이터는 server.js(/api) 를 통해 Supabase Postgres 에서 가져온다(제출→집계→응답). -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* Tailwind 으로 표현하기 어려운 것만 커스텀 처리 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out both; }

    @keyframes growBar {
      from { transform: scaleY(0.001); }
      to   { transform: scaleY(1); }
    }

    /* 데이터/금융 대시보드 톤: 차분한 슬레이트 + 은은한 인디고/그린 광원 */
    body {
      background:
        radial-gradient(1100px 560px at 0% -5%, #eef2ff 0%, transparent 55%),
        radial-gradient(1000px 520px at 100% 0%, #ecfdf5 0%, transparent 55%),
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 9999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useMemo, useRef, forwardRef } = React;

    // ========================================
    // 상수 / 도메인 데이터
    // ========================================
    // 데이터 소스: server.js(/api). 평균·백분위·히스토그램은 모두 서버(SQL)가 계산한다.
    // 상대경로로 같은 출처의 백엔드를 부른다(로컬·배포 모두 동작). ❌ localhost 하드코딩 금지.
    const API_BASE_URL = window.location.origin + "/api";

    // 직군: id 는 server.js 의 JOBS id 와 1:1 일치해야 한다(dev/design/pm/mkt/sales/data/hr).
    // label 은 화면 표시용(서버는 라벨을 모름 — 렌더는 클라이언트 책임).
    const JOBS = [
      { id: "dev",      label: "개발" },
      { id: "design",   label: "디자인" },
      { id: "pm",       label: "기획/PM" },
      { id: "mkt",      label: "마케팅" },
      { id: "sales",    label: "영업" },
      { id: "data",     label: "데이터" },
      { id: "hr",       label: "HR/경영지원" },
    ];

    // 연차 구간: id 는 server.js 의 LEVELS id 와 일치(junior/middle/senior/lead).
    const LEVELS = [
      { id: "junior", label: "0~2년차 (주니어)" },
      { id: "middle", label: "3~5년차 (미들)" },
      { id: "senior", label: "6~9년차 (시니어)" },
      { id: "lead",   label: "10년차+ (리드)" },
    ];

    // 지출 카테고리 6종. id 는 server.js 의 submissions 컬럼명과 일치.
    const CATEGORIES = [
      { id: "food",      label: "식비",      icon: "🍚" },
      { id: "housing",   label: "주거",      icon: "🏠" },
      { id: "transport", label: "교통",      icon: "🚇" },
      { id: "subscribe", label: "구독료",    icon: "📺" },
      { id: "leisure",   label: "여가/문화", icon: "🎬" },
      { id: "etc",       label: "기타",      icon: "🧺" },
    ];

    // 비교군 토글 옵션. id 는 서버 응답 scopes 의 키와 일치(all/job/level).
    const SCOPES = [
      { id: "all",   label: "전체" },
      { id: "job",   label: "같은 직군" },
      { id: "level", label: "같은 연차" },
    ];

    // ⚠️ Tailwind CDN(JIT)은 런타임에 조립한 클래스(`bg-${x}`)를 못 잡으므로,
    //    카테고리 색은 반드시 "완전한 클래스 문자열"을 정적으로 미리 적어 둔다.
    const CAT_COLORS = {
      food:      { bar: "bg-amber-500",   soft: "bg-amber-100",   text: "text-amber-700",   ring: "ring-amber-300",   hex: "#f59e0b" },
      housing:   { bar: "bg-indigo-500",  soft: "bg-indigo-100",  text: "text-indigo-700",  ring: "ring-indigo-300",  hex: "#6366f1" },
      transport: { bar: "bg-sky-500",     soft: "bg-sky-100",     text: "text-sky-700",     ring: "ring-sky-300",     hex: "#0ea5e9" },
      subscribe: { bar: "bg-fuchsia-500", soft: "bg-fuchsia-100", text: "text-fuchsia-700", ring: "ring-fuchsia-300", hex: "#d946ef" },
      leisure:   { bar: "bg-rose-500",    soft: "bg-rose-100",    text: "text-rose-700",    ring: "ring-rose-300",    hex: "#f43f5e" },
      etc:       { bar: "bg-slate-500",   soft: "bg-slate-100",   text: "text-slate-700",   ring: "ring-slate-300",   hex: "#64748b" },
    };

    // ========================================
    // 유틸: 숫자 포맷
    // 입력 단위는 "만원". 표시 시 천단위 콤마, 큰 값은 "억/만원"으로.
    // ========================================
    function fmtMan(man) {
      // man: 만원 단위 숫자 → "320만원" / "1억 200만원"
      const v = Math.round(man);
      if (v >= 10000) {
        const eok = Math.floor(v / 10000);
        const rest = v % 10000;
        return rest > 0
          ? `${eok}억 ${rest.toLocaleString("ko-KR")}만원`
          : `${eok}억원`;
      }
      return `${v.toLocaleString("ko-KR")}만원`;
    }
    function fmtM4Year(man) {
      // 연봉 환산 (월급×12) 을 만원 단위로.
      return fmtMan(man * 12);
    }
    function fmtPct(x, digits = 0) {
      return `${x.toFixed(digits)}%`;
    }

    // ========================================
    // 서버 응답 → 차트용 형태 변환 헬퍼
    //   평균·백분위·히스토그램·그룹평균은 모두 서버(SQL)가 계산해 내려준다.
    //   여기서는 렌더 컴포넌트가 기대하는 모양으로만 살짝 가공한다.
    // ========================================

    // 서버 hist([{binStart,binEnd,count}]) → Histogram 컴포넌트용
    //   { bins:[{from,to,count}], binSize, maxCount, min, max }.
    //   서버는 데이터가 있는 버킷만 주므로, 빈 버킷을 채워 연속 막대로 만든다.
    function normalizeHist(serverHist, binSize = 50) {
      if (!serverHist || !serverHist.length) {
        return { bins: [], binSize, maxCount: 0, min: 0, max: 0 };
      }
      const starts = serverHist.map((b) => b.binStart);
      const min = Math.min(...starts);
      const max = Math.max(...starts) + binSize;
      const byStart = Object.fromEntries(serverHist.map((b) => [b.binStart, b.count]));
      const binCount = Math.max(1, Math.round((max - min) / binSize));
      const bins = Array.from({ length: binCount }, (_, i) => {
        const from = min + i * binSize;
        return { from, to: from + binSize, count: byStart[from] || 0 };
      });
      const maxCount = Math.max(...bins.map((b) => b.count), 1);
      return { bins, binSize, maxCount, min, max };
    }

    // 서버 jobAvg/levelAvg([{id,avg,count}]) 에 화면용 label 을 병합.
    //   순서는 JOBS/LEVELS 정의 순서를 따른다(서버가 GROUP BY 로 순서 보장 안 함).
    function withLabels(serverItems, defs) {
      const byId = Object.fromEntries((serverItems || []).map((it) => [it.id, it]));
      return defs.map((d) => ({
        id: d.id,
        label: d.label,
        avg: byId[d.id]?.avg ?? 0,
        count: byId[d.id]?.count ?? 0,
      }));
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 표현, 비즈니스 로직 없음)
    // ========================================
    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm ring-1 ring-slate-200/70 ${className}`}>
          {children}
        </div>
      );
    }

    function SectionTitle({ icon, title, desc, right }) {
      return (
        <div className="flex items-start justify-between gap-3 mb-4">
          <div>
            <h3 className="text-base sm:text-lg font-bold text-slate-800 flex items-center gap-2">
              {icon && <span aria-hidden="true">{icon}</span>}
              {title}
            </h3>
            {desc && <p className="text-xs sm:text-sm text-slate-500 mt-0.5">{desc}</p>}
          </div>
          {right}
        </div>
      );
    }

    const BTN_VARIANTS = {
      primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm",
      secondary: "bg-white hover:bg-slate-50 text-slate-700 ring-1 ring-slate-300",
      ghost: "bg-transparent hover:bg-slate-100 text-slate-600",
      success: "bg-emerald-600 hover:bg-emerald-700 text-white shadow-sm",
    };
    const BTN_SIZES = { sm: "px-3 py-1.5 text-sm", md: "px-4 py-2.5 text-sm", lg: "px-6 py-3 text-base" };
    function Button({ children, variant = "primary", size = "md", className = "", ...rest }) {
      return (
        <button
          className={`inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition
            disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-400
            ${BTN_VARIANTS[variant]} ${BTN_SIZES[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // 로딩 스피너 (제출 중/집계 중 표시) — 외부 의존성 없이 SVG 회전.
    function Spinner({ className = "w-4 h-4" }) {
      return (
        <svg className={`animate-spin ${className}`} viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
          <path className="opacity-90" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z" />
        </svg>
      );
    }

    // ref 포워딩: 폼 자동포커스/스크롤 대비 (디자인시스템 입력은 forwardRef 로)
    const Input = forwardRef(function Input(
      { label, error, suffix, id, className = "", ...rest }, ref
    ) {
      const autoId = id || (label ? `in-${label}` : undefined);
      return (
        <div className={className}>
          {label && (
            <label htmlFor={autoId} className="block text-sm font-medium text-slate-700 mb-1.5">
              {label}
            </label>
          )}
          <div className="relative">
            <input
              id={autoId}
              ref={ref}
              aria-invalid={!!error}
              className={`w-full rounded-xl border px-3.5 py-2.5 text-slate-800 placeholder-slate-400
                bg-white transition focus:outline-none focus:ring-2
                ${suffix ? "pr-12" : ""}
                ${error
                  ? "border-rose-400 focus:ring-rose-300"
                  : "border-slate-300 focus:ring-indigo-300 focus:border-indigo-400"}`}
              {...rest}
            />
            {suffix && (
              <span className="absolute right-3.5 top-1/2 -translate-y-1/2 text-sm text-slate-400 pointer-events-none">
                {suffix}
              </span>
            )}
          </div>
          {error && <p className="text-xs text-rose-600 mt-1">{error}</p>}
        </div>
      );
    });

    function Select({ label, error, id, className = "", children, ...rest }) {
      const autoId = id || (label ? `sel-${label}` : undefined);
      return (
        <div className={className}>
          {label && (
            <label htmlFor={autoId} className="block text-sm font-medium text-slate-700 mb-1.5">
              {label}
            </label>
          )}
          <select
            id={autoId}
            className={`w-full rounded-xl border px-3.5 py-2.5 bg-white text-slate-800 transition
              focus:outline-none focus:ring-2
              ${error
                ? "border-rose-400 focus:ring-rose-300"
                : "border-slate-300 focus:ring-indigo-300 focus:border-indigo-400"}`}
            {...rest}
          >
            {children}
          </select>
          {error && <p className="text-xs text-rose-600 mt-1">{error}</p>}
        </div>
      );
    }

    function Badge({ children, tone = "slate", className = "" }) {
      const tones = {
        slate: "bg-slate-100 text-slate-700",
        indigo: "bg-indigo-100 text-indigo-700",
        emerald: "bg-emerald-100 text-emerald-700",
        amber: "bg-amber-100 text-amber-700",
        rose: "bg-rose-100 text-rose-700",
      };
      return (
        <span className={`inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-xs font-semibold ${tones[tone]} ${className}`}>
          {children}
        </span>
      );
    }

    function StatCard({ label, value, sub, tone = "indigo", className = "" }) {
      const tones = {
        indigo: "from-indigo-500 to-violet-500",
        emerald: "from-emerald-500 to-teal-500",
        amber: "from-amber-500 to-orange-500",
        rose: "from-rose-500 to-pink-500",
      };
      return (
        <div className={`rounded-2xl p-4 sm:p-5 text-white bg-gradient-to-br shadow-sm ${tones[tone]} ${className}`}>
          <div className="text-xs sm:text-sm font-medium text-white/80">{label}</div>
          <div className="mt-1 text-2xl sm:text-3xl font-extrabold tracking-tight">{value}</div>
          {sub && <div className="mt-1 text-xs sm:text-sm text-white/85">{sub}</div>}
        </div>
      );
    }

    // 비교군 토글 (세그먼트 컨트롤)
    function ScopeToggle({ value, onChange }) {
      return (
        <div className="inline-flex rounded-xl bg-slate-100 p-1" role="tablist" aria-label="비교군 선택">
          {SCOPES.map((s) => {
            const active = s.id === value;
            return (
              <button
                key={s.id}
                role="tab"
                aria-selected={active}
                onClick={() => onChange(s.id)}
                className={`px-3 sm:px-4 py-1.5 text-sm font-semibold rounded-lg transition
                  ${active ? "bg-white text-indigo-700 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}
              >
                {s.label}
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 📊 차트 컴포넌트 (순수 SVG / div 막대 — 외부 차트 라이브러리 불필요, 반응형)
    // ========================================

    // 월급 분포 히스토그램 + 내 위치 마커 + 평균선
    function Histogram({ hist, myValue, avgValue }) {
      const { bins, maxCount, min, max } = hist;
      if (!bins.length) return null;
      const W = 720, H = 240, padL = 8, padR = 8, padB = 34, padT = 16;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;
      const span = Math.max(1, max - min);
      const xOf = (val) => padL + ((val - min) / span) * innerW;
      const barW = innerW / bins.length;

      return (
        <div className="w-full overflow-hidden">
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" role="img"
               aria-label="월급 분포 히스토그램과 내 위치">
            {/* 막대 */}
            {bins.map((b, i) => {
              const h = (b.count / maxCount) * innerH;
              const x = padL + i * barW;
              const y = padT + (innerH - h);
              const inMyBin = myValue >= b.from && myValue < b.to;
              return (
                <rect
                  key={i}
                  x={x + 1} y={y} width={Math.max(1, barW - 2)} height={Math.max(0.5, h)}
                  rx="2"
                  fill={inMyBin ? "#4f46e5" : "#c7d2fe"}
                  opacity={inMyBin ? 1 : 0.85}
                />
              );
            })}

            {/* 평균선 (점선) */}
            <line x1={xOf(avgValue)} x2={xOf(avgValue)} y1={padT} y2={padT + innerH}
                  stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="4 4" />
            <text x={xOf(avgValue)} y={padT - 4} textAnchor="middle"
                  className="fill-slate-500" fontSize="11">
              평균 {Math.round(avgValue)}
            </text>

            {/* 내 위치 마커 (삼각형 + 선) */}
            <line x1={xOf(myValue)} x2={xOf(myValue)} y1={padT} y2={padT + innerH}
                  stroke="#10b981" strokeWidth="2" />
            <polygon
              points={`${xOf(myValue) - 6},${padT + innerH + 2} ${xOf(myValue) + 6},${padT + innerH + 2} ${xOf(myValue)},${padT + innerH - 6}`}
              fill="#10b981"
            />
            <text x={xOf(myValue)} y={padT + innerH + 24} textAnchor="middle"
                  className="fill-emerald-600 font-semibold" fontSize="12">
              나 {Math.round(myValue)}
            </text>

            {/* x축 눈금 (min/max) */}
            <text x={padL} y={H - 4} textAnchor="start" className="fill-slate-400" fontSize="10">{min}만</text>
            <text x={W - padR} y={H - 4} textAnchor="end" className="fill-slate-400" fontSize="10">{max}만</text>
          </svg>
          <div className="flex items-center justify-center gap-4 text-xs text-slate-500 mt-1">
            <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded-sm bg-indigo-200 inline-block"></span>표본 분포</span>
            <span className="inline-flex items-center gap-1"><span className="w-3 h-0.5 bg-slate-400 inline-block"></span>평균</span>
            <span className="inline-flex items-center gap-1"><span className="w-3 h-3 inline-block" style={{clipPath:"polygon(50% 0,100% 100%,0 100%)",background:"#10b981"}}></span>내 위치</span>
          </div>
        </div>
      );
    }

    // 가로 막대 비교 (직군별/연차별 평균 — 내 그룹 강조)
    function HBarChart({ items, myKey, unit = "만원" }) {
      const maxVal = Math.max(...items.map((it) => it.avg), 1);
      return (
        <div className="space-y-2.5">
          {items.map((it) => {
            const pct = (it.avg / maxVal) * 100;
            const mine = it.id === myKey;
            return (
              <div key={it.id} className="flex items-center gap-3">
                <div className={`w-24 sm:w-28 shrink-0 text-xs sm:text-sm text-right ${mine ? "font-bold text-indigo-700" : "text-slate-600"}`}>
                  {it.label}
                </div>
                <div className="flex-1 h-7 rounded-lg bg-slate-100 overflow-hidden relative">
                  <div
                    className={`h-full rounded-lg transition-all duration-700 ${mine ? "bg-gradient-to-r from-indigo-500 to-violet-500" : "bg-slate-300"}`}
                    style={{ width: `${Math.max(3, pct)}%` }}
                  />
                  <span className={`absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold ${pct > 70 ? "text-white" : "text-slate-600"}`}>
                    {Math.round(it.avg).toLocaleString("ko-KR")}{unit}
                  </span>
                </div>
                {mine && <Badge tone="indigo">나</Badge>}
              </div>
            );
          })}
        </div>
      );
    }

    // 평균 대비 나 — 게이지 (월급/총지출)
    function CompareGauge({ label, mine, avg, betterWhenHigh = true, unit = "만원" }) {
      const maxVal = Math.max(mine, avg, 1);
      const minePct = (mine / maxVal) * 100;
      const avgPct = (avg / maxVal) * 100;
      const diff = mine - avg;
      const ratio = avg > 0 ? (diff / avg) * 100 : 0;
      const good = betterWhenHigh ? diff >= 0 : diff <= 0;
      return (
        <div className="space-y-2">
          <div className="flex items-center justify-between text-sm">
            <span className="font-semibold text-slate-700">{label}</span>
            <span className={`text-xs font-semibold ${good ? "text-emerald-600" : "text-rose-600"}`}>
              평균 대비 {diff >= 0 ? "+" : ""}{Math.round(diff).toLocaleString("ko-KR")}{unit} ({ratio >= 0 ? "+" : ""}{ratio.toFixed(0)}%)
            </span>
          </div>
          {/* 나 */}
          <div className="flex items-center gap-2">
            <span className="w-8 text-xs text-slate-500">나</span>
            <div className="flex-1 h-6 rounded-lg bg-slate-100 overflow-hidden relative">
              <div className={`h-full rounded-lg ${good ? "bg-emerald-500" : "bg-rose-500"}`} style={{ width: `${Math.max(3, minePct)}%` }} />
              <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold text-slate-700">
                {Math.round(mine).toLocaleString("ko-KR")}{unit}
              </span>
            </div>
          </div>
          {/* 평균 */}
          <div className="flex items-center gap-2">
            <span className="w-8 text-xs text-slate-500">평균</span>
            <div className="flex-1 h-6 rounded-lg bg-slate-100 overflow-hidden relative">
              <div className="h-full rounded-lg bg-slate-400" style={{ width: `${Math.max(3, avgPct)}%` }} />
              <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-semibold text-slate-700">
                {Math.round(avg).toLocaleString("ko-KR")}{unit}
              </span>
            </div>
          </div>
        </div>
      );
    }

    // 카테고리별 지출: 전체 평균 vs 내 지출 (그룹 막대) + 초과 하이라이트
    function CategoryCompare({ catAvg, mySpend }) {
      const maxVal = Math.max(
        ...CATEGORIES.map((c) => Math.max(catAvg[c.id] || 0, mySpend[c.id] || 0)),
        1
      );
      return (
        <div className="space-y-4">
          {CATEGORIES.map((c) => {
            const avg = catAvg[c.id] || 0;
            const mine = mySpend[c.id] || 0;
            const over = mine > avg * 1.1; // 평균보다 10% 넘게 쓰면 과지출 강조
            const color = CAT_COLORS[c.id];
            return (
              <div key={c.id} className={`rounded-xl p-3 transition ${over ? `ring-2 ${color.ring} ${color.soft}` : "bg-slate-50/60 ring-1 ring-slate-100"}`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                    <span aria-hidden="true">{c.icon}</span>{c.label}
                  </span>
                  {over && <Badge tone="rose">평균보다 많이 써요</Badge>}
                </div>
                {/* 내 지출 */}
                <div className="flex items-center gap-2 mb-1.5">
                  <span className="w-10 text-xs text-slate-500">나</span>
                  <div className="flex-1 h-5 rounded-md bg-slate-100 overflow-hidden relative">
                    <div className={`h-full rounded-md ${color.bar}`} style={{ width: `${Math.max(2, (mine / maxVal) * 100)}%` }} />
                  </div>
                  <span className="w-16 text-right text-xs font-semibold text-slate-700">{mine.toLocaleString("ko-KR")}만</span>
                </div>
                {/* 평균 */}
                <div className="flex items-center gap-2">
                  <span className="w-10 text-xs text-slate-400">평균</span>
                  <div className="flex-1 h-5 rounded-md bg-slate-100 overflow-hidden relative">
                    <div className="h-full rounded-md bg-slate-300" style={{ width: `${Math.max(2, (avg / maxVal) * 100)}%` }} />
                  </div>
                  <span className="w-16 text-right text-xs font-semibold text-slate-500">{Math.round(avg).toLocaleString("ko-KR")}만</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🧩 레이아웃 / 공통
    // ========================================
    function Header() {
      return (
        <header className="text-center mb-6 sm:mb-8">
          <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/70 ring-1 ring-slate-200 text-xs font-semibold text-slate-600 mb-3">
            <span aria-hidden="true">🔒</span> 100% 익명 · 개인정보 없이 표본으로 비교
          </div>
          <h1 className="text-2xl sm:text-4xl font-extrabold tracking-tight text-slate-800">
            익명 연봉·지출 비교 <span aria-hidden="true">💸</span>
          </h1>
          <p className="mt-2 text-sm sm:text-base text-slate-500 max-w-xl mx-auto">
            내 월급과 지출을 입력하면 또래 표본과 비교해 <b className="text-indigo-600">상위 몇 %</b>인지,
            카테고리별로 어디에 많이 쓰는지 보여줍니다.
          </p>
        </header>
      );
    }

    function Footer({ sampleN }) {
      return (
        <footer className="mt-10 text-center text-xs text-slate-400 leading-relaxed">
          <p>
            ⚠️ 비교 기준은 <b>익명 제출 표본{sampleN ? ` ${sampleN.toLocaleString("ko-KR")}명` : ""}</b>입니다.
            (초기 시드 데이터 + 실제 제출이 함께 쌓입니다.) 실제 통계가 아니며 참고용이에요.
          </p>
          <p className="mt-1">
            이름·이메일 등 개인정보는 저장하지 않고, 월급·지출·직군·연차만 익명으로 집계합니다.
            평균·분포·백분위는 서버(Postgres)가 계산합니다.
          </p>
        </footer>
      );
    }

    // ========================================
    // 📄 입력 폼 페이지
    // ========================================
    const EMPTY_SPEND = Object.fromEntries(CATEGORIES.map((c) => [c.id, ""]));

    function InputForm({ onSubmit, initial, submitting = false }) {
      const [salary, setSalary] = useState(initial?.salaryRaw ?? "");
      const [job, setJob] = useState(initial?.job ?? JOBS[0].id);
      const [level, setLevel] = useState(initial?.level ?? LEVELS[0].id);
      const [spend, setSpend] = useState(initial?.spendRaw ?? EMPTY_SPEND);
      const [errors, setErrors] = useState({});

      const salaryRef = useRef(null);
      useEffect(() => { salaryRef.current && salaryRef.current.focus(); }, []);

      // 총 지출 = 카테고리 합 (입력 안 한 칸은 0 취급)
      const totalSpend = useMemo(
        () => CATEGORIES.reduce((s, c) => s + (parseFloat(spend[c.id]) || 0), 0),
        [spend]
      );

      const onlyNumber = (v) => v.replace(/[^0-9.]/g, "");

      function validate() {
        const e = {};
        const sal = parseFloat(salary);
        if (salary === "" || isNaN(sal)) e.salary = "월급을 숫자로 입력해 주세요.";
        else if (sal <= 0) e.salary = "0보다 큰 값을 입력해 주세요.";
        else if (sal > 5000) e.salary = "월급이 너무 큽니다. 만원 단위가 맞나요? (예: 350)";

        CATEGORIES.forEach((c) => {
          const raw = spend[c.id];
          if (raw === "") return; // 빈 칸은 0 허용
          const v = parseFloat(raw);
          if (isNaN(v) || v < 0) e[c.id] = "0 이상 숫자";
          else if (v > 5000) e[c.id] = "값이 너무 큼";
        });

        if (!e.salary && totalSpend > sal * 3) {
          e.total = "총지출이 월급의 3배를 넘습니다. 단위를 다시 확인해 주세요.";
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      }

      function handleSubmit(ev) {
        ev.preventDefault();
        if (!validate()) {
          // 첫 에러 필드로 스크롤/포커스 (월급 우선)
          if (salaryRef.current && (errorsHasSalary())) salaryRef.current.focus();
          return;
        }
        const sal = parseFloat(salary);
        const numericSpend = Object.fromEntries(
          CATEGORIES.map((c) => [c.id, Math.round(parseFloat(spend[c.id]) || 0)])
        );
        onSubmit({
          salary: Math.round(sal),
          salaryRaw: salary,
          job,
          level,
          spend: numericSpend,
          spendRaw: spend,
          totalSpend: Math.round(totalSpend),
        });
      }
      function errorsHasSalary() { return !!errors.salary; }

      const savingRate = useMemo(() => {
        const sal = parseFloat(salary);
        if (!sal || sal <= 0) return null;
        return ((sal - totalSpend) / sal) * 100;
      }, [salary, totalSpend]);

      return (
        <form onSubmit={handleSubmit} className="animate-fade-in-up" noValidate>
          <Card className="p-5 sm:p-7 max-w-2xl mx-auto">
            <div className="flex items-start gap-3 p-3 rounded-xl bg-emerald-50 ring-1 ring-emerald-100 mb-6">
              <span className="text-xl" aria-hidden="true">🛡️</span>
              <p className="text-sm text-emerald-800">
                <b>익명으로 제출됩니다.</b> 이름·이메일 같은 개인정보는 저장하지 않으며,
                월급·지출·직군·연차만 <b>익명 표본</b>으로 더해져 전체 평균·분포 계산에 쓰입니다.
              </p>
            </div>

            <SectionTitle icon="🧑‍💼" title="나의 기본 정보" desc="월급은 세후 실수령 기준, 만원 단위로 입력해 주세요." />
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
              <Input
                ref={salaryRef}
                label="월급 (만원)"
                inputMode="decimal"
                placeholder="예: 350"
                suffix="만원"
                value={salary}
                onChange={(e) => setSalary(onlyNumber(e.target.value))}
                error={errors.salary}
                className="sm:col-span-1"
              />
              <Select label="직군" value={job} onChange={(e) => setJob(e.target.value)}>
                {JOBS.map((j) => <option key={j.id} value={j.id}>{j.label}</option>)}
              </Select>
              <Select label="연차" value={level} onChange={(e) => setLevel(e.target.value)}>
                {LEVELS.map((l) => <option key={l.id} value={l.id}>{l.label}</option>)}
              </Select>
            </div>

            <SectionTitle icon="🧾" title="월 지출 (카테고리별)" desc="만원 단위. 비워두면 0으로 계산돼요." />
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-2">
              {CATEGORIES.map((c) => (
                <Input
                  key={c.id}
                  label={`${c.icon} ${c.label}`}
                  inputMode="decimal"
                  placeholder="0"
                  suffix="만원"
                  value={spend[c.id]}
                  onChange={(e) => setSpend((s) => ({ ...s, [c.id]: onlyNumber(e.target.value) }))}
                  error={errors[c.id]}
                />
              ))}
            </div>
            {errors.total && <p className="text-xs text-rose-600 mb-2">{errors.total}</p>}

            {/* 총지출 / 저축률 미리보기 */}
            <div className="flex flex-wrap items-center justify-between gap-3 mt-4 p-4 rounded-xl bg-slate-50 ring-1 ring-slate-100">
              <div className="text-sm text-slate-600">
                총 월 지출 <span className="text-lg font-bold text-slate-800 ml-1">{totalSpend.toLocaleString("ko-KR")}만원</span>
              </div>
              {savingRate !== null && (
                <Badge tone={savingRate >= 0 ? "emerald" : "rose"}>
                  예상 저축률 {savingRate.toFixed(0)}%
                </Badge>
              )}
            </div>

            <div className="mt-6 flex justify-end">
              <Button type="submit" size="lg" disabled={submitting}>
                {submitting
                  ? <><Spinner /> 집계 중…</>
                  : <>결과 보기 <span aria-hidden="true">→</span></>}
              </Button>
            </div>
          </Card>
        </form>
      );
    }

    // ========================================
    // 📄 결과 대시보드 페이지
    // ========================================
    function Dashboard({ me, result, onEdit }) {
      const [scope, setScope] = useState("all");

      // 통계는 서버가 scope별로 미리 계산해 내려준 result.scopes 에서 즉시 읽는다.
      //   (scope 토글 시 추가 네트워크 요청 없이 객체만 바꿔 읽음 — 1회 왕복으로 끝.)
      //   hist 만 차트 컴포넌트용 형태로 변환한다.
      const rawStats = result.scopes[scope] || result.scopes.all;
      const stats = useMemo(
        () => ({ ...rawStats, hist: normalizeHist(rawStats.hist, 50) }),
        [rawStats]
      );

      // 직군별/연차별 평균은 서버가 전체 표본 기준으로 계산. 화면용 label 만 병합.
      const jobAvg = useMemo(() => withLabels(result.jobAvg, JOBS), [result.jobAvg]);
      const levelAvg = useMemo(() => withLabels(result.levelAvg, LEVELS), [result.levelAvg]);

      const savingRate = me.salary > 0 ? ((me.salary - me.totalSpend) / me.salary) * 100 : 0;
      const jobLabel = JOBS.find((j) => j.id === me.job)?.label ?? "";
      const levelLabel = LEVELS.find((l) => l.id === me.level)?.label ?? "";
      const scopeLabel = SCOPES.find((s) => s.id === scope)?.label ?? "전체";

      // 과지출 카테고리 목록 (인사이트 문구용) — 현재 scope 의 카테고리 평균과 비교
      const overCats = useMemo(
        () => CATEGORIES.filter((c) => (me.spend[c.id] || 0) > (stats.catAvg[c.id] || 0) * 1.1),
        [stats, me]
      );

      // 표본 평균 저축률(대략): 현재 scope 의 평균월급·평균총지출로부터 추정.
      const avgSaving = stats.salaryAvg > 0
        ? ((stats.salaryAvg - stats.totalAvg) / stats.salaryAvg) * 100
        : 0;

      return (
        <div className="animate-fade-in-up space-y-6">
          {/* 상단 바: 비교군 토글 + 다시 입력 */}
          <Card className="p-4 sm:p-5">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div className="flex items-center gap-2 text-sm text-slate-600">
                <Badge tone="indigo">{jobLabel}</Badge>
                <Badge tone="slate">{levelLabel}</Badge>
                <span className="hidden sm:inline text-slate-400">비교 기준</span>
              </div>
              <div className="flex items-center gap-3">
                <ScopeToggle value={scope} onChange={setScope} />
                <Button variant="secondary" size="sm" onClick={onEdit}>✏️ 다시 입력</Button>
              </div>
            </div>
            <p className="text-xs text-slate-400 mt-2">
              현재 <b>{scopeLabel}</b> 표본 <b>{stats.n.toLocaleString("ko-KR")}명</b>과 비교 중
            </p>
          </Card>

          {/* 1. 내 위치 요약 카드 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard
              tone="indigo"
              label={`${scopeLabel} 기준 내 월급 위치`}
              value={`상위 ${stats.top.toFixed(1)}%`}
              sub={`${fmtMan(me.salary)} · 연 ${fmtMan(me.salary * 12)}`}
            />
            <StatCard
              tone={savingRate >= 0 ? "emerald" : "rose"}
              label="내 저축률"
              value={`${savingRate.toFixed(0)}%`}
              sub={`표본 평균 ${avgSaving.toFixed(0)}% · 월 ${(me.salary - me.totalSpend).toLocaleString("ko-KR")}만원`}
            />
            <StatCard
              tone="amber"
              label="총 월 지출"
              value={`${me.totalSpend.toLocaleString("ko-KR")}만`}
              sub={`평균 ${Math.round(stats.totalAvg).toLocaleString("ko-KR")}만원`}
            />
            <StatCard
              tone="rose"
              label="과지출 카테고리"
              value={overCats.length > 0 ? `${overCats.length}개` : "없음 👍"}
              sub={overCats.length > 0 ? overCats.map((c) => c.label).join(", ") : "평균 이하로 잘 쓰고 있어요"}
            />
          </div>

          {/* 2. 월급 분포 히스토그램 */}
          <Card className="p-5 sm:p-6">
            <SectionTitle
              icon="📈"
              title="월급 분포 속 내 위치"
              desc={`${scopeLabel} 표본의 월급 분포. 초록 마커가 나, 점선이 평균이에요.`}
            />
            <Histogram hist={stats.hist} myValue={me.salary} avgValue={stats.salaryAvg} />
          </Card>

          {/* 3. 평균 대비 나 (게이지) */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card className="p-5 sm:p-6">
              <SectionTitle icon="⚖️" title="평균 대비 나" desc={`${scopeLabel} 표본 평균과 비교했어요.`} />
              <div className="space-y-5">
                <CompareGauge label="월급" mine={me.salary} avg={stats.salaryAvg} betterWhenHigh={true} />
                <CompareGauge label="총 월 지출" mine={me.totalSpend} avg={stats.totalAvg} betterWhenHigh={false} />
              </div>
            </Card>

            {/* 5. 카테고리별 지출 비교 */}
            <Card className="p-5 sm:p-6">
              <SectionTitle icon="🧾" title="카테고리별 지출 비교" desc="전체 평균보다 10% 넘게 쓰면 강조돼요." />
              <CategoryCompare catAvg={stats.catAvg} mySpend={me.spend} />
            </Card>
          </div>

          {/* 4. 직군별 / 연차별 평균 비교 */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card className="p-5 sm:p-6">
              <SectionTitle icon="🏢" title="직군별 평균 월급" desc="내가 속한 직군을 강조했어요. (전체 표본 기준)" />
              <HBarChart items={jobAvg} myKey={me.job} />
            </Card>
            <Card className="p-5 sm:p-6">
              <SectionTitle icon="📅" title="연차별 평균 월급" desc="내가 속한 연차 구간을 강조했어요. (전체 표본 기준)" />
              <HBarChart items={levelAvg} myKey={me.level} />
            </Card>
          </div>

          {/* 인사이트 문구 */}
          <Card className="p-5 sm:p-6 bg-gradient-to-br from-slate-50 to-indigo-50/50">
            <SectionTitle icon="💡" title="한 줄 인사이트" />
            <ul className="space-y-1.5 text-sm text-slate-700 list-disc list-inside">
              <li>
                {scopeLabel} 기준 당신의 월급은 <b className="text-indigo-700">상위 {stats.top.toFixed(1)}%</b>입니다.
                {stats.top <= 30 ? " 또래 중 상위권이에요! 🎉" : stats.top >= 70 ? " 아직 성장 여지가 많아요. 💪" : " 딱 중간 즈음이네요."}
              </li>
              <li>
                저축률은 <b className={savingRate >= avgSaving ? "text-emerald-700" : "text-rose-700"}>{savingRate.toFixed(0)}%</b>로,
                표본 평균({avgSaving.toFixed(0)}%)보다 {savingRate >= avgSaving ? "높아요. 잘하고 있어요! 👍" : "낮아요. 지출을 점검해 보세요."}
              </li>
              <li>
                {overCats.length > 0
                  ? <>특히 <b className="text-rose-700">{overCats.map((c) => c.label).join(", ")}</b>에서 평균보다 많이 쓰고 있어요.</>
                  : <>모든 카테고리에서 평균 이하로 알뜰하게 쓰고 있어요. 👏</>}
              </li>
            </ul>
          </Card>

          <div className="flex justify-center pt-2">
            <Button variant="secondary" size="md" onClick={onEdit}>✏️ 값 수정해서 다시 비교하기</Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App (루트)
    //   흐름: [폼 입력] → POST /api/submissions → 서버가 INSERT + scope별 통계 계산
    //         → result(scopes/jobAvg/levelAvg) 응답 → 대시보드 렌더.
    //   me     : 화면 표시용 내 입력값(salary/job/level/spend/totalSpend) — 프리필에도 사용
    //   result : 서버 응답(통계 묶음). me + result 가 모두 있으면 대시보드.
    // ========================================
    function App() {
      const [me, setMe] = useState(null);          // 폼 프리필 + 표시용 내 값
      const [result, setResult] = useState(null);  // 서버가 돌려준 통계 묶음
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState("");
      const [editing, setEditing] = useState(false);
      const [backendMissing, setBackendMissing] = useState(false); // 정적 서버로 열어 /api 가 없는 경우 true

      // 폼 제출 → 서버에 POST → 통계 받아 대시보드로 전환
      async function handleSubmit(data) {
        setSubmitting(true);
        setError("");
        try {
          // API_BASE_URL 은 origin + "/api" 이므로 여기서 /api 를 다시 붙이지 않는다.
          const res = await fetch(`${API_BASE_URL}/submissions`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              salary: data.salary,
              job: data.job,
              level: data.level,
              spend: data.spend,
            }),
          });
          if (!res.ok) {
            // 서버가 보낸 친절한 메시지를 우선 사용, 없으면 상태코드로 안내
            let msg = `요청에 실패했습니다. (HTTP ${res.status})`;
            try {
              const body = await res.json();
              if (body && body.error) msg = body.error;
            } catch (_) {}
            // 404 = /api 백엔드가 없는 정적 서버(Live Server·npx serve)로 페이지를 연 경우가 대부분
            if (res.status === 404) {
              msg = "백엔드 API(/api)를 찾을 수 없습니다. 이 페이지를 Live Server 나 npx serve 같은 정적 서버가 아니라, npm start 로 띄운 server.js 주소(예: http://localhost:3006)로 열어야 제출이 됩니다.";
            }
            throw new Error(msg);
          }
          const bundle = await res.json();
          setMe(data);        // 표시/프리필용 내 값 저장
          setResult(bundle);  // 서버 통계 저장 → 대시보드 렌더
          setEditing(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (err) {
          // file:// 로 직접 연 경우 origin 이 깨져 fetch 가 TypeError 로 실패한다 → 원인을 콕 집어 안내.
          // 그 외 네트워크 실패도 TypeError, 서버가 보낸 400/500 메시지는 err.message 로 그대로 표시.
          const isFile = window.location.protocol === "file:";
          setError(
            isFile
              ? "파일을 직접 연 상태(file://)예요. 터미널에서 npm start 실행 후, 브라우저 주소창에 http://localhost:3006 을 입력해 접속해야 제출이 됩니다."
              : err instanceof TypeError
              ? "서버에 연결하지 못했습니다. 서버 실행(npm start)과 주소(http://localhost:3006)를 확인하고 다시 시도해 주세요."
              : err.message
          );
        } finally {
          setSubmitting(false);
        }
      }

      // 결과 화면에서 "다시 입력" → me(프리필) 유지한 채 폼으로
      function handleEdit() {
        setEditing(true);
        setError("");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      const showDashboard = me && result && !editing;
      // 페이지를 어떻게 열었는지 점검해 제출 전에 미리 안내한다.
      //   - file:// : 파일 직접 열기 → /api 상대요청 자체가 불가능
      //   - 정적 서버(Live Server·npx serve) : 화면은 뜨지만 /api 백엔드가 없어 제출이 404
      const isFileProtocol = window.location.protocol === "file:";
      useEffect(() => {
        if (isFileProtocol) return; // file:// 은 아래에서 별도 배너로 안내
        let alive = true;
        fetch(`${API_BASE_URL}/health`)
          .then((r) => { if (alive && !r.ok) setBackendMissing(true); })
          .catch(() => { if (alive) setBackendMissing(true); });
        return () => { alive = false; };
      }, []);

      return (
        <div className="min-h-screen px-4 py-8 sm:py-12">
          <div className="max-w-5xl mx-auto">
            <Header />

            {(isFileProtocol || backendMissing) && (
              <div className="max-w-2xl mx-auto mb-4 flex items-start gap-3 p-4 rounded-xl bg-amber-50 ring-1 ring-amber-200 text-sm text-amber-900" role="alert">
                <span className="text-lg" aria-hidden="true">🚧</span>
                <div>
                  <b>백엔드 서버를 통해 열어주세요.</b>
                  {isFileProtocol ? (
                    <p className="mt-0.5">
                      지금 파일을 직접 연 상태(<code className="px-1 rounded bg-amber-100">file://</code>)라 제출이 동작하지 않아요.
                      터미널에서 <code className="px-1 rounded bg-amber-100">npm start</code> 실행 후,
                      주소창에 <b>http://localhost:3006</b> 을 입력해 접속하세요.
                    </p>
                  ) : (
                    <p className="mt-0.5">
                      이 페이지가 정적 서버(VS Code <b>Live Server</b> 나 <code className="px-1 rounded bg-amber-100">npx serve</code> 등)로 열려서{" "}
                      <code className="px-1 rounded bg-amber-100">/api</code> 백엔드에 연결되지 않았어요. 이대로 제출하면 “API를 찾을 수 없음” 에러가 납니다.
                      터미널에서 <code className="px-1 rounded bg-amber-100">npm start</code> 로 <b>server.js</b> 를 띄운 뒤, 표시되는 주소(예: <b>http://localhost:3006</b>)로 접속하세요.
                    </p>
                  )}
                </div>
              </div>
            )}

            {error && (
              <div className="max-w-2xl mx-auto mb-4 flex items-start gap-3 p-4 rounded-xl bg-rose-50 ring-1 ring-rose-200 text-sm text-rose-800 animate-fade-in-up" role="alert">
                <span className="text-lg" aria-hidden="true">⚠️</span>
                <div>
                  <b>제출에 실패했어요.</b>
                  <p className="mt-0.5">{error}</p>
                </div>
              </div>
            )}

            {showDashboard ? (
              <Dashboard me={me} result={result} onEdit={handleEdit} />
            ) : (
              <InputForm
                onSubmit={handleSubmit}
                initial={me}        /* 재입력 시 직전 값 프리필 */
                submitting={submitting}
              />
            )}

            <Footer sampleN={result?.scopes?.all?.n} />
          </div>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
