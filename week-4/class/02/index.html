<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 관리</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 + ReactDOM + Babel (CDN, 빌드 도구 없이 JSX 사용) -->
  <!-- 주의: 버전을 고정(pin)한다. @babel/standalone을 버전 없이 쓰면 unpkg가 최신(8.x)을
       내려주는데, 8.x는 브라우저용 text/babel 자동 실행이 깨져 화면이 안 뜬다. 7.x로 고정. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React 훅 가져오기
    // ========================================
    const { useState, useEffect, useMemo, useRef } = React;

    // localStorage에 데이터를 저장할 때 사용할 키 이름
    const STORAGE_KEY = "todo-app:todos";

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (재사용 UI 조각, 비즈니스 로직 없음)
    // ========================================

    // 버튼 색상은 Tailwind JIT가 정적으로 스캔할 수 있도록
    // 완전한 클래스 문자열을 미리 적어 둔다. (런타임 조립 X)
    const BUTTON_VARIANTS = {
      primary: "bg-indigo-600 hover:bg-indigo-700 text-white",
      secondary: "bg-white hover:bg-slate-50 text-slate-700 border border-slate-300",
      danger: "bg-white hover:bg-red-50 text-red-600 border border-red-200",
      ghost: "bg-transparent hover:bg-slate-100 text-slate-600",
    };

    const BUTTON_SIZES = {
      sm: "px-3 py-1.5 text-sm",
      md: "px-4 py-2 text-sm",
      lg: "px-5 py-2.5 text-base",
    };

    function Button({ variant = "primary", size = "md", className = "", children, ...rest }) {
      return (
        <button
          className={`inline-flex items-center justify-center rounded-lg font-medium transition-colors
            disabled:opacity-50 disabled:cursor-not-allowed
            focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1
            ${BUTTON_VARIANTS[variant]} ${BUTTON_SIZES[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // 자동 포커스를 위해 내부 input에 ref를 연결할 수 있도록 forwardRef로 정의한다.
    const Input = React.forwardRef(function Input(
      { className = "", ...rest },
      ref
    ) {
      return (
        <input
          ref={ref}
          className={`w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-800
            placeholder:text-slate-400
            focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
            ${className}`}
          {...rest}
        />
      );
    });

    function Card({ className = "", children }) {
      return (
        <div className={`rounded-2xl bg-white shadow-sm ring-1 ring-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧩 하위 컴포넌트 (목록의 한 항목)
    // ========================================
    function TodoItem({ todo, onToggle, onDelete }) {
      return (
        <li className="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 transition-colors">
          {/* 체크박스: 완료 토글 */}
          <input
            type="checkbox"
            checked={todo.done}
            onChange={() => onToggle(todo.id)}
            className="h-5 w-5 shrink-0 cursor-pointer rounded border-slate-300 text-indigo-600 focus:ring-indigo-400"
            aria-label={`${todo.text} 완료 여부`}
          />

          {/* 할 일 텍스트: 완료되면 취소선 + 흐리게 */}
          <span
            onClick={() => onToggle(todo.id)}
            className={`flex-1 cursor-pointer break-all select-none ${
              todo.done ? "line-through text-slate-400" : "text-slate-800"
            }`}
          >
            {todo.text}
          </span>

          {/* 삭제 버튼 */}
          <Button
            variant="danger"
            size="sm"
            onClick={() => onDelete(todo.id)}
            aria-label="삭제"
          >
            삭제
          </Button>
        </li>
      );
    }

    // ========================================
    // 📄 메인 페이지 컴포넌트 (상태와 비즈니스 로직)
    // ========================================
    function TodoApp() {
      // 초기값을 localStorage에서 한 번만 읽어 온다. (lazy initializer)
      const [todos, setTodos] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          // 저장된 데이터가 깨졌을 때를 대비한 안전 처리
          console.error("저장된 할 일을 불러오지 못했습니다.", e);
          return [];
        }
      });

      const [text, setText] = useState("");        // 입력창 값
      const [filter, setFilter] = useState("all");  // all | active | done
      const inputRef = useRef(null);

      // todos가 바뀔 때마다 localStorage에 자동 저장한다.
      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      }, [todos]);

      // 첫 렌더 시 입력창에 자동 포커스
      useEffect(() => {
        inputRef.current?.focus();
      }, []);

      // 할 일 추가 (빈 입력 방지)
      function addTodo() {
        const trimmed = text.trim();
        if (!trimmed) return; // 공백만 입력하면 추가하지 않음

        const newTodo = {
          id: Date.now(),     // 간단한 고유 id로 현재 시각 사용
          text: trimmed,
          done: false,
        };
        setTodos((prev) => [newTodo, ...prev]); // 최신 항목을 위로
        setText("");
        inputRef.current?.focus();
      }

      // Enter 키로도 추가 가능
      function handleKeyDown(e) {
        if (e.key === "Enter") addTodo();
      }

      // 완료 토글
      function toggleTodo(id) {
        setTodos((prev) =>
          prev.map((t) => (t.id === id ? { ...t, done: !t.done } : t))
        );
      }

      // 삭제
      function deleteTodo(id) {
        setTodos((prev) => prev.filter((t) => t.id !== id));
      }

      // 완료된 항목 모두 비우기
      function clearCompleted() {
        setTodos((prev) => prev.filter((t) => !t.done));
      }

      // 남은(진행중) 할 일 개수
      const remainingCount = useMemo(
        () => todos.filter((t) => !t.done).length,
        [todos]
      );

      // 현재 필터에 맞는 목록만 추려서 보여 준다.
      const visibleTodos = useMemo(() => {
        if (filter === "active") return todos.filter((t) => !t.done);
        if (filter === "done") return todos.filter((t) => t.done);
        return todos;
      }, [todos, filter]);

      // 필터 버튼 정의
      const filters = [
        { key: "all", label: "전체" },
        { key: "active", label: "진행중" },
        { key: "done", label: "완료" },
      ];

      return (
        <div className="min-h-screen px-4 py-10 sm:py-16">
          <div className="mx-auto w-full max-w-xl">
            {/* 헤더 */}
            <header className="mb-6 text-center">
              <h1 className="text-3xl font-bold text-slate-800">📝 할 일 관리</h1>
              <p className="mt-2 text-sm text-slate-500">
                남은 할 일 <span className="font-semibold text-indigo-600">{remainingCount}</span>개
              </p>
            </header>

            <Card className="p-5">
              {/* 입력 영역 */}
              <div className="flex gap-2">
                <Input
                  ref={inputRef}
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="할 일을 입력하세요"
                  aria-label="할 일 입력"
                />
                <Button onClick={addTodo} className="shrink-0">
                  추가
                </Button>
              </div>

              {/* 필터 버튼 */}
              <div className="mt-4 flex gap-2">
                {filters.map((f) => (
                  <Button
                    key={f.key}
                    variant={filter === f.key ? "primary" : "secondary"}
                    size="sm"
                    onClick={() => setFilter(f.key)}
                  >
                    {f.label}
                  </Button>
                ))}
                {/* 완료된 항목이 있을 때만 '완료 비우기' 노출 */}
                {todos.some((t) => t.done) && (
                  <Button
                    variant="ghost"
                    size="sm"
                    onClick={clearCompleted}
                    className="ml-auto"
                  >
                    완료 비우기
                  </Button>
                )}
              </div>

              {/* 목록 영역 */}
              <div className="mt-4">
                {visibleTodos.length === 0 ? (
                  // 빈 상태 처리
                  <p className="py-10 text-center text-sm text-slate-400">
                    {todos.length === 0
                      ? "아직 할 일이 없어요. 위에서 추가해 보세요!"
                      : "이 필터에 해당하는 할 일이 없어요."}
                  </p>
                ) : (
                  <ul className="divide-y divide-slate-100 overflow-hidden rounded-xl border border-slate-100">
                    {visibleTodos.map((todo) => (
                      <TodoItem
                        key={todo.id}
                        todo={todo}
                        onToggle={toggleTodo}
                        onDelete={deleteTodo}
                      />
                    ))}
                  </ul>
                )}
              </div>
            </Card>

            <footer className="mt-6 text-center text-xs text-slate-400">
              변경 사항은 자동으로 저장됩니다 (localStorage)
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App (루트 컴포넌트)
    // ========================================
    function App() {
      return <TodoApp />;
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
