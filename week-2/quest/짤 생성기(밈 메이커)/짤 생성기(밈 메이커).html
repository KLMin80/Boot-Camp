<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기 (밈 메이커)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <!-- GIF 인코딩 (움직이는 짤 내보내기용) -->
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <style>
    /* 드래그 중 텍스트 선택 방지 */
    .no-select { -webkit-user-select: none; user-select: none; }
    /* 캔버스 위에서 커서 표시 */
    .canvas-grab { cursor: grab; }
    .canvas-grabbing { cursor: grabbing; }
    /* 드롭존 점멸 애니메이션 */
    @keyframes pulse-border {
      0%, 100% { border-color: rgb(99 102 241 / 0.4); }
      50% { border-color: rgb(99 102 241 / 0.9); }
    }
    .drop-active { animation: pulse-border 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = "primary", size = "md", disabled = false, onClick, className = "", children, ...props }) {
      const base = "inline-flex items-center justify-center gap-2 font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-400",
        secondary: "bg-slate-200 hover:bg-slate-300 text-slate-800 focus:ring-slate-400",
        danger: "bg-rose-600 hover:bg-rose-700 text-white focus:ring-rose-400",
        ghost: "bg-transparent hover:bg-slate-100 text-slate-700 focus:ring-slate-300",
      };
      const sizes = {
        sm: "text-xs px-2.5 py-1.5",
        md: "text-sm px-4 py-2",
        lg: "text-base px-5 py-2.5",
      };
      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Card({ className = "", children }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, value, onChange, placeholder = "", type = "text", disabled = false, className = "" }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-sm font-medium text-slate-700 mb-1">{label}</span>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 disabled:bg-slate-100"
          />
        </label>
      );
    }

    function Slider({ label, value, onChange, min = 0, max = 100, step = 1, suffix = "", className = "" }) {
      return (
        <label className={`block ${className}`}>
          {label && (
            <span className="flex items-center justify-between text-sm font-medium text-slate-700 mb-1">
              <span>{label}</span>
              <span className="text-indigo-600 tabular-nums">{value}{suffix}</span>
            </span>
          )}
          <input
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={(e) => onChange(Number(e.target.value))}
            className="w-full accent-indigo-600 cursor-pointer"
          />
        </label>
      );
    }

    function ColorPicker({ label, value, onChange, className = "" }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-sm font-medium text-slate-700 mb-1">{label}</span>}
          <div className="flex items-center gap-2">
            <input
              type="color"
              value={value}
              onChange={(e) => onChange(e.target.value)}
              className="h-9 w-12 rounded-md border border-slate-300 cursor-pointer bg-white p-0.5"
              aria-label={label}
            />
            <span className="text-xs font-mono text-slate-500 uppercase">{value}</span>
          </div>
        </label>
      );
    }

    function Toggle({ label, checked, onChange, className = "" }) {
      return (
        <label className={`flex items-center justify-between cursor-pointer ${className}`}>
          <span className="text-sm font-medium text-slate-700">{label}</span>
          <span className="relative inline-block w-11 h-6">
            <input
              type="checkbox"
              checked={checked}
              onChange={(e) => onChange(e.target.checked)}
              className="sr-only peer"
            />
            <span className="absolute inset-0 rounded-full bg-slate-300 peer-checked:bg-indigo-600 transition-colors"></span>
            <span className="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5"></span>
          </span>
        </label>
      );
    }

    // ========================================
    // 🧩 상수 / 샘플 템플릿 / 효과
    // ========================================

    const FONT_STACK = 'Impact, "Arial Black", "Anton", sans-serif';
    const GIF_WORKER_URL = "https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js";

    // 사용 가능한 효과 목록
    const EFFECTS = [
      { id: "none", name: "없음", emoji: "⬜", animated: false, desc: "정지 이미지" },
      { id: "shake", name: "떨림", emoji: "📳", animated: true, desc: "이미지가 부르르 떨려요" },
      { id: "split", name: "반으로 갈라짐", emoji: "✂️", animated: true, desc: "가운데가 갈라졌다 붙어요" },
      { id: "fade", name: "페이드 인&아웃", emoji: "🌗", animated: true, desc: "서서히 나타났다 사라져요" },
    ];

    function defaultEffect() {
      return { type: "none", intensity: 50, speed: 1, bg: "#000000" };
    }

    // SVG data-URI 기반 샘플 템플릿 (CORS 걱정 없이 항상 동작)
    function makeSampleSvg(label, bg1, bg2) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="450">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${bg1}"/>
            <stop offset="100%" stop-color="${bg2}"/>
          </linearGradient>
        </defs>
        <rect width="600" height="450" fill="url(#g)"/>
        <text x="300" y="235" font-family="Arial, sans-serif" font-size="34" font-weight="bold"
          fill="rgba(255,255,255,0.85)" text-anchor="middle">${label}</text>
        <text x="300" y="280" font-family="Arial, sans-serif" font-size="18"
          fill="rgba(255,255,255,0.6)" text-anchor="middle">샘플 배경 · 이미지 업로드로 교체하세요</text>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    const SAMPLE_TEMPLATES = [
      { id: "blue", name: "블루", src: makeSampleSvg("BLUE", "#2563eb", "#1e3a8a") },
      { id: "sunset", name: "선셋", src: makeSampleSvg("SUNSET", "#f97316", "#db2777") },
      { id: "forest", name: "포레스트", src: makeSampleSvg("FOREST", "#16a34a", "#065f46") },
      { id: "dark", name: "다크", src: makeSampleSvg("DARK", "#334155", "#0f172a") },
    ];

    // 잘 알려진 공개 밈 템플릿 (CORS 허용 호스트). 실패 시 무시.
    const URL_TEMPLATES = [
      { id: "drake", name: "드레이크", src: "https://i.imgflip.com/30b1gx.jpg" },
      { id: "doge", name: "도지", src: "https://i.imgflip.com/4t0m5.jpg" },
    ];

    let idCounter = 0;
    const nextId = () => `t${++idCounter}`;

    function defaultTextBlock(overrides = {}) {
      return {
        id: nextId(),
        text: "",
        fontSize: 48,
        color: "#ffffff",
        strokeColor: "#000000",
        strokeWidth: 4,
        // 위치는 캔버스 내부 좌표계(intrinsic) 기준 비율(0~1)로 저장 → 이미지 크기 바뀌어도 안정
        xRatio: 0.5,
        yRatio: 0.1,
        uppercase: true,
        ...overrides,
      };
    }

    // ========================================
    // 🧰 캔버스 렌더링 유틸 (미리보기 + GIF 인코딩 공용)
    // ========================================

    // 명시적 줄바꿈 우선 처리 후, 각 줄을 단어 단위로 wrap
    function wrapLines(ctx, text, maxWidth) {
      const rawLines = text.split("\n");
      const result = [];
      rawLines.forEach((raw) => {
        const words = raw.split(" ");
        let line = "";
        words.forEach((word) => {
          const test = line ? line + " " + word : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            result.push(line);
            line = word;
          } else {
            line = test;
          }
        });
        result.push(line);
      });
      return result;
    }

    // 이미지 위에 텍스트 블록을 그림
    function drawTexts(ctx, W, H, blocks) {
      const maxWidth = W * 0.92;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      blocks.forEach((b) => {
        const display = b.uppercase ? b.text.toUpperCase() : b.text;
        if (!display.trim()) return;
        ctx.font = `bold ${b.fontSize}px ${FONT_STACK}`;
        ctx.fillStyle = b.color;
        ctx.strokeStyle = b.strokeColor;
        ctx.lineWidth = b.strokeWidth;
        ctx.lineJoin = "round";
        ctx.miterLimit = 2;

        const lines = wrapLines(ctx, display, maxWidth);
        const lineHeight = b.fontSize * 1.15;
        const cx = b.xRatio * W;
        let y = b.yRatio * H;

        lines.forEach((line) => {
          if (b.strokeWidth > 0) ctx.strokeText(line, cx, y);
          ctx.fillText(line, cx, y);
          y += lineHeight;
        });
      });
    }

    // 정적 밈(이미지+텍스트)을 버퍼 캔버스에 합성 → 효과의 원본으로 사용
    function composeMeme(canvas, image, blocks) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(image, 0, 0, W, H);
      drawTexts(ctx, W, H, blocks);
    }

    // 합성된 버퍼를 효과와 진행도(p: 0~1 한 루프)에 따라 메인 캔버스에 렌더
    function drawMeme(ctx, canvas, buffer, effect, p) {
      const W = canvas.width, H = canvas.height;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalAlpha = 1;
      ctx.clearRect(0, 0, W, H);

      const minDim = Math.min(W, H);
      const inten = (effect.intensity || 0) / 100;
      const type = effect.type;

      if (type === "shake") {
        // 주기적 떨림. 가장자리에 빈틈이 생기지 않도록 약간 확대해서 그림.
        const amp = inten * 0.06 * minDim + 2;
        const dx = Math.sin(p * Math.PI * 2 * 3) * amp;
        const dy = Math.cos(p * Math.PI * 2 * 4) * amp;
        const over = amp + 2;
        ctx.drawImage(buffer, dx - over, dy - over, W + over * 2, H + over * 2);
      } else if (type === "split") {
        // 가운데를 기준으로 좌/우 절반이 벌어졌다 붙음
        ctx.fillStyle = effect.bg;
        ctx.fillRect(0, 0, W, H);
        const maxGap = inten * 0.25 * W + 4;
        const gap = Math.sin(p * Math.PI) * maxGap; // 0 → max → 0 (자연스러운 루프)
        const half = Math.floor(W / 2);
        ctx.drawImage(buffer, 0, 0, half, H, -gap / 2, 0, half, H);
        ctx.drawImage(buffer, half, 0, W - half, H, half + gap / 2, 0, W - half, H);
      } else if (type === "fade") {
        ctx.fillStyle = effect.bg;
        ctx.fillRect(0, 0, W, H);
        const a = 0.5 - 0.5 * Math.cos(p * Math.PI * 2); // 0 → 1 → 0
        ctx.globalAlpha = Math.max(0, Math.min(1, a));
        ctx.drawImage(buffer, 0, 0, W, H);
      } else {
        // none
        ctx.drawImage(buffer, 0, 0, W, H);
      }
      ctx.restore();
    }

    // ========================================
    // 📄 컨트롤 패널 - 단일 텍스트 블록 편집기
    // ========================================

    function TextBlockEditor({ block, index, total, onChange, onRemove, isActive, onActivate }) {
      const update = (patch) => onChange({ ...block, ...patch });
      return (
        <div
          className={`rounded-xl border p-3 space-y-3 transition-colors ${
            isActive ? "border-indigo-400 bg-indigo-50/40" : "border-slate-200 bg-white"
          }`}
          onMouseDown={onActivate}
        >
          <div className="flex items-center justify-between">
            <span className="text-sm font-bold text-slate-700">텍스트 #{index + 1}</span>
            <Button
              variant="danger"
              size="sm"
              onClick={(e) => { e.stopPropagation(); onRemove(block.id); }}
              disabled={total <= 1}
              aria-label="텍스트 삭제"
            >
              삭제
            </Button>
          </div>

          <Input
            label="내용"
            value={block.text}
            placeholder="여기에 글자 입력"
            onChange={(e) => update({ text: e.target.value })}
          />

          <div className="grid grid-cols-2 gap-3">
            <Slider label="글자 크기" value={block.fontSize} min={12} max={140} suffix="px"
              onChange={(v) => update({ fontSize: v })} />
            <Slider label="외곽선 두께" value={block.strokeWidth} min={0} max={20} suffix="px"
              onChange={(v) => update({ strokeWidth: v })} />
          </div>

          <div className="grid grid-cols-2 gap-3">
            <ColorPicker label="글자색" value={block.color} onChange={(v) => update({ color: v })} />
            <ColorPicker label="외곽선색" value={block.strokeColor} onChange={(v) => update({ strokeColor: v })} />
          </div>

          <Toggle label="대문자 변환 (UPPERCASE)" checked={block.uppercase}
            onChange={(v) => update({ uppercase: v })} />

          <div className="grid grid-cols-2 gap-3">
            <Slider label="가로 위치" value={Math.round(block.xRatio * 100)} min={0} max={100} suffix="%"
              onChange={(v) => update({ xRatio: v / 100 })} />
            <Slider label="세로 위치" value={Math.round(block.yRatio * 100)} min={0} max={100} suffix="%"
              onChange={(v) => update({ yRatio: v / 100 })} />
          </div>
          <p className="text-xs text-slate-400">팁: 미리보기에서 글자를 마우스/터치로 끌어 옮길 수 있어요.</p>
        </div>
      );
    }

    // ========================================
    // 📄 효과 선택 패널
    // ========================================

    function EffectPanel({ effect, onChange }) {
      const update = (patch) => onChange({ ...effect, ...patch });
      const current = EFFECTS.find((e) => e.id === effect.type) || EFFECTS[0];
      const showBg = effect.type === "split" || effect.type === "fade";
      const showIntensity = effect.type === "shake" || effect.type === "split";

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-2">
            {EFFECTS.map((e) => {
              const selected = effect.type === e.id;
              return (
                <button
                  key={e.id}
                  onClick={() => update({ type: e.id })}
                  className={`flex items-center gap-2 rounded-xl border px-3 py-2.5 text-left transition ${
                    selected
                      ? "border-indigo-500 bg-indigo-50 ring-2 ring-indigo-300"
                      : "border-slate-200 bg-white hover:border-indigo-300"
                  }`}
                  aria-pressed={selected}
                >
                  <span className="text-xl">{e.emoji}</span>
                  <span className="text-sm font-semibold text-slate-700">{e.name}</span>
                </button>
              );
            })}
          </div>

          <p className="text-xs text-slate-400">{current.desc}{current.animated ? " · 움직이는 GIF로 저장돼요" : ""}</p>

          {current.animated && (
            <div className="space-y-3 rounded-xl bg-slate-50 border border-slate-200 p-3">
              {showIntensity && (
                <Slider label="강도" value={effect.intensity} min={0} max={100} suffix="%"
                  onChange={(v) => update({ intensity: v })} />
              )}
              <Slider label="속도" value={effect.speed} min={0.3} max={3} step={0.1} suffix="x"
                onChange={(v) => update({ speed: v })} />
              {showBg && (
                <ColorPicker label="배경색 (빈 영역)" value={effect.bg} onChange={(v) => update({ bg: v })} />
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 캔버스 미리보기 (드래그 가능)
    // ========================================

    function MemeCanvas({ blocks, setBlocks, setActiveId, canvasRef }) {
      const draggingRef = useRef(null); // { id, offsetX, offsetY }
      const [grabbing, setGrabbing] = useState(false);

      // 캔버스 화면 좌표 → 캔버스 내부(intrinsic) 좌표 변환
      const toCanvasCoords = useCallback((clientX, clientY) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }, [canvasRef]);

      // 특정 좌표에 어떤 텍스트 블록이 있는지 히트 테스트 (위에서부터 = 나중 블록 우선)
      const hitTest = useCallback((cx, cy) => {
        const canvas = canvasRef.current;
        if (!canvas) return null;
        const ctx = canvas.getContext("2d");
        for (let i = blocks.length - 1; i >= 0; i--) {
          const b = blocks[i];
          const display = b.uppercase ? b.text.toUpperCase() : b.text;
          if (!display.trim()) continue;
          ctx.font = `bold ${b.fontSize}px ${FONT_STACK}`;
          const maxWidth = canvas.width * 0.92;
          const lines = wrapLines(ctx, display, maxWidth);
          const lineHeight = b.fontSize * 1.15;
          const blockHeight = lines.length * lineHeight;
          const cxCenter = b.xRatio * canvas.width;
          const top = b.yRatio * canvas.height;
          let widest = 0;
          lines.forEach((ln) => { widest = Math.max(widest, ctx.measureText(ln).width); });
          const left = cxCenter - widest / 2;
          const pad = b.fontSize * 0.3;
          if (cx >= left - pad && cx <= left + widest + pad && cy >= top - pad && cy <= top + blockHeight + pad) {
            return b;
          }
        }
        return null;
      }, [blocks, canvasRef]);

      const startDrag = useCallback((clientX, clientY) => {
        const { x, y } = toCanvasCoords(clientX, clientY);
        const hit = hitTest(x, y);
        if (hit) {
          const canvas = canvasRef.current;
          draggingRef.current = {
            id: hit.id,
            offsetX: x - hit.xRatio * canvas.width,
            offsetY: y - hit.yRatio * canvas.height,
          };
          setActiveId(hit.id);
          setGrabbing(true);
        }
      }, [toCanvasCoords, hitTest, setActiveId, canvasRef]);

      const moveDrag = useCallback((clientX, clientY) => {
        const drag = draggingRef.current;
        if (!drag) return;
        const canvas = canvasRef.current;
        const { x, y } = toCanvasCoords(clientX, clientY);
        let xRatio = (x - drag.offsetX) / canvas.width;
        let yRatio = (y - drag.offsetY) / canvas.height;
        xRatio = Math.min(1, Math.max(0, xRatio));
        yRatio = Math.min(1, Math.max(0, yRatio));
        setBlocks((prev) => prev.map((b) => (b.id === drag.id ? { ...b, xRatio, yRatio } : b)));
      }, [toCanvasCoords, setBlocks, canvasRef]);

      const endDrag = useCallback(() => {
        draggingRef.current = null;
        setGrabbing(false);
      }, []);

      // 전역 mousemove/mouseup 리스너 (캔버스 밖으로 나가도 드래그 유지)
      useEffect(() => {
        const onMove = (e) => moveDrag(e.clientX, e.clientY);
        const onUp = () => endDrag();
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
        return () => {
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        };
      }, [moveDrag, endDrag]);

      const onTouchStart = (e) => {
        if (e.touches.length !== 1) return;
        startDrag(e.touches[0].clientX, e.touches[0].clientY);
      };
      const onTouchMove = (e) => {
        if (!draggingRef.current) return;
        e.preventDefault(); // 스크롤 방지
        moveDrag(e.touches[0].clientX, e.touches[0].clientY);
      };

      return (
        <canvas
          ref={canvasRef}
          className={`max-w-full h-auto rounded-xl border border-slate-200 shadow-inner bg-slate-50 no-select touch-none ${
            grabbing ? "canvas-grabbing" : "canvas-grab"
          }`}
          onMouseDown={(e) => startDrag(e.clientX, e.clientY)}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={endDrag}
        />
      );
    }

    // ========================================
    // 📄 드롭존 (이미지 없을 때)
    // ========================================

    function DropZone({ onFile, dragOver, ...handlers }) {
      const inputRef = useRef(null);
      return (
        <div
          {...handlers}
          onClick={() => inputRef.current?.click()}
          className={`flex flex-col items-center justify-center text-center cursor-pointer rounded-2xl border-2 border-dashed bg-slate-50 px-6 py-16 transition-colors ${
            dragOver ? "drop-active border-indigo-500 bg-indigo-50" : "border-slate-300 hover:border-indigo-400"
          }`}
          role="button"
          aria-label="이미지 업로드 영역"
        >
          <svg className="w-14 h-14 text-indigo-400 mb-3" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <p className="text-base font-semibold text-slate-700">이미지를 드래그하거나 클릭해서 업로드</p>
          <p className="text-sm text-slate-400 mt-1">PNG · JPG · GIF · WEBP</p>
          <input
            ref={inputRef}
            type="file"
            accept="image/*"
            className="hidden"
            onChange={(e) => {
              const f = e.target.files?.[0];
              if (f) onFile(f);
              e.target.value = "";
            }}
          />
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [image, setImage] = useState(null); // HTMLImageElement
      const [blocks, setBlocks] = useState([
        defaultTextBlock({ text: "위쪽 텍스트", yRatio: 0.04 }),
        defaultTextBlock({ text: "아래쪽 텍스트", yRatio: 0.82 }),
      ]);
      const [effect, setEffect] = useState(defaultEffect());
      const [activeId, setActiveId] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [loadError, setLoadError] = useState("");
      const [exporting, setExporting] = useState(false);
      const [progress, setProgress] = useState(0);
      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);

      const isAnimated = effect.type !== "none";

      // ----- 이미지 로딩 -----
      const loadImageFromSrc = useCallback((src, useCors) => {
        setLoadError("");
        const img = new Image();
        if (useCors) img.crossOrigin = "anonymous";
        img.onload = () => setImage(img);
        img.onerror = () => {
          setLoadError("이미지를 불러오지 못했습니다. 다른 이미지를 사용해 주세요.");
        };
        img.src = src;
      }, []);

      const handleFile = useCallback((file) => {
        if (!file.type.startsWith("image/")) {
          setLoadError("이미지 파일만 업로드할 수 있어요.");
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => loadImageFromSrc(e.target.result, false);
        reader.readAsDataURL(file);
      }, [loadImageFromSrc]);

      const handleTemplate = useCallback((tpl) => {
        const isData = tpl.src.startsWith("data:");
        loadImageFromSrc(tpl.src, !isData);
      }, [loadImageFromSrc]);

      // ----- 드래그&드롭 핸들러 -----
      const dropHandlers = {
        onDragOver: (e) => { e.preventDefault(); setDragOver(true); },
        onDragLeave: (e) => { e.preventDefault(); setDragOver(false); },
        onDrop: (e) => {
          e.preventDefault();
          setDragOver(false);
          const f = e.dataTransfer.files?.[0];
          if (f) handleFile(f);
        },
      };

      // ----- 캔버스 미리보기 (정지 or 애니메이션 루프) -----
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !image) {
          if (canvas) { canvas.width = 0; canvas.height = 0; }
          return;
        }
        const W = image.naturalWidth || image.width;
        const H = image.naturalHeight || image.height;
        canvas.width = W;
        canvas.height = H;

        // 정적 밈을 버퍼에 한 번 합성 (애니메이션 프레임마다 재사용)
        const buffer = document.createElement("canvas");
        buffer.width = W;
        buffer.height = H;
        composeMeme(buffer, image, blocks);

        const ctx = canvas.getContext("2d");

        if (effect.type === "none") {
          drawMeme(ctx, canvas, buffer, effect, 0);
          return;
        }

        // 애니메이션 루프
        let raf;
        let start = null;
        const loopDur = 2200 / Math.max(0.3, effect.speed);
        const tick = (ts) => {
          if (start === null) start = ts;
          const p = ((ts - start) % loopDur) / loopDur;
          drawMeme(ctx, canvas, buffer, effect, p);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [image, blocks, effect]);

      // ----- 텍스트 블록 조작 -----
      const updateBlock = useCallback((updated) => {
        setBlocks((prev) => prev.map((b) => (b.id === updated.id ? updated : b)));
      }, []);

      const addBlock = useCallback(() => {
        const nb = defaultTextBlock({ text: "새 텍스트", yRatio: 0.45 });
        setBlocks((prev) => [...prev, nb]);
        setActiveId(nb.id);
      }, []);

      const removeBlock = useCallback((id) => {
        setBlocks((prev) => (prev.length > 1 ? prev.filter((b) => b.id !== id) : prev));
      }, []);

      const resetAll = useCallback(() => {
        setImage(null);
        setLoadError("");
        setEffect(defaultEffect());
        setBlocks([
          defaultTextBlock({ text: "위쪽 텍스트", yRatio: 0.04 }),
          defaultTextBlock({ text: "아래쪽 텍스트", yRatio: 0.82 }),
        ]);
      }, []);

      // ----- PNG 다운로드 (정지 이미지) -----
      const handleDownloadPng = useCallback(() => {
        if (!image) return;
        const W = image.naturalWidth || image.width;
        const H = image.naturalHeight || image.height;
        const buffer = document.createElement("canvas");
        buffer.width = W;
        buffer.height = H;
        composeMeme(buffer, image, blocks);
        try {
          buffer.toBlob((blob) => {
            if (!blob) return;
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "meme.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, "image/png");
        } catch (err) {
          setLoadError("이 이미지는 보안 정책(CORS)으로 다운로드할 수 없어요. 파일 업로드 또는 샘플 배경을 사용해 주세요.");
        }
      }, [image, blocks]);

      // ----- GIF 다운로드 (움직이는 짤) -----
      const handleDownloadGif = useCallback(async () => {
        if (!image) return;
        if (typeof GIF === "undefined") {
          setLoadError("GIF 라이브러리를 불러오지 못했어요. 인터넷 연결을 확인한 뒤 다시 시도해 주세요.");
          return;
        }
        setLoadError("");
        setExporting(true);
        setProgress(0);

        try {
          const W = image.naturalWidth || image.width;
          const H = image.naturalHeight || image.height;

          // 정적 밈 버퍼
          const buffer = document.createElement("canvas");
          buffer.width = W;
          buffer.height = H;
          composeMeme(buffer, image, blocks);

          // GIF 용량 절약을 위해 최대 480px로 축소
          const scale = Math.min(1, 480 / Math.max(W, H));
          const outW = Math.max(1, Math.round(W * scale));
          const outH = Math.max(1, Math.round(H * scale));

          const frameCanvas = document.createElement("canvas");
          frameCanvas.width = W;
          frameCanvas.height = H;
          const fctx = frameCanvas.getContext("2d");

          const outCanvas = document.createElement("canvas");
          outCanvas.width = outW;
          outCanvas.height = outH;
          const octx = outCanvas.getContext("2d");

          const N = 18; // 프레임 수
          const loopDur = 2200 / Math.max(0.3, effect.speed);
          const delay = Math.max(20, Math.round(loopDur / N));

          // worker 스크립트를 blob URL로 로드 (CDN 교차출처 worker 이슈 회피)
          let workerUrl = GIF_WORKER_URL;
          try {
            const resp = await fetch(GIF_WORKER_URL);
            workerUrl = URL.createObjectURL(await resp.blob());
          } catch (e) {
            // fetch 실패 시 CDN URL 직접 사용 시도
          }

          const gif = new GIF({
            workers: 2,
            quality: 10,
            width: outW,
            height: outH,
            workerScript: workerUrl,
            repeat: 0, // 무한 반복
          });

          for (let i = 0; i < N; i++) {
            const p = i / N;
            drawMeme(fctx, frameCanvas, buffer, effect, p);
            octx.clearRect(0, 0, outW, outH);
            octx.drawImage(frameCanvas, 0, 0, outW, outH);
            gif.addFrame(octx, { copy: true, delay }); // 오염된 캔버스면 여기서 SecurityError
          }

          gif.on("progress", (pr) => setProgress(Math.round(pr * 100)));
          gif.on("finished", (blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "meme.gif";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            if (workerUrl.startsWith("blob:")) URL.revokeObjectURL(workerUrl);
            setExporting(false);
            setProgress(0);
          });
          gif.render();
        } catch (err) {
          setExporting(false);
          setProgress(0);
          setLoadError("GIF를 만들 수 없어요. 온라인 템플릿은 보안 정책(CORS)으로 막힐 수 있으니, 파일 업로드나 샘플 배경을 사용해 주세요.");
        }
      }, [image, blocks, effect]);

      // 효과 유무에 따라 기본 다운로드 동작 분기
      const handleDownloadMain = isAnimated ? handleDownloadGif : handleDownloadPng;

      return (
        <div className="min-h-screen">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🖼️</span>
                <div>
                  <h1 className="text-lg font-extrabold text-slate-800 leading-tight">짤 생성기</h1>
                  <p className="text-xs text-slate-400 -mt-0.5">밈 메이커 · Meme Maker</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <Button variant="ghost" size="sm" onClick={resetAll}>초기화</Button>
                <Button size="sm" onClick={handleDownloadMain} disabled={!image || exporting}>
                  {exporting ? `GIF 생성 ${progress}%` : (isAnimated ? "⬇ GIF 다운로드" : "⬇ PNG 다운로드")}
                </Button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* ===== 미리보기 ===== */}
            <section className="lg:order-2">
              <Card className="p-4">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-sm font-bold text-slate-700">미리보기</h2>
                  {isAnimated && (
                    <span className="text-[11px] font-semibold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">
                      ▶ 애니메이션 적용 중
                    </span>
                  )}
                </div>
                {loadError && (
                  <div className="mb-3 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-sm px-3 py-2">
                    {loadError}
                  </div>
                )}
                {image ? (
                  <div className="flex justify-center">
                    <MemeCanvas
                      blocks={blocks}
                      setBlocks={setBlocks}
                      setActiveId={setActiveId}
                      canvasRef={canvasRef}
                    />
                  </div>
                ) : (
                  <DropZone onFile={handleFile} dragOver={dragOver} {...dropHandlers} />
                )}
                <p className="text-xs text-slate-400 mt-3 text-center">
                  {isAnimated
                    ? "보이는 움직임 그대로 GIF로 저장됩니다."
                    : "보이는 그대로 PNG로 저장됩니다 (WYSIWYG)."}
                </p>
              </Card>
            </section>

            {/* ===== 컨트롤 ===== */}
            <section className="lg:order-1 space-y-6">
              {/* 이미지 선택 */}
              <Card className="p-4 space-y-3">
                <h2 className="text-sm font-bold text-slate-700">1. 이미지 선택</h2>
                <div className="flex gap-2">
                  <Button onClick={() => fileInputRef.current?.click()} className="flex-1">
                    파일 업로드
                  </Button>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={(e) => {
                      const f = e.target.files?.[0];
                      if (f) handleFile(f);
                      e.target.value = "";
                    }}
                  />
                  {image && (
                    <Button variant="secondary" onClick={() => setImage(null)}>지우기</Button>
                  )}
                </div>

                <div>
                  <p className="text-xs font-medium text-slate-500 mb-2">샘플 배경</p>
                  <div className="grid grid-cols-4 gap-2">
                    {SAMPLE_TEMPLATES.map((tpl) => (
                      <button
                        key={tpl.id}
                        onClick={() => handleTemplate(tpl)}
                        className="group relative aspect-[4/3] rounded-lg overflow-hidden border border-slate-200 hover:ring-2 hover:ring-indigo-400 transition"
                        aria-label={`${tpl.name} 템플릿`}
                      >
                        <img src={tpl.src} alt={tpl.name} className="w-full h-full object-cover" />
                        <span className="absolute bottom-0 inset-x-0 bg-black/40 text-white text-[10px] py-0.5 text-center">
                          {tpl.name}
                        </span>
                      </button>
                    ))}
                  </div>

                  <p className="text-xs font-medium text-slate-500 mt-3 mb-2">밈 템플릿 (온라인)</p>
                  <div className="grid grid-cols-4 gap-2">
                    {URL_TEMPLATES.map((tpl) => (
                      <button
                        key={tpl.id}
                        onClick={() => handleTemplate(tpl)}
                        className="group relative aspect-[4/3] rounded-lg overflow-hidden border border-slate-200 hover:ring-2 hover:ring-indigo-400 transition bg-slate-100"
                        aria-label={`${tpl.name} 템플릿`}
                      >
                        <img
                          src={tpl.src}
                          alt={tpl.name}
                          crossOrigin="anonymous"
                          className="w-full h-full object-cover"
                          onError={(e) => { e.target.style.opacity = 0.3; }}
                        />
                        <span className="absolute bottom-0 inset-x-0 bg-black/40 text-white text-[10px] py-0.5 text-center">
                          {tpl.name}
                        </span>
                      </button>
                    ))}
                  </div>
                </div>
              </Card>

              {/* 효과 선택 */}
              <Card className="p-4 space-y-3">
                <h2 className="text-sm font-bold text-slate-700">2. 효과 선택</h2>
                <EffectPanel effect={effect} onChange={setEffect} />
              </Card>

              {/* 텍스트 편집 */}
              <Card className="p-4 space-y-3">
                <div className="flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-700">3. 텍스트 편집</h2>
                  <Button size="sm" variant="secondary" onClick={addBlock}>＋ 텍스트 추가</Button>
                </div>
                <div className="space-y-3">
                  {blocks.map((b, i) => (
                    <TextBlockEditor
                      key={b.id}
                      block={b}
                      index={i}
                      total={blocks.length}
                      onChange={updateBlock}
                      onRemove={removeBlock}
                      isActive={activeId === b.id}
                      onActivate={() => setActiveId(b.id)}
                    />
                  ))}
                </div>
              </Card>

              {/* 다운로드 */}
              <Card className="p-4 space-y-3">
                <h2 className="text-sm font-bold text-slate-700">4. 저장</h2>
                <Button size="lg" className="w-full" onClick={handleDownloadMain} disabled={!image || exporting}>
                  {exporting
                    ? `⏳ GIF 만드는 중... ${progress}%`
                    : isAnimated
                      ? "⬇ 움직이는 GIF로 저장"
                      : "⬇ meme.png 다운로드"}
                </Button>
                {isAnimated && (
                  <Button variant="secondary" size="sm" className="w-full" onClick={handleDownloadPng} disabled={!image || exporting}>
                    정지 이미지(PNG)로도 저장
                  </Button>
                )}
                {exporting && (
                  <div className="w-full h-2 rounded-full bg-slate-200 overflow-hidden">
                    <div className="h-full bg-indigo-600 transition-all" style={{ width: `${progress}%` }}></div>
                  </div>
                )}
                {isAnimated && (
                  <p className="text-xs text-slate-400">
                    GIF는 용량을 위해 최대 480px로 축소되며, 무한 반복됩니다.
                  </p>
                )}
              </Card>
            </section>
          </main>

          <footer className="max-w-6xl mx-auto px-4 py-6 text-center text-xs text-slate-400">
            짤 생성기 · 단일 파일 React 앱 · 모든 처리는 브라우저에서만 이루어집니다.
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
