<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.35s ease-out both; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-3xl shadow-xl shadow-indigo-200/50 p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = "text", value, onChange, error, ...rest }) {
      return (
        <div className="w-full">
          {label && (
            <label className="block text-sm font-semibold text-gray-700 mb-2">{label}</label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            className={`w-full px-4 py-3 rounded-xl border bg-gray-50 text-gray-900 text-base
              focus:outline-none focus:ring-2 transition
              ${error
                ? "border-red-400 focus:ring-red-300"
                : "border-gray-200 focus:ring-indigo-400 focus:border-indigo-400"}`}
            {...rest}
          />
        </div>
      );
    }

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const variants = {
        primary: "bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-300/50",
        secondary: "bg-gray-100 hover:bg-gray-200 text-gray-800",
        ghost: "bg-transparent hover:bg-gray-100 text-gray-700",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-3 text-base",
        lg: "px-6 py-4 text-lg",
      };
      return (
        <button
          type="button"
          onClick={onClick}
          disabled={disabled}
          className={`rounded-xl font-bold transition active:scale-[0.98]
            disabled:opacity-50 disabled:cursor-not-allowed
            ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Alert({ children }) {
      return (
        <div
          role="alert"
          className="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm animate-fade-in-up"
        >
          <span aria-hidden="true" className="text-lg leading-none">⚠️</span>
          <span>{children}</span>
        </div>
      );
    }

    // ========================================
    // 🧮 Age Calculation Logic
    // ========================================
    function calculateAge(birthDate, today) {
      // 만 나이: 생일이 지났는지에 따라 결정
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      const dayDiff = today.getDate() - birthDate.getDate();
      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age -= 1;
      }

      // 다음 생일까지 남은 일수 계산
      let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
      // 시간 영향을 제거하기 위해 자정 기준으로 비교
      const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      if (nextBirthday < todayMidnight) {
        nextBirthday = new Date(today.getFullYear() + 1, birthDate.getMonth(), birthDate.getDate());
      }
      const msPerDay = 1000 * 60 * 60 * 24;
      const daysUntilBirthday = Math.round((nextBirthday - todayMidnight) / msPerDay);
      const isBirthdayToday = daysUntilBirthday === 0;

      return { age, daysUntilBirthday, isBirthdayToday };
    }

    // ========================================
    // 📄 Page Component
    // ========================================
    function AgeCalculator() {
      const [birth, setBirth] = useState("");
      const [error, setError] = useState("");
      const [result, setResult] = useState(null);

      const handleCalculate = useCallback(() => {
        setResult(null);

        if (!birth) {
          setError("생년월일을 입력해 주세요.");
          return;
        }

        const birthDate = new Date(birth + "T00:00:00");
        if (isNaN(birthDate.getTime())) {
          setError("올바른 날짜 형식이 아닙니다. 다시 확인해 주세요.");
          return;
        }

        const today = new Date();
        const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        if (birthDate > todayMidnight) {
          setError("미래의 날짜는 입력할 수 없어요. 생년월일을 다시 확인해 주세요.");
          return;
        }

        // 너무 과거인 비현실적 값 방지 (예: 1900년 이전)
        if (birthDate.getFullYear() < 1900) {
          setError("1900년 이후의 생년월일을 입력해 주세요.");
          return;
        }

        setError("");
        setResult(calculateAge(birthDate, today));
      }, [birth]);

      const handleChange = useCallback((e) => {
        setBirth(e.target.value);
        if (error) setError("");
      }, [error]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === "Enter") handleCalculate();
      }, [handleCalculate]);

      // 입력 가능한 최대 날짜 = 오늘
      const todayStr = new Date().toISOString().split("T")[0];

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-md">
            <header className="text-center mb-6">
              <div className="text-5xl mb-3" aria-hidden="true">🎂</div>
              <h1 className="text-3xl font-extrabold text-gray-800">만 나이 계산기</h1>
              <p className="text-gray-500 mt-2">생년월일을 입력하면 만 나이를 알려드려요.</p>
            </header>

            <Card>
              <div className="space-y-5" onKeyDown={handleKeyDown}>
                <Input
                  label="생년월일"
                  type="date"
                  value={birth}
                  onChange={handleChange}
                  max={todayStr}
                  min="1900-01-01"
                  error={!!error}
                  aria-label="생년월일 입력"
                />

                <Button onClick={handleCalculate} size="lg" className="w-full">
                  나이 계산하기
                </Button>

                {error && <Alert>{error}</Alert>}

                {result && (
                  <div className="animate-fade-in-up pt-2">
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-2xl p-6 text-center shadow-lg shadow-indigo-300/50">
                      <p className="text-indigo-100 text-sm font-medium mb-1">당신의 만 나이는</p>
                      <p className="text-5xl font-extrabold tracking-tight">
                        만 {result.age}세
                      </p>
                    </div>

                    <div className="mt-4 text-center">
                      {result.isBirthdayToday ? (
                        <p className="text-pink-600 font-bold text-lg">
                          🎉 오늘은 당신의 생일이에요! 축하합니다!
                        </p>
                      ) : (
                        <p className="text-gray-600">
                          다음 생일까지{" "}
                          <span className="font-bold text-indigo-600">{result.daysUntilBirthday}일</span>{" "}
                          남았어요.
                        </p>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </Card>

            <footer className="text-center text-xs text-gray-400 mt-6">
              오늘 날짜 기준으로 계산됩니다.
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <AgeCalculator />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
