    const ADMIN_FILTERS = [
      { key: 'all', label: '전체', match: () => true },
      { key: 'onsale', label: '판매중', match: (p) => p.purchasable },
      { key: 'soldout', label: '품절', match: (p) => p.status === 'active' && p.stock === 0 },
      { key: 'discontinued', label: '판매중단', match: (p) => p.status === 'discontinued' },
    ];

    function AdminPage() {
      const { isAuthenticated, isAdmin, bootChecking } = useAuth();
      const { navigate } = useRouter();
      const { show } = useToast();

      const [state, setState] = useState({ phase: 'loading', products: [], error: null });
      const [filter, setFilter] = useState('all');
      const [formTarget, setFormTarget] = useState(undefined); // undefined=닫힘, null=새 상품, obj=수정
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [busyId, setBusyId] = useState(null);
      const [deleting, setDeleting] = useState(false);

      // 비로그인만 로그인으로 보낸다. 로그인했지만 관리자가 아니면 아래에서 403 안내를 보여준다
      // (조용히 홈으로 튕기면 "왜 안 되지?" 가 된다).
      useEffect(() => {
        if (!bootChecking && !isAuthenticated) navigate('/login');
      }, [bootChecking, isAuthenticated, navigate]);

      const load = useCallback(async () => {
        setState((s) => ({ ...s, phase: 'loading', error: null }));
        try {
          const products = await apiFetch('/admin/products');
          setState({ phase: 'ready', products: Array.isArray(products) ? products : [], error: null });
        } catch (err) {
          if (err.status === 401) return; // apiFetch 가 세션 정리 → 위 useEffect 가 이동
          setState({ phase: 'error', products: [], error: err.message || '상품을 불러오지 못했어요.' });
        }
      }, []);

      useEffect(() => {
        if (!bootChecking && isAuthenticated && isAdmin) load();
      }, [bootChecking, isAuthenticated, isAdmin, load]);

      // 저장 결과를 목록에 반영 — 수정이면 교체, 신규면 맨 앞에.
      const handleSaved = (saved) => {
        setState((s) => {
          const exists = s.products.some((p) => String(p.id) === String(saved.id));
          return {
            ...s,
            products: exists
              ? s.products.map((p) => (String(p.id) === String(saved.id) ? saved : p))
              : [saved, ...s.products],
          };
        });
        setFormTarget(undefined);
      };

      const handleToggleStatus = async (product) => {
        const next = product.status === 'discontinued' ? 'active' : 'discontinued';
        setBusyId(product.id);
        try {
          const saved = await apiFetch(`/admin/products/${product.id}`, { method: 'PATCH', body: { status: next } });
          setState((s) => ({
            ...s,
            products: s.products.map((p) => (String(p.id) === String(saved.id) ? saved : p)),
          }));
          show(next === 'active' ? '판매를 재개했어요.' : '판매를 중단했어요.', { tone: 'success' });
        } catch (err) {
          show(err.message || '상태를 바꾸지 못했어요.', { tone: 'error' });
        } finally {
          setBusyId(null);
        }
      };

      const handleDelete = async () => {
        if (!deleteTarget) return;
        setDeleting(true);
        try {
          await apiFetch(`/admin/products/${deleteTarget.id}`, { method: 'DELETE' });
          setState((s) => ({
            ...s,
            products: s.products.filter((p) => String(p.id) !== String(deleteTarget.id)),
          }));
          show(`'${deleteTarget.name}' 을(를) 삭제했어요.`, { tone: 'success' });
          setDeleteTarget(null);
        } catch (err) {
          show(err.message || '삭제하지 못했어요.', { tone: 'error' });
        } finally {
          setDeleting(false);
        }
      };

      if (bootChecking || !isAuthenticated) {
        return (
          <div className="max-w-4xl mx-auto px-4 py-20 flex justify-center">
            <Spinner className="h-7 w-7 text-neutral-400" />
          </div>
        );
      }

      if (!isAdmin) {
        return (
          <div className="max-w-4xl mx-auto px-4">
            <StatusBox
              icon={
                <svg className="w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true">
                  <rect x="4" y="10" width="16" height="10" rx="1" />
                  <path strokeLinecap="round" d="M8 10V7a4 4 0 118 0v3" />
                </svg>
              }
              title="관리자만 볼 수 있는 페이지예요"
              description="관리자 계정으로 로그인하면 상품을 등록하고 재고·판매 상태를 관리할 수 있어요."
              action={<Link to="/"><Button variant="primary">쇼핑 계속하기</Button></Link>}
            />
          </div>
        );
      }

      const { phase, products, error } = state;
      const activeFilter = ADMIN_FILTERS.find((f) => f.key === filter) || ADMIN_FILTERS[0];
      const visible = products.filter(activeFilter.match);

      const counts = {
        all: products.length,
        onsale: products.filter((p) => p.purchasable).length,
        soldout: products.filter((p) => p.status === 'active' && p.stock === 0).length,
        discontinued: products.filter((p) => p.status === 'discontinued').length,
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-8 sm:py-12">
          <div className="mb-6 sm:mb-8 flex flex-wrap items-end justify-between gap-3">
            <div>
              <p className="text-xs tracking-[0.3em] text-neutral-400 uppercase mb-2">Admin</p>
              <h1 className="text-2xl font-bold tracking-tight text-neutral-900">상품 관리</h1>
              <p className="mt-1.5 text-sm text-neutral-500">
                상품을 등록하고 재고·판매 상태를 관리합니다. 이미지는 ImageKit 에 저장됩니다.
              </p>
            </div>
            <Button variant="primary" onClick={() => setFormTarget(null)}>+ 새 상품 등록</Button>
          </div>

          {/* 필터 */}
          <div className="flex flex-wrap gap-1.5 mb-4">
            {ADMIN_FILTERS.map((f) => (
              <button
                key={f.key}
                onClick={() => setFilter(f.key)}
                className={`px-3 py-1.5 text-xs font-medium border transition-colors ${
                  filter === f.key
                    ? 'bg-neutral-900 text-white border-neutral-900'
                    : 'bg-white text-neutral-600 border-neutral-300 hover:border-neutral-900'
                }`}
              >
                {f.label} <span className="opacity-60">{counts[f.key]}</span>
              </button>
            ))}
          </div>

          {phase === 'loading' && (
            <div className="py-20 flex justify-center"><Spinner className="h-7 w-7 text-neutral-400" /></div>
          )}

          {phase === 'error' && (
            <StatusBox
              title="상품을 불러오지 못했어요"
              description={error}
              action={<Button variant="secondary" onClick={load}>다시 시도</Button>}
            />
          )}

          {phase === 'ready' && (
            visible.length === 0 ? (
              <StatusBox
                title={filter === 'all' ? '등록된 상품이 없어요' : `'${activeFilter.label}' 상품이 없어요`}
                description={filter === 'all' ? '새 상품을 등록해 주세요.' : '다른 필터를 선택해 보세요.'}
                action={filter === 'all'
                  ? <Button variant="primary" onClick={() => setFormTarget(null)}>+ 새 상품 등록</Button>
                  : <Button variant="secondary" onClick={() => setFilter('all')}>전체 보기</Button>}
              />
            ) : (
              <Card className="overflow-hidden">
                {visible.map((p) => (
                  <AdminProductRow
                    key={p.id}
                    product={p}
                    busy={String(busyId) === String(p.id)}
                    onEdit={setFormTarget}
                    onToggleStatus={handleToggleStatus}
                    onDelete={setDeleteTarget}
                  />
                ))}
              </Card>
            )
          )}

          {/* 등록/수정 모달 — formTarget 이 undefined 면 닫힘 */}
          <ProductFormModal
            isOpen={formTarget !== undefined}
            initial={formTarget}
            onClose={() => setFormTarget(undefined)}
            onSaved={handleSaved}
          />

          {/* 삭제 확인 */}
          <Modal
            isOpen={!!deleteTarget}
            onClose={deleting ? undefined : () => setDeleteTarget(null)}
            title="상품 삭제"
            footer={
              <>
                <Button variant="ghost" onClick={() => setDeleteTarget(null)} disabled={deleting}>취소</Button>
                <Button variant="danger" onClick={handleDelete} loading={deleting}>삭제</Button>
              </>
            }
          >
            <p className="text-sm text-neutral-700 leading-relaxed">
              <strong className="font-semibold">{deleteTarget && deleteTarget.name}</strong> 을(를) 삭제할까요?
            </p>
            <p className="mt-2 text-xs text-neutral-500 leading-relaxed">
              되돌릴 수 없어요. 이 상품이 담긴 다른 사용자의 장바구니에서도 함께 사라집니다.
              (이미 결제된 주문 내역은 그대로 남습니다.)
            </p>
            <p className="mt-2 text-xs text-neutral-500 leading-relaxed">
              지우는 대신 <strong>판매중단</strong>으로 두면 목록에는 남기고 판매만 막을 수 있어요.
            </p>
          </Modal>
        </div>
      );
    }

    function NotFoundPage() {
      return (
        <div className="max-w-3xl mx-auto">
          <StatusBox
            icon={<span className="text-5xl font-bold text-neutral-200">404</span>}
            title="페이지를 찾을 수 없어요"
            description="주소가 올바른지 확인해 주세요."
            action={<Link to="/"><Button>홈으로</Button></Link>}
          />
        </div>
      );
    }

    // ========================================
    // 🚀 App — 합성 + 백엔드 헬스체크
    // ========================================
    function AppShell() {
      // 백엔드 감지: null=확인중, true=정상, false=미감지
      const [backendOnline, setBackendOnline] = useState(null);

      useEffect(() => {
        let alive = true;
        // 헬스체크는 apiFetch(401핸들러) 거치지 않고 직접 호출 — 단순 감지 목적.
        fetch(`${API_BASE_URL}/health`)
          .then((res) => { if (alive) setBackendOnline(res.ok); })
          .catch(() => { if (alive) setBackendOnline(false); });
        return () => { alive = false; };
      }, []);

      // TossPayments 는 successUrl/failUrl 로 "실제 경로"(/success·/fail)로 리다이렉트한다.
      // 해시 라우터보다 "먼저" pathname 을 보고 결제 결과 화면으로 분기한다(파라미터는 location.search 에 옴).
      const realPath = window.location.pathname;
      const paymentMode =
        realPath === '/success' ? 'success' : realPath === '/fail' ? 'fail' : null;

      return (
        <div className="min-h-screen flex flex-col">
          {/* 백엔드 미감지 시 경고 배너 (정적 서버로 열었을 때 대표적 실패) */}
          {backendOnline === false && <BackendWarning />}

          <Header />

          <main className="flex-1">
            {paymentMode ? (
              <PaymentResultPage mode={paymentMode} />
            ) : (
              <Routes fallback={<NotFoundPage />}>
                <Route path="/"         element={<ProductListPage />} />
                <Route path="/login"    element={<AuthPage mode="login" />} />
                <Route path="/signup"   element={<AuthPage mode="signup" />} />
                <Route path="/cart"     element={<CartPage />} />
                <Route path="/checkout" element={<CheckoutPage />} />
                <Route path="/mypage"   element={<MyPage />} />
                <Route path="/admin"    element={<AdminPage />} />
              </Routes>
            )}
          </main>

          <Footer />
        </div>
      );
    }

    function App() {
      // Provider 순서: Router → Toast → Auth → Cart (Cart 는 Auth 상태에 의존)
      return (
        <Router>
          <ToastProvider>
            <AuthProvider>
              <CartProvider>
                <AppShell />
              </CartProvider>
            </AuthProvider>
          </ToastProvider>
        </Router>
      );
    }

    // ========================================
    // 렌더
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
