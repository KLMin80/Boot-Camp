<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>딥로스트 · 사장님 대시보드</title>
  <!-- 인라인 파비콘. 없으면 브라우저가 /favicon.ico 를 찾다가 404 를 콘솔에 남긴다. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다.
       @babel/standalone 은 반드시 7.x. 8.x 를 쓰면 type="text/babel" 인라인 변환이 깨져 화면이 백지가 된다. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // 딥로스트: 다크 로스팅 브라운/차콜 베이스
            roast: {
              950: '#120d0a', 900: '#19120d', 850: '#20170f', 800: '#281d14',
              750: '#31241a', 700: '#3d2d20', 600: '#523c2a', 500: '#6d5138', 400: '#8f7150'
            },
            // 따뜻한 앰버 포인트는 tailwind 기본 amber 사용, 그린 액센트는 sage
            sage: { 700: '#4a6633', 600: '#5c7a3f', 500: '#6f9350', 400: '#88ab68', 300: '#a6c48a' }
          },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','"Segoe UI"','"Malgun Gothic"','"Apple SD Gothic Neo"','"Noto Sans KR"','Roboto','sans-serif'],
            mono: ['ui-monospace','"Cascadia Mono"','Consolas','monospace']
          }
        }
      }
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    /* Tailwind JIT 가 준비되기 전에도 어두운 배경을 보장 (백지/흰 플래시 방지) */
    html, body { background: #120d0a; color: #e8ddce; }
    * { -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #120d0a; }
    ::-webkit-scrollbar-thumb { background: #3d2d20; border-radius: 8px; border: 2px solid #120d0a; }
    ::-webkit-scrollbar-thumb:hover { background: #523c2a; }
    @keyframes dr-shimmer { 0% { background-position: -700px 0; } 100% { background-position: 700px 0; } }
    .dr-shimmer { background: linear-gradient(90deg, #241a12 25%, #33261b 37%, #241a12 63%); background-size: 700px 100%; animation: dr-shimmer 1.4s infinite linear; }
    @keyframes dr-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .dr-fade { animation: dr-fade .35s ease both; }
    @keyframes dr-spin { to { transform: rotate(360deg); } }
    .dr-spin { animation: dr-spin .7s linear infinite; }
  </style>
</head>
<body class="bg-roast-950 text-stone-200 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
  // 최상위 함수/const 가 window 전역이 되는 것을 피하기 위해 전체를 IIFE 로 감싼다.
  // (외부 SDK 가 스니핑하는 흔한 전역명과의 충돌 방지)
  (function () {
    'use strict';
    const { useState, useEffect, useRef, useMemo, useCallback, useContext, createContext } = React;

    // ========================================
    // 상수 · 유틸 · 포맷터
    // ========================================
    const API_BASE = '/api';                 // 상대경로 — 같은 오리진의 server.js 가 응답
    const TOKEN_KEY = 'cafe_dash_token';

    const nf = new Intl.NumberFormat('ko-KR');
    function cx() { return Array.prototype.filter.call(arguments, Boolean).join(' '); }
    function isNum(v) { return typeof v === 'number' && isFinite(v); }
    // 서버가 null 을 줄 수 있는 필드 방어 — .toFixed() 를 바로 부르지 않는다
    function fmtInt(v) { return isNum(v) ? nf.format(Math.round(v)) : '—'; }
    // 재고·발주 수량은 numeric(10,2) 라 소수가 온다. 반올림하면 2.2kg 이 "2kg" 이 되어
    // 정작 안전재고 하회 품목의 수치가 틀리게 보인다. 소수 2자리까지, 뒤 0은 떼고 표시한다.
    const qf = new Intl.NumberFormat('ko-KR', { maximumFractionDigits: 2 });
    function fmtQty(v) { return isNum(v) ? qf.format(v) : '—'; }
    function fmtWon(v) { return isNum(v) ? nf.format(Math.round(v)) + '원' : '—'; }
    function fmtPct(v, d) { if (!isNum(v)) return '—'; const s = v > 0 ? '+' : ''; return s + v.toFixed(d == null ? 1 : d) + '%'; }
    function fmtKpi(v, unit) {
      if (!isNum(v)) return '—';
      if (unit === '원') return fmtWon(v);
      if (unit === '점') return v.toFixed(1) + '점';
      if (unit === '%') return v.toFixed(1) + '%';
      return fmtInt(v) + (unit || '');
    }
    function fmtDateMD(iso) { return typeof iso === 'string' && iso.length >= 10 ? iso.slice(5).replace('-', '.') : (iso || '—'); }
    // 매장 기준(Asia/Seoul) 오늘 'YYYY-MM-DD'.
    // new Date().toISOString() 을 쓰면 UTC 라서, 한국 시간 오전 9시 이전에는 어제 날짜가 나온다.
    function todaySeoul() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(new Date());
    }
    function timeAgo(ms) {
      if (!isNum(ms)) return '';
      const d = new Date(ms);
      return d.toLocaleString('ko-KR', { hour: '2-digit', minute: '2-digit', month: 'numeric', day: 'numeric' });
    }

    // 동적 클래스는 Tailwind JIT 가 못 잡으므로 완전한 문자열을 정적 매핑에 미리 적어둔다
    const ALERT_STYLE = {
      danger: { wrap: 'border-red-500/40 bg-red-500/10',   dot: 'bg-red-500',   badge: 'bg-red-500/15 text-red-300 ring-red-400/30',   label: '긴급' },
      warn:   { wrap: 'border-amber-500/40 bg-amber-500/10', dot: 'bg-amber-400', badge: 'bg-amber-500/15 text-amber-300 ring-amber-400/30', label: '주의' },
      info:   { wrap: 'border-sky-500/40 bg-sky-500/10',    dot: 'bg-sky-400',   badge: 'bg-sky-500/15 text-sky-300 ring-sky-400/30',   label: '정보' },
      ok:     { wrap: 'border-sage-500/30 bg-sage-500/5',   dot: 'bg-sage-500',  badge: 'bg-sage-500/15 text-sage-300 ring-sage-400/25', label: '정상' }
    };
    const BADGE_TONE = {
      gray:  'bg-stone-500/15 text-stone-300 ring-stone-400/20',
      amber: 'bg-amber-500/15 text-amber-300 ring-amber-400/25',
      green: 'bg-sage-500/20 text-sage-300 ring-sage-400/25',
      red:   'bg-red-500/15 text-red-300 ring-red-400/25',
      blue:  'bg-sky-500/15 text-sky-300 ring-sky-400/25',
      roast: 'bg-roast-700/50 text-amber-200 ring-amber-500/20'
    };
    const BTN_VARIANT = {
      primary:   'bg-amber-500 hover:bg-amber-400 text-roast-950 font-semibold shadow shadow-amber-900/30',
      secondary: 'bg-roast-700 hover:bg-roast-600 text-stone-100 ring-1 ring-roast-600',
      outline:   'bg-transparent ring-1 ring-roast-600 hover:bg-roast-800 text-stone-200',
      ghost:     'bg-transparent hover:bg-roast-800 text-stone-300',
      danger:    'bg-red-600 hover:bg-red-500 text-white font-semibold'
    };
    const BTN_SIZE = { sm: 'px-2.5 py-1.5 text-xs', md: 'px-3.5 py-2 text-sm', lg: 'px-5 py-2.5 text-[15px]' };

    // Notion 할일/발주 상태 색 (스키마의 정확한 한글 값)
    const TODO_STATUS = { '할 일': 'gray', '진행중': 'amber', '완료': 'green' };
    const TODO_PRIORITY = { '높음': 'red', '보통': 'amber', '낮음': 'gray' };
    const NOTION_ORDER_STATUS = { '발주필요': 'red', '발주완료': 'amber', '배송중': 'blue', '입고완료': 'green' };
    // cafe_purchase_orders(DB) 상태는 Notion 과 다르다 — 스키마 체크 제약: 발주완료/배송중/입고완료/취소
    const PO_STATUS = { '발주완료': 'amber', '배송중': 'blue', '입고완료': 'green', '취소': 'gray' };

    const NAV = [
      { to: '#/', path: '/', label: '대시보드', icon: '📊' },
      { to: '#/notion', path: '/notion', label: '할일·발주', icon: '✅' },
      { to: '#/data', path: '/data', label: '데이터', icon: '🗂️' }
    ];

    // ========================================
    // 훅: 해시 라우팅 · 비동기 로더
    // ========================================
    function currentHashPath() {
      const h = window.location.hash || '#/';
      const p = h.replace(/^#/, '');
      return p === '' ? '/' : p;
    }
    function useHashRoute() {
      const [path, setPath] = useState(currentHashPath());
      useEffect(function () {
        function onHash() { setPath(currentHashPath()); window.scrollTo(0, 0); }
        window.addEventListener('hashchange', onHash);
        return function () { window.removeEventListener('hashchange', onHash); };
      }, []);
      return path;
    }
    function navigate(to) { window.location.hash = to; }

    // fn 은 Promise 를 반환. reload() 로 재요청. deps 변경 시 자동 재요청.
    function useAsync(fn, deps) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [tick, setTick] = useState(0);
      const fnRef = useRef(fn); fnRef.current = fn;
      useEffect(function () {
        let alive = true;
        setLoading(true); setError(null);
        Promise.resolve().then(function () { return fnRef.current(); })
          .then(function (d) { if (alive) { setData(d); setLoading(false); } })
          .catch(function (e) { if (alive) { setError((e && e.message) || '요청에 실패했습니다.'); setLoading(false); } });
        return function () { alive = false; };
      }, (deps || []).concat(tick));
      const reload = useCallback(function () { setTick(function (t) { return t + 1; }); }, []);
      return { data: data, loading: loading, error: error, reload: reload };
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트
    // ========================================
    function Spinner(props) {
      const s = props.size || 16;
      return <span className="dr-spin inline-block rounded-full border-2 border-current border-t-transparent align-[-2px]"
                   style={{ width: s, height: s }} aria-hidden="true" />;
    }

    function Skeleton(props) {
      return <div className={cx('dr-shimmer rounded-lg', props.className)} style={props.style} />;
    }

    function Card(props) {
      return (
        <section className={cx('rounded-2xl bg-roast-900/80 ring-1 ring-roast-700/60 shadow-lg shadow-black/30', props.className)}>
          {(props.title || props.right || props.eyebrow) && (
            <header className="flex items-start justify-between gap-3 px-4 sm:px-5 pt-4 pb-3 border-b border-roast-800/80">
              <div className="min-w-0">
                {props.eyebrow && <div className="text-[11px] font-semibold uppercase tracking-wider text-amber-400/80 mb-0.5">{props.eyebrow}</div>}
                {props.title && <h3 className="text-[15px] font-semibold text-stone-100 tracking-tight truncate">{props.title}</h3>}
                {props.subtitle && <p className="text-xs text-stone-400 mt-0.5">{props.subtitle}</p>}
              </div>
              {props.right && <div className="shrink-0">{props.right}</div>}
            </header>
          )}
          <div className={cx('px-4 sm:px-5', props.pad === false ? '' : 'py-4', props.bodyClass)}>{props.children}</div>
        </section>
      );
    }

    function Button(props) {
      const variant = BTN_VARIANT[props.variant] || BTN_VARIANT.secondary;
      const size = BTN_SIZE[props.size] || BTN_SIZE.md;
      return (
        <button
          type={props.type || 'button'}
          onClick={props.onClick}
          disabled={props.disabled}
          aria-label={props['aria-label']}
          className={cx('inline-flex items-center justify-center gap-1.5 rounded-xl transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-400/60 disabled:opacity-50 disabled:cursor-not-allowed', variant, size, props.className)}>
          {props.loading && <Spinner size={14} />}
          {props.children}
        </button>
      );
    }

    function Badge(props) {
      const tone = BADGE_TONE[props.tone] || BADGE_TONE.gray;
      return <span className={cx('inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] font-medium ring-1 ring-inset whitespace-nowrap', tone, props.className)}>{props.children}</span>;
    }

    function Field(props) {
      return (
        <label className={cx('block', props.className)}>
          {props.label && <span className="mb-1 block text-xs font-medium text-stone-300">{props.label}</span>}
          <input
            ref={props.inputRef}
            type={props.type || 'text'}
            value={props.value}
            onChange={props.onChange}
            onKeyDown={props.onKeyDown}
            placeholder={props.placeholder}
            disabled={props.disabled}
            inputMode={props.inputMode}
            autoComplete={props.autoComplete}
            step={props.step}
            className={cx('w-full rounded-xl bg-roast-950/70 px-3 py-2 text-sm text-stone-100 placeholder-stone-500 ring-1 ring-inset transition-colors focus:outline-none focus:ring-2',
              props.error ? 'ring-red-500/60 focus:ring-red-400' : 'ring-roast-700 focus:ring-amber-400/70')} />
          {props.error && <span className="mt-1 block text-xs text-red-400">{props.error}</span>}
        </label>
      );
    }

    function Select(props) {
      return (
        <label className={cx('block', props.className)}>
          {props.label && <span className="mb-1 block text-xs font-medium text-stone-300">{props.label}</span>}
          <select value={props.value} onChange={props.onChange} disabled={props.disabled}
            className="w-full rounded-xl bg-roast-950/70 px-3 py-2 text-sm text-stone-100 ring-1 ring-inset ring-roast-700 focus:outline-none focus:ring-2 focus:ring-amber-400/70">
            {(props.options || []).map(function (o) {
              const val = typeof o === 'object' ? o.value : o;
              const lab = typeof o === 'object' ? o.label : o;
              return <option key={val} value={val}>{lab}</option>;
            })}
          </select>
        </label>
      );
    }

    function Modal(props) {
      useEffect(function () {
        if (!props.open) return;
        function onKey(e) { if (e.key === 'Escape' && props.onClose) props.onClose(); }
        document.addEventListener('keydown', onKey);
        const prev = document.body.style.overflow; document.body.style.overflow = 'hidden';
        return function () { document.removeEventListener('keydown', onKey); document.body.style.overflow = prev; };
      }, [props.open]);
      if (!props.open) return null;
      const sizeCls = props.size === 'lg' ? 'max-w-2xl' : props.size === 'sm' ? 'max-w-sm' : 'max-w-lg';
      return (
        <div className="fixed inset-0 z-[70] flex items-start justify-center overflow-y-auto p-4 sm:p-6">
          <div className="fixed inset-0 bg-black/70 backdrop-blur-sm" onClick={props.onClose} />
          <div className={cx('dr-fade relative z-10 my-6 w-full rounded-2xl bg-roast-900 ring-1 ring-roast-700 shadow-2xl', sizeCls)}>
            <header className="flex items-center justify-between gap-3 border-b border-roast-800 px-5 py-3.5">
              <h3 className="text-[15px] font-semibold text-stone-100">{props.title}</h3>
              <button onClick={props.onClose} aria-label="닫기" className="rounded-lg p-1 text-stone-400 hover:bg-roast-800 hover:text-stone-200">✕</button>
            </header>
            <div className="px-5 py-4">{props.children}</div>
            {props.footer && <footer className="flex justify-end gap-2 border-t border-roast-800 px-5 py-3.5">{props.footer}</footer>}
          </div>
        </div>
      );
    }

    function EmptyState(props) {
      return (
        <div className="flex flex-col items-center justify-center gap-1 py-10 text-center">
          <div className="text-3xl opacity-70">{props.icon || '🗒️'}</div>
          <p className="text-sm text-stone-300">{props.title || '데이터가 없습니다.'}</p>
          {props.hint && <p className="text-xs text-stone-500">{props.hint}</p>}
        </div>
      );
    }

    function ErrorState(props) {
      return (
        <div className="rounded-xl border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm text-red-200">
          <div className="font-semibold">불러오지 못했습니다</div>
          <div className="mt-0.5 text-red-300/90">{props.message || '알 수 없는 오류'}</div>
          {props.onRetry && <div className="mt-2"><Button size="sm" variant="outline" onClick={props.onRetry}>다시 시도</Button></div>}
        </div>
      );
    }

    // 증감 표시 (▲▼) — deltaPct 가 null 이어도 방어
    function Delta(props) {
      const v = props.value;
      if (!isNum(v)) return <span className="text-xs text-stone-500">— 비교 없음</span>;
      const up = v > 0, flat = v === 0;
      const cls = flat ? 'text-stone-400' : up ? 'text-sage-300' : 'text-red-400';
      const arrow = flat ? '–' : up ? '▲' : '▼';
      return <span className={cx('inline-flex items-center gap-0.5 text-xs font-semibold', cls)}>{arrow} {fmtPct(Math.abs(v))}</span>;
    }

    // ========================================
    // 🔔 토스트
    // ========================================
    const ToastCtx = createContext(function () {});
    function useToast() { return useContext(ToastCtx); }
    function ToastProvider(props) {
      const [toasts, setToasts] = useState([]);
      const push = useCallback(function (msg, tone) {
        const id = Math.random().toString(36).slice(2);
        setToasts(function (t) { return t.concat([{ id: id, msg: msg, tone: tone || 'info' }]); });
        setTimeout(function () { setToasts(function (t) { return t.filter(function (x) { return x.id !== id; }); }); }, 3600);
      }, []);
      const toneCls = { info: 'bg-roast-800 ring-roast-600 text-stone-100', ok: 'bg-sage-700/90 ring-sage-500 text-white', err: 'bg-red-600/90 ring-red-400 text-white' };
      return (
        <ToastCtx.Provider value={push}>
          {props.children}
          <div className="fixed right-3 top-3 z-[90] flex w-[min(92vw,360px)] flex-col gap-2">
            {toasts.map(function (t) {
              return <div key={t.id} className={cx('dr-fade rounded-xl px-3.5 py-2.5 text-sm shadow-lg ring-1', toneCls[t.tone] || toneCls.info)}>{t.msg}</div>;
            })}
          </div>
        </ToastCtx.Provider>
      );
    }

    // ========================================
    // 🔐 인증 — 헬스체크 · 세션복구 · 로그인/가입 (Provider 가 소유)
    // ========================================
    const AuthCtx = createContext(null);
    function useAuth() { return useContext(AuthCtx); }

    function AuthProvider(props) {
      const [booting, setBooting] = useState(true);
      const [health, setHealth] = useState(null);
      const [healthError, setHealthError] = useState(false);
      const [user, setUser] = useState(null);

      const boot = useCallback(function () {
        setBooting(true); setHealthError(false);
        let alive = true;
        (async function () {
          let h = null;
          try {
            const res = await fetch(API_BASE + '/health', { cache: 'no-store' });
            if (!res.ok) throw new Error('health ' + res.status);
            h = await res.json();
          } catch (e) {
            if (alive) { setHealth(null); setHealthError(true); setBooting(false); }
            return;
          }
          if (!alive) return;
          setHealth(h);
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            try {
              const r = await fetch(API_BASE + '/auth/me', { headers: { Authorization: 'Bearer ' + token } });
              if (r.status === 401) { localStorage.removeItem(TOKEN_KEY); if (alive) setUser(null); }
              else if (r.ok) { const d = await r.json(); if (alive) setUser(d.user); }
            } catch (e) { /* 네트워크 오류: 토큰 보존, 이번 세션만 비로그인 */ }
          }
          if (alive) setBooting(false);
        })();
        return function () { alive = false; };
      }, []);

      useEffect(function () { return boot(); }, [boot]);

      // 로그인/가입 (토큰 발급 전)
      const authSubmit = useCallback(async function (mode, body) {
        const path = mode === 'login' ? '/auth/login' : '/auth/register';
        const res = await fetch(API_BASE + path, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        let d = null; try { d = await res.json(); } catch (e) {}
        if (!res.ok) throw new Error((d && d.error) || '요청에 실패했습니다.');
        localStorage.setItem(TOKEN_KEY, d.token);
        setUser(d.user);
        return d;
      }, []);

      const logout = useCallback(function () {
        localStorage.removeItem(TOKEN_KEY);
        setUser(null);
        navigate('#/');
      }, []);

      // 인증 포함 fetch — 401 이면 토큰 제거 후 로그아웃
      const api = useMemo(function () {
        async function call(method, path, bodyObj) {
          const token = localStorage.getItem(TOKEN_KEY);
          const res = await fetch(API_BASE + path, {
            method: method,
            headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { Authorization: 'Bearer ' + token } : {}),
            body: bodyObj != null ? JSON.stringify(bodyObj) : undefined
          });
          if (res.status === 401) {
            localStorage.removeItem(TOKEN_KEY); setUser(null);
            throw new Error('세션이 만료되었습니다. 다시 로그인해 주세요.');
          }
          let d = null; try { d = await res.json(); } catch (e) {}
          if (!res.ok) throw new Error((d && d.error) || ('요청 실패 (' + res.status + ')'));
          return d;
        }
        return {
          get: function (p) { return call('GET', p); },
          post: function (p, b) { return call('POST', p, b); },
          patch: function (p, b) { return call('PATCH', p, b); },
          put: function (p, b) { return call('PUT', p, b); },
          del: function (p) { return call('DELETE', p); }
        };
      }, []);

      const value = { booting: booting, health: health, healthError: healthError, user: user, api: api, authSubmit: authSubmit, logout: logout, retryBoot: boot };
      return <AuthCtx.Provider value={value}>{props.children}</AuthCtx.Provider>;
    }

        if (mode === 'register' && name.trim().length < 1) { setError('이름을 입력해 주세요.'); return; }
        setSubmitting(true);
        try {
          const body = mode === 'login' ? { email: email, password: password } : { email: email, password: password, name: name.trim() };
          await auth.authSubmit(mode, body);

      function onRefresh() { setDone({}); setRefreshNonce(function (n) { return n + 1; }); }
