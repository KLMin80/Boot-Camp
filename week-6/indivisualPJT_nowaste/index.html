<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ==== SECTION:API ====
   프론트는 DB를 모른다. 오직 /api/* 만 안다.
   나중에 DB를 바꾸든 OCR 엔진을 바꾸든 server.js 안에서만 고치면 된다. */

const TOKEN_KEY = 'nowaste.token';
const getToken = () => localStorage.getItem(TOKEN_KEY);
const setToken = (t) => (t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY));

class ApiError extends Error {
  constructor(status, message) { super(message); this.status = status; }
}

async function api(method, url, body) {
  let res;
  try {
    res = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(getToken() ? { Authorization: `Bearer ${getToken()}` } : {}),
      },
      ...(body ? { body: JSON.stringify(body) } : {}),
    });
  } catch {
    // server.js 없이 Live Server로 열면 여기로 온다 (DEV.md 함정 8)
    throw new ApiError(0, '서버에 연결할 수 없어요. `node server.js`로 띄운 주소로 접속했는지 확인해 주세요.');
  }
  if (res.status === 204) return null;

  let data = null;
  try { data = await res.json(); } catch { /* HTML이 돌아온 경우 */ }
  if (!res.ok) throw new ApiError(res.status, data?.error || `요청이 실패했어요 (${res.status})`);
  return data;
}

const API = {
  signup: (email, password) => api('POST', '/api/auth/signup', { email, password }),
  login:  (email, password) => api('POST', '/api/auth/login',  { email, password }),

  shelfLife: () => api('GET', '/api/shelf-life'),

  items:   (status) => api('GET', `/api/items${status ? `?status=${status}` : ''}`),
  addItem: (body)   => api('POST', '/api/items', body),
  parseLabel: (image, storage) => api('POST', '/api/label/parse', { image, storage }),
  parseReceipt: (image) => api('POST', '/api/receipt/parse', { image }),
  patch:   (id, b)  => api('PATCH', `/api/items/${id}`, b),
  freeze:  (id)     => api('POST', `/api/items/${id}/freeze`),
  receive: (id)     => api('POST', `/api/items/${id}/receive`),
  close:   (id, outcome, amount) =>
             api('POST', `/api/items/${id}/close`, { outcome, discarded_amount: amount ?? null }),
  consume: (id, amount) => api('POST', `/api/items/${id}/consume`, { amount }),
  remove:  (id)     => api('DELETE', `/api/items/${id}`),

  waste:    (months = 6) => api('GET', `/api/stats/waste?months=${months}`),
  predict:  () => api('GET', '/api/stats/predict'),
  recipes:  (tag, includeOrdered) => api('POST', '/api/recipes/suggest', { tag, includeOrdered }),
  recipeByName: (dish, tag, includeOrdered) => api('POST', '/api/recipes/byname', { dish, tag, includeOrdered }),
  recipesWith: (ingredients, tag) => api('POST', '/api/recipes/with', { ingredients, tag }),
  buyLinks: (names) => api('POST', '/api/buy-links', { items: names }),
};

/* ── 날짜 · 표시 ──
   서버가 days_left를 계산해서 준다. 브라우저에서 날짜 산수를 하지 않는다.
   (toISOString()으로 다루면 KST 자정이 UTC 전날로 밀린다 — DEV.md 함정 6) */
const won = (n) => Math.round(n || 0).toLocaleString('ko-KR');
const fmtDate = (ymd) => { if (!ymd) return ''; const [, m, d] = ymd.split('-'); return `${+m}월 ${+d}일`; };

const STORAGE = {
  fridge:     { label: '냉장',      icon: '❄️' },
  freezer:    { label: '냉동',      icon: '🧊' },
  room:       { label: '실온',      icon: '🌡️' },
  room_shade: { label: '실온·그늘', icon: '🌥️' },
};

// 재료별 기본 단위 추정 (고기·채소는 g, 우유는 ml, 낱개로 세는 건 개)
const UNITS = ['g', 'ml', '개'];
const COUNT_INGS = new Set(['양파', '사과', '배', '달걀', '바나나', '귤', '감자', '고구마', '토마토', '애호박', '오이', '파프리카']);
const ML_INGS = new Set(['우유', '요거트']);
const defaultUnit = (ing) => (ML_INGS.has(ing) ? 'ml' : COUNT_INGS.has(ing) ? '개' : 'g');
const defaultAmount = (unit) => (unit === '개' ? 1 : unit === 'ml' ? 500 : 300);

/* 업로드 크기만 줄인다. 2048px 유지 — 더 줄이면 작은 라벨 날짜를 놓친다(실측).
   OpenAI가 내부적으로 어차피 축소하므로 토큰(비용)은 안 늘고, 업로드만 가벼워진다. */
function fileToDataUrl(file, maxDim = 2048, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지를 열 수 없어요')); };
    img.src = url;
  });
}

/* ===== 폰 뒤로가기 처리 =====
   화면 전환·시트 열기마다 히스토리 항목을 쌓고, 뒤로가기는 앱 안에서 한 단계 되돌린다.
   (안 하면 폰 뒤로가기가 웹앱을 통째로 떠나버린다) */
const _backGuards = [];
let _backSelf = false; // 우리가 부른 history.back() (그 popstate는 무시)

function useBackGuard(active, onBack) {
  const cb = useRef(onBack);
  cb.current = onBack;
  useEffect(() => {
    if (!active) return;
    // poppedByBack: 뒤로가기로 닫혔는지 표시(각 guard에 둔다).
    // 상태변경→cleanup은 비동기라 전역 플래그로는 못 잡는다(한 칸 더 back 되는 버그).
    const g = { poppedByBack: false, close: () => cb.current && cb.current() };
    _backGuards.push(g);
    try { history.pushState({ nw: _backGuards.length }, ''); } catch (e) {}
    return () => {
      const i = _backGuards.indexOf(g);
      if (i >= 0) _backGuards.splice(i, 1);
      // 정상 닫기(X버튼 등)면 우리가 쌓은 히스토리 항목을 소비. 뒤로가기로 닫혔으면 이미 소비됨.
      if (!g.poppedByBack) { _backSelf = true; try { history.back(); } catch (e) { _backSelf = false; } }
    };
  }, [active]);
}

function useBackListener() {
  useEffect(() => {
    const onPop = () => {
      if (_backSelf) { _backSelf = false; return; }     // 우리가 부른 back → 무시
      const g = _backGuards[_backGuards.length - 1];
      if (g) { g.poppedByBack = true; g.close(); }       // 닫기는 상태변경(비동기), 플래그는 지금 세팅
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
}

/* ==== SECTION:PRIMITIVES ====
   색은 오직 '남은 시간'에만 배정한다. 브랜드 색은 중립.
   그래야 냉장고를 열었을 때 빨간 게 먼저 보인다. */

const urgencyOf = (d) => (d <= 1 ? 'urgent' : d <= 4 ? 'warn' : 'calm');
const TONE = {
  urgent: { text:'text-urgent', bg:'bg-urgent', border:'border-urgent', soft:'bg-urgent/[.06]' },
  warn:   { text:'text-warn',   bg:'bg-warn',   border:'border-warn',   soft:'bg-warn/[.07]' },
  calm:   { text:'text-calm',   bg:'bg-calm',   border:'border-calm',   soft:'bg-calm/[.06]' },
};

function Stamp({ days, className = '' }) {
  const label = days < 0 ? '지남' : days === 0 ? 'D-DAY' : `D-${days}`;
  return <span className={`stamp text-[11px] ${TONE[urgencyOf(days)].text} ${className}`}>{label}</span>;
}

/* 덜어 쓴 것에만 뜬다. 가득 찬 게이지는 아무 말도 안 하면서 취소선처럼 보인다. */
function Gauge({ remaining, capacity, tone }) {
  if (remaining >= capacity) return null;
  const pct = Math.max(6, Math.round((remaining / capacity) * 100));
  return (
    <div className="h-[3px] w-10 rounded-full bg-line overflow-hidden shrink-0">
      <div className={`h-full ${TONE[tone].bg} opacity-70`} style={{ width: pct + '%' }} />
    </div>
  );
}

function ItemRow({ item, onTap }) {
  const tone = urgencyOf(item.days_left);
  return (
    <button onClick={() => onTap(item)}
      className="tap w-full flex items-center gap-3 py-3 pl-3 pr-4 bg-surface text-left active:bg-paper transition-colors">
      <div className={`w-[3px] self-stretch rounded-full ${TONE[tone].bg} ${tone === 'calm' ? 'opacity-40' : ''}`} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5">
          <span className="font-semibold truncate">{item.name}</span>
          {item.storage === 'freezer' && <span className="text-[11px] shrink-0">🧊</span>}
        </div>
        <div className="tnum text-[13px] text-muted mt-0.5">
          {item.remaining}{item.unit}
          {item.remaining !== item.capacity && <span className="opacity-50"> / {item.capacity}{item.unit}</span>}
        </div>
      </div>
      <Gauge remaining={item.remaining} capacity={item.capacity} tone={tone} />
      <Stamp days={item.days_left} />
    </button>
  );
}

function TimeDivider({ label, count }) {
  return (
    <div className="flex items-center gap-2.5 px-4 pt-6 pb-2">
      <span className="text-[12px] font-bold tracking-wide text-muted">{label}</span>
      <span className="tnum text-[12px] text-muted/70">{count}</span>
      <div className="flex-1 h-px bg-line" />
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  const bad = msg.tone === 'bad';
  return (
    <div className={`pop fixed bottom-24 left-1/2 -translate-x-1/2 z-50 max-w-[92%] text-[14px] font-medium px-4 py-2.5 rounded-2xl shadow-lg text-center ${
      bad ? 'bg-urgent text-white' : 'bg-ink text-white'}`}>
      {msg.text}
    </div>
  );
}

/* 하단 시트 — 재고를 탭하면 여기서 소진·폐기·냉동을 정한다 */
function Sheet({ open, onClose, children }) {
  useBackGuard(open, onClose); // 폰 뒤로가기로 시트 닫기 (모든 시트 공통)
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-ink/40" />
      <div onClick={(e) => e.stopPropagation()}
        className="slideup relative w-full max-w-[420px] bg-surface rounded-t-2xl p-4 pb-6">
        {children}
      </div>
    </div>
  );
}

function Spinner({ label = '불러오는 중' }) {
  return <p className="text-center text-[13px] text-muted py-16">{label}…</p>;
}

const NAV = [
  { key:'home',    label:'냉장고', icon:'🧺' },
  { key:'add',     label:'담기',   icon:'📷' },
  { key:'confirm', label:'확인',   icon:'✓'  },
  { key:'cook',    label:'요리',   icon:'🥘' },
  { key:'report',  label:'리포트', icon:'📊' },
];

function BottomNav({ view, setView, pendingCount }) {
  return (
    <nav className="sticky bottom-0 z-30 grid grid-cols-5 bg-surface/95 backdrop-blur border-t border-line">
      {NAV.map((n) => {
        const on = view === n.key;
        return (
          <button key={n.key} onClick={() => setView(n.key)}
            className="tap relative flex flex-col items-center gap-0.5 pt-2.5 pb-3 active:bg-paper">
            <span className={`text-[17px] leading-none ${on ? '' : 'opacity-45 grayscale'}`}>{n.icon}</span>
            <span className={`text-[10px] font-semibold ${on ? 'text-ink' : 'text-muted'}`}>{n.label}</span>
            {n.key === 'confirm' && pendingCount > 0 && (
              <span className="tnum absolute top-1.5 right-[26%] min-w-[15px] h-[15px] px-1 rounded-full bg-urgent text-white text-[10px] font-bold leading-[15px] text-center">
                {pendingCount}
              </span>
            )}
            {on && <span className="absolute top-0 inset-x-[26%] h-[2px] bg-ink rounded-full" />}
          </button>
        );
      })}
    </nav>
  );
}

function Header({ title, sub, right }) {
  return (
    <header className="sticky top-0 z-30 bg-paper/92 backdrop-blur px-4 pt-4 pb-3 border-b border-line/70">
      <div className="flex items-end justify-between gap-3">
        <div className="min-w-0">
          <h1 className="text-[22px] font-extrabold tracking-[-.02em] leading-none">{title}</h1>
          {sub && <p className="text-[12px] text-muted mt-1.5">{sub}</p>}
        </div>
        {right}
      </div>
    </header>
  );
}

/* ==== SECTION:AUTH ==== */

function AuthView({ onDone }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(''); setBusy(true);
    try {
      const r = mode === 'login' ? await API.login(email, pw) : await API.signup(email, pw);
      setToken(r.token);
      onDone(r.email);
    } catch (ex) {
      setErr(ex.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="flex-1 flex flex-col justify-center px-7 pb-16">
      <div className="rise">
        <h1 className="text-[34px] font-extrabold tracking-[-.03em] leading-none">남김없이</h1>
        <p className="text-[14px] text-muted mt-3 leading-relaxed">
          장 본 것부터 다 먹는 것까지.<br />
          버리는 음식과 식비를 함께 줄입니다.
        </p>
      </div>

      <form onSubmit={submit} className="mt-9 space-y-2.5">
        <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)}
          placeholder="이메일" autoComplete="username"
          className="w-full h-[52px] px-4 rounded-xl border-2 border-line bg-surface font-medium
                     focus:border-ink outline-none transition-colors" />
        <input type="password" required value={pw} onChange={(e) => setPw(e.target.value)}
          placeholder="비밀번호 (6자 이상)" autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
          className="w-full h-[52px] px-4 rounded-xl border-2 border-line bg-surface font-medium
                     focus:border-ink outline-none transition-colors" />

        {err && <p className="text-[13px] text-urgent font-semibold pt-1">{err}</p>}

        <button type="submit" disabled={busy}
          className="tap w-full h-[54px] rounded-xl bg-ink text-white font-bold active:opacity-80 disabled:opacity-50">
          {busy ? '잠시만요…' : mode === 'login' ? '로그인' : '가입하고 시작하기'}
        </button>
      </form>

      <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setErr(''); }}
        className="tap mt-5 text-[13px] text-muted font-semibold active:text-ink">
        {mode === 'login' ? '처음이신가요? 가입하기' : '이미 계정이 있어요 → 로그인'}
      </button>
    </div>
  );
}

/* ==== SECTION:HOME ==== */

/* 이 앱의 signature.
   다른 냉장고 앱은 "3개 임박"이라고 알리고 끝난다. 이건 살릴 방법을 준다. */
function RescueCard({ doomed, presets, onFreezeAll, onCook, busy }) {
  if (!doomed.length) {
    return (
      <div className="rise mx-4 mt-4 rounded-2xl border border-calm/30 bg-calm/[.06] px-5 py-6 text-center">
        <div className="text-[30px] leading-none">🌿</div>
        <p className="mt-2.5 font-bold text-calm">오늘은 버릴 게 없어요</p>
        <p className="text-[13px] text-muted mt-1">급한 재료가 하나도 없습니다.</p>
      </div>
    );
  }

  // freezer 프리셋이 없는 재료 = 얼리면 못 쓰는 재료 (두부·감자·달걀…)
  const canFreeze = (ing) => Boolean(presets[ing]?.freezer);
  const freezable = doomed.filter((i) => canFreeze(i.ingredient));
  const value = doomed.reduce((s, it) => s + Math.round((it.price || 0) * (it.remaining / it.capacity)), 0);

  return (
    <section className="rise mx-4 mt-4 rounded-2xl border-2 border-urgent bg-surface overflow-hidden shadow-[0_6px_24px_-10px_rgba(226,58,46,.5)]">
      <div className="bg-urgent px-5 py-2.5 flex items-baseline justify-between">
        <h2 className="text-white font-extrabold text-[15px] tracking-[-.01em]">오늘 안 쓰면 버려요</h2>
        {value > 0 && <span className="tnum text-white/85 text-[12px] font-semibold">{won(value)}원어치</span>}
      </div>

      <ul className="px-5 pt-3.5 pb-1">
        {doomed.map((it) => (
          <li key={it.id} className="flex items-center gap-2 py-1.5">
            <span className="font-bold truncate">{it.name}</span>
            <span className="tnum text-[13px] text-muted shrink-0">{it.remaining}{it.unit}</span>
            {canFreeze(it.ingredient) && <span className="text-[11px] shrink-0" title="얼려도 괜찮아요">🧊</span>}
            <div className="flex-1 border-b border-dotted border-line self-end mb-1" />
            <Stamp days={it.days_left} />
          </li>
        ))}
      </ul>

      {freezable.length < doomed.length && (
        <p className="px-5 pb-1 text-[11px] text-muted leading-relaxed">
          🧊 없는 건 얼리면 못 써요. <span className="font-semibold text-ink">오늘 요리로 쓰는 수밖에 없습니다.</span>
        </p>
      )}

      <div className="grid grid-cols-2 gap-2 p-3 pt-2.5">
        <button onClick={() => onFreezeAll(freezable)} disabled={!freezable.length || busy}
          className={`tap flex items-center justify-center gap-1.5 h-[52px] rounded-xl border-2 font-bold transition-colors ${
            freezable.length && !busy
              ? 'border-frost text-frost active:bg-frost/10'
              : 'border-line text-muted/40 cursor-not-allowed'
          }`}>
          <span className="text-[17px]">🧊</span>
          냉동실로{freezable.length > 0 && freezable.length < doomed.length ? ` (${freezable.length})` : ''}
        </button>
        <button onClick={onCook}
          className="tap flex items-center justify-center gap-1.5 h-[52px] rounded-xl bg-ink text-white font-bold active:opacity-80">
          <span className="text-[17px]">🥘</span> 오늘 요리로
        </button>
      </div>
    </section>
  );
}

/* 재고를 탭하면 뜨는 시트. 여기서 소진·폐기·냉동이 기록된다. */
function ItemSheet({ item, presets, onClose, onAction, busy }) {
  const [showUse, setShowUse] = useState(false);
  const [amt, setAmt] = useState('');
  useEffect(() => { setShowUse(false); setAmt(''); }, [item?.id]);
  if (!item) return null;
  const freezable = Boolean(presets[item.ingredient]?.freezer) && item.storage !== 'freezer';
  const worth = Math.round((item.price || 0) * (item.remaining / item.capacity));
  // 빠른 버튼: 남은 양 기준 비율 → 숫자 칸에 채워 넣고, '빼기'로 확정
  const fillFrac = (frac) => {
    const v = item.remaining * frac;
    setAmt(String(item.unit === '개' ? Math.max(1, Math.round(v)) : Math.round(v)));
  };
  const doUse = () => {
    const n = Number(amt);
    if (n > 0) { onAction('consume', item, n); setShowUse(false); setAmt(''); }
  };

  return (
    <Sheet open onClose={onClose}>
      <div className="flex items-start justify-between gap-3">
        <div className="min-w-0">
          <h3 className="text-[19px] font-extrabold truncate">{item.name}</h3>
          <p className="tnum text-[13px] text-muted mt-1">
            {item.remaining}{item.unit} 남음 · {STORAGE[item.storage].icon} {STORAGE[item.storage].label}
            {worth > 0 && <span> · {won(worth)}원어치</span>}
          </p>
        </div>
        <Stamp days={item.days_left} />
      </div>

      <p className="text-[12px] text-muted mt-2">
        {fmtDate(item.expiry_date)}까지
        {item.expiry_source === 'preset' && <span className="ml-1 opacity-70">(보관기간으로 추정한 날짜예요)</span>}
      </p>

      <div className="grid grid-cols-2 gap-2 mt-5">
        <button disabled={busy} onClick={() => onAction('eaten', item)}
          className="tap h-[52px] rounded-xl bg-ink text-white font-bold active:opacity-80 disabled:opacity-50">
          다 먹었어요
        </button>
        <button disabled={busy} onClick={() => onAction('discarded', item)}
          className="tap h-[52px] rounded-xl border-2 border-urgent text-urgent font-bold active:bg-urgent/10 disabled:opacity-50">
          버렸어요
        </button>
      </div>

      {/* 부분 차감 — 앱 없이 요리해서 일부만 썼을 때 남은 양을 맞춘다 */}
      {!showUse ? (
        <button disabled={busy} onClick={() => setShowUse(true)}
          className="tap w-full h-[50px] rounded-xl border-2 border-line font-bold mt-2 active:bg-paper disabled:opacity-50">
          ✏️ 조금 썼어요
        </button>
      ) : (
        <div className="rounded-xl border-2 border-line p-3 mt-2">
          <p className="text-[12px] font-bold text-muted mb-2">
            얼마나 썼어요? <span className="font-normal opacity-80">— 남은 {item.remaining}{item.unit} 중</span>
          </p>
          <div className="grid grid-cols-4 gap-2 mb-2">
            {[['¼', 0.25], ['½', 0.5], ['¾', 0.75], ['전량', 1]].map(([lbl, frac]) => (
              <button key={lbl} onClick={() => fillFrac(frac)}
                className="tap h-[42px] rounded-lg border-2 border-line font-bold text-[14px] active:bg-paper">
                {lbl}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <div className="flex-1 flex items-center rounded-lg border-2 border-line focus-within:border-ink px-3 h-[46px]">
              <input type="number" min="0" inputMode="decimal" value={amt} autoFocus
                onChange={(e) => setAmt(e.target.value)} placeholder="직접 입력"
                className="tnum w-full bg-transparent font-semibold outline-none" />
              <span className="text-[13px] text-muted font-semibold ml-1">{item.unit}</span>
            </div>
            <button disabled={busy || !(Number(amt) > 0)} onClick={doUse}
              className="tap h-[46px] px-5 rounded-lg bg-ink text-white font-bold active:opacity-80 disabled:opacity-40">
              빼기
            </button>
          </div>
        </div>
      )}

      {freezable && (
        <button disabled={busy} onClick={() => onAction('freeze', item)}
          className="tap w-full h-[50px] rounded-xl border-2 border-frost text-frost font-bold mt-2 active:bg-frost/10 disabled:opacity-50">
          🧊 냉동실로 옮기기
        </button>
      )}
      {!freezable && item.storage !== 'freezer' && (
        <p className="text-[12px] text-muted text-center mt-3">
          {item.ingredient}은(는) 얼리면 못 써요.
        </p>
      )}

      <button disabled={busy} onClick={() => onAction('delete', item)}
        className="tap w-full h-[44px] text-[13px] text-muted font-semibold mt-2 active:text-ink disabled:opacity-50">
        기록에서 지우기
      </button>
    </Sheet>
  );
}

const TABS = [
  { key: 'all',     label: '전체' },
  { key: 'fridge',  label: '냉장' },
  { key: 'freezer', label: '냉동' },
  { key: 'room',    label: '실온' },
];

function HomeView({ items, ordered = [], loading, presets, pendingCount, setView, onFreezeAll, onItemAction, onReceive, busy, email, onLogout, toast, onAddOrdered }) {
  const [tab, setTab] = useState('all');
  const [sheet, setSheet] = useState(null);
  const [predict, setPredict] = useState([]);   // 소비 예측: 곧 떨어질 재료
  const [buyData, setBuyData] = useState(null);

  const doomed = useMemo(
    () => items.filter((i) => i.days_left <= 1 && i.storage !== 'freezer'),
    [items]
  );

  // 부분 차감으로 남은 양이 바뀔 때마다 예측 갱신
  useEffect(() => { API.predict().then((r) => setPredict(r.items || [])).catch(() => {}); }, [items]);

  const buyOne = async (ing) => {
    try { const d = await API.buyLinks([ing]); setBuyData({ items: [ing], ...d }); }

  const shown = useMemo(() => {

    { label: '여유 있어요',  test: (d) => d > 7 },

  const act = async (kind, item, extra) => {

    await onItemAction(kind, item, extra);

  return (
    <>
      <Header
        title="냉장고"
        sub={<span>{items.length}가지 · <button onClick={onLogout} className="underline underline-offset-2 active:text-ink">{email}</button></span>}

          <button onClick={() => setView('confirm')}

            <span className="text-[12px] font-bold">확인할 것</span>
            <span className="tnum text-[12px] font-bold bg-white text-ink rounded-full w-[18px] h-[18px] leading-[18px] text-center">{pendingCount}</span>
          </button>
        ) : null}
      />

      {loading ? <Spinner /> : (
        <>
          <RescueCard doomed={doomed} presets={presets} busy={busy}
            onFreezeAll={onFreezeAll} onCook={() => setView('cook')} />

          {/* 곧 떨어져요 — 소비 속도로 예측. 상하기 전이 아니라 '떨어지기 전에' 미리 담기. */}
          {predict.length > 0 && (
            <section className="rise mx-4 mt-4 rounded-2xl border border-warn/40 bg-warn/[.06] overflow-hidden">
              <div className="flex items-center gap-1.5 px-4 pt-3 pb-1">
                <span className="text-[13px]">📉</span>
                <span className="text-[13px] font-bold text-warn">곧 떨어져요</span>
                <span className="text-[11px] text-muted">쓰는 속도로 보면</span>
              </div>
              <div className="divide-y divide-warn/15">
                {predict.map((p) => (
                  <div key={p.id} className="flex items-center gap-3 px-4 py-2.5">
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold truncate">{p.name}</p>
                      <p className="tnum text-[12px] text-muted">
                        {p.days_to_empty <= 0 ? '오늘내일 다 써요' : `약 ${p.days_to_empty}일 뒤 다 써요`} · {p.remaining}{p.unit} 남음
                      </p>
                    </div>
                    <button disabled={busy} onClick={() => buyOne(p.ingredient)}
                      className="tap text-[12px] font-bold text-white bg-warn px-3 py-1.5 rounded-lg active:opacity-80 disabled:opacity-50 shrink-0">
                      미리 담기
                    </button>
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* 곧 도착 — 주문했지만 아직 안 온 재료. 도착하면 냉장고로. */}
          {ordered.length > 0 && (
            <section className="mx-4 mt-4 rounded-2xl border border-frost/40 bg-frost/[.05] overflow-hidden">
              <div className="flex items-center gap-1.5 px-4 pt-3 pb-1">
                <span className="text-[13px]">🛒</span>
                <span className="text-[13px] font-bold text-frost">곧 도착</span>
                <span className="tnum text-[12px] text-muted">{ordered.length}</span>
              </div>
              <div className="divide-y divide-frost/15">
                {ordered.map((it) => (
                  <div key={it.id} className="flex items-center gap-3 px-4 py-2.5">
                    <span className="font-semibold flex-1 truncate">{it.name}</span>
                    <button disabled={busy} onClick={() => onReceive(it)}
                      className="tap text-[12px] font-bold text-white bg-frost px-3 py-1.5 rounded-lg active:opacity-80 disabled:opacity-50">
                      받았어요
                    </button>
                  </div>
                ))}
              </div>
              <p className="text-[11px] text-muted px-4 py-2">받으면 냉장고로 옮기고 유통기한이 잡혀요. 요리 화면에서 '주문분 포함'을 켜면 미리 레시피에 반영돼요.</p>

              {TABS.map((t) => (
                <button key={t.key} onClick={() => setTab(t.key)}

                    tab === t.key ? 'bg-ink text-white border-ink' : 'bg-surface text-muted border-line active:bg-paper'
                  }`}>
                  {t.label}
                </button>
              ))}
            </div>
          )}

          {groups.map((g) => {
            const list = shown.filter((i) => g.test(i.days_left));
            if (!list.length) return null;
            return (
              <div key={g.label}>
                <TimeDivider label={g.label} count={list.length} />
                <div className="mx-4 rounded-xl overflow-hidden border border-line divide-y divide-line">
                  {list.map((it) => <ItemRow key={it.id} item={it} onTap={setSheet} />)}
                </div>

            );
          })}

          {items.length === 0 && (
            <div className="rise text-center px-8 py-14">
              <p className="text-[14px] text-muted leading-relaxed">
                냉장고가 비어 있어요.<br />장 본 걸 담아볼까요?
              </p>
              <button onClick={() => setView('add')}
                className="tap mt-5 h-[50px] px-6 rounded-xl bg-ink text-white font-bold active:opacity-80">
                담으러 가기
              </button>
            </div>
          )}

          {items.length > 0 && shown.length === 0 && (
            <p className="text-center text-muted text-[14px] py-14">여기엔 아직 아무것도 없어요.</p>
          )}
        </>
      )}

      <div className="h-6" />
      <ItemSheet item={sheet} presets={presets} busy={busy} onClose={() => setSheet(null)} onAction={act} />
      <BuySheet data={buyData} onClose={() => setBuyData(null)} onAddOrdered={onAddOrdered}
        onPick={(url, market, ing) => { window.open(url, '_blank', 'noopener'); toast?.(`${market}에서 ${ing} 찾는 중`); }} />
    </>
  );
}
