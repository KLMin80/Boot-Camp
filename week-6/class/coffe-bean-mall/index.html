<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MERIDIAN · 싱글 오리진 스페셜티 로스터스</title>
  <meta name="description" content="산지에서 잔까지, 오롯이 하나의 이야기. 주문 후 로스팅하는 싱글 오리진 스페셜티 원두." />

  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 은 반드시 7.x (8.x 는 text/babel 자동실행이 깨져 백지). -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <!-- 타이포그래피: 라틴 세리프(Playfair) + 한글 세리프/산세리프(Noto) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== 브랜드 팔레트 & 커스텀 유틸 (Tailwind JIT 동적클래스 회피 위해 색상은 직접 CSS) ===== */
    :root{
      --cream:#FAF6EF; --cream2:#F3EADC; --sand:#E7D8C4;
      --espresso:#2B1D13; --coffee:#3E2C1E; --mocha:#5B4636; --latte:#8A6D52;
      --forest:#233F30; --forest2:#325C43; --caramel:#B77B3E;
    }
    html{scroll-behavior:smooth}
    html,body{overflow-x:hidden;max-width:100%}
    body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;color:#3E2C1E;background:#FAF6EF;-webkit-font-smoothing:antialiased}
    img{max-width:100%}

    .font-head{font-family:'Playfair Display','Noto Serif KR',serif}
    .font-serif-ko{font-family:'Noto Serif KR','Playfair Display',serif}

    /* 텍스트/배경 브랜드 색 */
    .text-espresso{color:#2B1D13}.text-coffee{color:#3E2C1E}.text-mocha{color:#5B4636}
    .text-latte{color:#8A6D52}.text-cream{color:#FAF6EF}.text-forest{color:#233F30}.text-caramel{color:#A9662B}
    .bg-cream{background:#FAF6EF}.bg-cream2{background:#F3EADC}.bg-sand{background:#E7D8C4}
    .bg-espresso{background:#2B1D13}.bg-coffee{background:#3E2C1E}.bg-mocha{background:#5B4636}
    .bg-forest{background:#233F30}.bg-caramel{background:#B77B3E}
    .border-sand{border-color:#E7D8C4}

    /* 버튼 (커스텀 색 hover 안정화) */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;font-weight:600;border-radius:9999px;transition:transform .16s ease,background .18s ease,box-shadow .18s ease;cursor:pointer;line-height:1;white-space:nowrap}
    .btn:active{transform:translateY(1px)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn-primary{background:#2B1D13;color:#FAF6EF}
    .btn-primary:hover{background:#43301F}
    .btn-forest{background:#233F30;color:#FAF6EF}
    .btn-forest:hover{background:#325C43}
    .btn-outline{background:transparent;color:#2B1D13;border:1px solid #D8C4AC}
    .btn-outline:hover{background:#F3EADC}
    .btn-cream{background:#FAF6EF;color:#2B1D13}
    .btn-cream:hover{background:#fff}
    .btn-ghost{background:transparent;color:#5B4636}
    .btn-ghost:hover{background:rgba(43,29,19,.06)}

    /* 칩 / 노트 / 세그먼트 */
    .chip{display:inline-flex;align-items:center;font-size:13px;padding:7px 15px;border-radius:9999px;border:1px solid #E2D3BE;color:#5B4636;background:#fff;transition:all .15s;cursor:pointer;font-weight:500}
    .chip:hover{background:#F3EADC}
    .chip-on{background:#2B1D13;color:#FAF6EF;border-color:#2B1D13}
    .note-pill{display:inline-flex;align-items:center;font-size:11.5px;padding:3px 10px;border-radius:9999px;background:#F1E7D6;color:#6B5340;letter-spacing:.01em;font-weight:500}
    .proc-tag{display:inline-flex;align-items:center;font-size:11.5px;padding:3px 10px;border-radius:6px;background:rgba(35,63,48,.10);color:#233F30;font-weight:600;letter-spacing:.02em}
    .seg{display:inline-flex;background:rgba(43,29,19,.07);border-radius:9999px;padding:3px;gap:2px}
    .seg button{font-size:12px;padding:6px 13px;border-radius:9999px;color:#7A5E45;transition:all .15s;font-weight:600;cursor:pointer}
    .seg button.on{background:#fff;color:#2B1D13;box-shadow:0 1px 4px rgba(0,0,0,.14)}

    /* 로스팅 뱃지 (원두 사진 위 오버레이) */
    .roast-badge{position:absolute;top:12px;left:12px;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:5px 11px;border-radius:9999px;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.18)}
    .roast-light{background:rgba(255,244,224,.92);color:#8A5A1E}
    .roast-medium{background:rgba(178,124,76,.92);color:#fff}
    .roast-dark{background:rgba(38,24,15,.86);color:#F0DFC9}
    .ribbon{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;letter-spacing:.08em;padding:4px 10px;border-radius:6px;background:#233F30;color:#FAF6EF;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .ribbon-premium{background:#7A5A22;background:linear-gradient(135deg,#B8862F,#7A5A22)}

    /* 셀렉트 */
    select.sort{appearance:none;-webkit-appearance:none;background:#fff;border:1px solid #E2D3BE;color:#3E2C1E;border-radius:9999px;padding:9px 40px 9px 16px;font-size:14px;font-weight:500;cursor:pointer}
    select.sort:focus{outline:none;border-color:#B77B3E;box-shadow:0 0 0 3px rgba(183,123,62,.18)}

    input.field{width:100%;background:#fff;border:1px solid #E2D3BE;border-radius:9999px;padding:12px 18px;font-size:14px;color:#3E2C1E}
    input.field::placeholder{color:#A78C6F}
    input.field:focus{outline:none;border-color:#B77B3E;box-shadow:0 0 0 3px rgba(183,123,62,.16)}

    .card{background:#fff;border-radius:20px;box-shadow:0 1px 2px rgba(43,29,19,.04),0 10px 26px -18px rgba(43,29,19,.35);transition:transform .22s ease,box-shadow .22s ease}
    .card:hover{transform:translateY(-5px);box-shadow:0 14px 34px -14px rgba(43,29,19,.45)}

    .link-under{position:relative}
    .link-under::after{content:"";position:absolute;left:0;bottom:-3px;width:0;height:1.5px;background:currentColor;transition:width .22s ease}
    .link-under:hover::after{width:100%}

    /* 애니메이션 */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .fade-up{animation:fadeUp .6s ease both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .fade-in{animation:fadeIn .5s ease both}
    @keyframes steam{0%{opacity:0;transform:translateY(0) scaleX(1)}30%{opacity:.5}100%{opacity:0;transform:translateY(-22px) scaleX(1.4)}}

    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:#D8C4AC;border-radius:9999px}
    ::-webkit-scrollbar-track{background:transparent}

    /* hero 배경 텍스처 그라디언트 */
    .hero-bg{background:
      radial-gradient(1100px 520px at 78% 8%, rgba(183,123,62,.30), transparent 60%),
      radial-gradient(900px 500px at 8% 92%, rgba(35,63,48,.42), transparent 55%),
      linear-gradient(135deg,#2B1D13 0%,#3E2C1E 55%,#241813 100%)}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useContext, useReducer, createContext } = React;

    // ========================================
    // 📦 데이터 & 유틸
    // ========================================
    const won = (n) => Math.round(n).toLocaleString('ko-KR') + '원';

    // 중량 옵션 → 200g 기준가에 배수 적용, 500원 단위 반올림
    const WEIGHTS = [
      { id: '200g', label: '200g', grams: 200,  mult: 1 },
      { id: '500g', label: '500g', grams: 500,  mult: 2.3 },
      { id: '1kg',  label: '1kg',  grams: 1000, mult: 4.2 },
    ];
    const priceFor = (base, mult) => Math.round((base * mult) / 500) * 500;

    // 배송비 정책 (장바구니·주문서 공통 단일 소스): 0원이거나 30,000원 이상이면 무료, 그 외 3,000원
    const FREE_SHIP_MIN = 30000;
    const SHIP_FEE = 3000;
    const shippingFor = (subtotal) => (subtotal === 0 || subtotal >= FREE_SHIP_MIN ? 0 : SHIP_FEE);

    // 장바구니 아이템 → 주문 API items 형태로 매핑
    //   cart item(beanId·name·origin·weightLabel·unitPrice·qty) → { productId, name, origin, weight, unitPrice, qty, lineTotal }
    const mapCartToOrderItems = (items) => items.map((i) => ({
      productId: i.beanId,
      name: i.name,
      origin: i.origin,
      weight: i.weightLabel,
      unitPrice: i.unitPrice,
      qty: i.qty,
      lineTotal: i.unitPrice * i.qty,
    }));

    // 연락처 형식(하이픈 유무 허용): 0으로 시작하는 9~11자리 숫자 (010-1234-5678, 02-123-4567 등)
    const PHONE_RE = /^0\d{8,10}$/;

    // 로스팅 레벨 → 뱃지 스타일 + 사진 폴백 그라디언트 (동적 Tailwind 클래스 회피, 정적 매핑)
    const ROAST = {
      '라이트': { en: 'Light Roast',  badge: 'roast-light',  order: 0, grad: 'linear-gradient(140deg,#E9CB9A 0%,#C7924D 100%)' },
      '미디엄': { en: 'Medium Roast', badge: 'roast-medium', order: 1, grad: 'linear-gradient(140deg,#B27C4C 0%,#6E4A2E 100%)' },
      '다크':   { en: 'Dark Roast',   badge: 'roast-dark',   order: 2, grad: 'linear-gradient(140deg,#4E3626 0%,#241610 100%)' },
    };

    const IMG = (id) => `https://images.unsplash.com/photo-${id}?q=80&w=720&auto=format&fit=crop`;

    const BEANS = [
      { id:'yirgacheffe', name:'예가체프 코체레', origin:'에티오피아', flag:'🇪🇹',
        farm:'게데오 존 · 코체레', altitude:'1,900–2,100m', variety:'재래종(Heirloom)',
        roast:'라이트', process:'워시드', notes:['자스민','베르가못','레몬'],
        tagline:'꽃향이 만개하는 클래식 예가체프', price:18000, tag:'BEST', img:IMG('1447933601403-0c6688de566e') },

      { id:'huila', name:'우일라 엘 파라이소', origin:'콜롬비아', flag:'🇨🇴',
        farm:'엘 파라이소 농장', altitude:'1,650–1,850m', variety:'카투라 · 콜롬비아',
        roast:'미디엄', process:'워시드', notes:['밀크초콜릿','캐러멜','오렌지'],
        tagline:'균형 잡힌 데일리 클래식', price:16000, tag:'', img:IMG('1442550528053-c431ecb55509') },

      { id:'nyeri', name:'니에리 카린가 AA', origin:'케냐', flag:'🇰🇪',
        farm:'카린가 팩토리', altitude:'1,700–1,900m', variety:'SL28 · SL34',
        roast:'미디엄', process:'워시드', notes:['블랙커런트','자두','흑설탕'],
        tagline:'묵직한 산미와 베리의 여운', price:20000, tag:'', img:IMG('1497935586351-b67a49e012bf') },

      { id:'antigua', name:'안티구아 라 폴리', origin:'과테말라', flag:'🇬🇹',

        roast:'미디엄', process:'워시드', notes:['다크초콜릿','헤이즐넛','오렌지필'],

      { id:'cerrado', name:'세하도 산타 이네스', origin:'브라질', flag:'🇧🇷',

      { id:'tarrazu', name:'따라주 라 칸델리야', origin:'코스타리카', flag:'🇨🇷',
        farm:'라 칸델리야 마이크로밀', altitude:'1,600–1,800m', variety:'카투아이',
        roast:'미디엄', process:'허니', notes:['붉은사과','꿀','캐러멜'],
        tagline:'허니 프로세스의 은은한 단맛', price:18000, tag:'', img:IMG('1511920170033-f8396924c348') },

      { id:'geisha', name:'게이샤 에스메랄다', origin:'파나마', flag:'🇵🇦',
        farm:'하시엔다 라 에스메랄다', altitude:'1,600–1,800m', variety:'게이샤(Geisha)',
        roast:'라이트', process:'워시드', notes:['자스민','백도','꿀'],
        tagline:'세계가 인정한 최고급 게이샤', price:39000, tag:'PREMIUM', img:IMG('1514432324607-a09d9b4aefdd') },

      { id:'mandheling', name:'만델링 린통', origin:'인도네시아', flag:'🇮🇩',
        farm:'린통 니후타 지역', altitude:'1,200–1,500m', variety:'팀팀 · 시가라룽',
        roast:'다크', process:'내추럴', notes:['삼나무','다크초콜릿','허브'],
        tagline:'묵직한 바디의 길링바사', price:15000, tag:'', img:IMG('1518057111178-44a106bad636') },
    ];

    const ROAST_FILTERS = ['전체', '라이트', '미디엄', '다크'];
    const ROAST_DATE = '2026. 07. 07';

    // ========================================
    // 🎨 아이콘 (인라인 SVG)
    // ========================================
    const Icon = {
      Bean: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||20} height={p.s||20} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" {...p}>
          <path d="M6 18c8 0 12-4 12-12C10 6 6 10 6 18Z"/><path d="M8.5 15.5C11 13 13 11 15.5 8.5"/>
        </svg>
      ),
      Cart: (p) => (
        <svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}>
          <circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/>
          <path d="M2.5 3h2.2l2.3 12.2a1.6 1.6 0 0 0 1.6 1.3h8.4a1.6 1.6 0 0 0 1.6-1.3L21 7H6"/>
        </svg>
      ),
      Plus: (p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14"/></svg>),

      Trash:(p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>),
      Close:(p) => (<svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" {...p}><path d="M6 6l12 12M18 6L6 18"/></svg>),
      Chevron:(p)=>(<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 9l6 6 6-6"/></svg>),
      Flame:(p) => (<svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 3c1 3-1 4-1 6a3 3 0 0 0 6 0c0-1 0-1.5-.3-2.2C19 9 20 12 20 14a8 8 0 1 1-16 0c0-3 2-5 4-7 .5 2 2 2.5 2.5 1.5C13 6.5 12.5 4.5 12 3Z"/></svg>),
      Truck:(p) => (<svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M2 6h11v9H2zM13 9h4l3 3v3h-7z"/><circle cx="6.5" cy="17.5" r="1.6"/><circle cx="17.5" cy="17.5" r="1.6"/></svg>),
      Leaf:(p) => (<svg viewBox="0 0 24 24" width={p.s||22} height={p.s||22} fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 20c0-8 6-14 16-14 0 10-6 15-16 14Z"/><path d="M4 20c3-6 7-8 10-9"/></svg>),
      Star:(p) => (<svg viewBox="0 0 24 24" width={p.s||16} height={p.s||16} fill="currentColor" {...p}><path d="M12 2.5l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.9 6.2 20.4l1.1-6.5L2.6 9.3l6.5-.9z"/></svg>),
      User:(p) => (<svg viewBox="0 0 24 24" width={p.s||20} height={p.s||20} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="8" r="3.6"/><path d="M4.6 20a7.4 7.4 0 0 1 14.8 0"/></svg>),
      Logout:(p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M15 4h3a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-3"/><path d="M10 8l-4 4 4 4"/><path d="M6 12h9"/></svg>),
      Receipt:(p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M7 3h10a1 1 0 0 1 1 1v17l-2.5-1.6L13 21l-1.5-1.6L10 21l-1.5-1.6L6 21V4a1 1 0 0 1 1-1Z"/><path d="M9 8h6M9 12h5"/></svg>),
      Check:(p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 13l4 4L19 7"/></svg>),
      Camera:(p) => (<svg viewBox="0 0 24 24" width={p.s||18} height={p.s||18} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 7h3l1.5-2h7L17 7h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.3"/></svg>),
    };

    // ========================================
    // 🎨 디자인 시스템
    // ========================================
    function Button({ variant='primary', size='md', className='', children, ...rest }) {
      const sizes = { sm:'text-sm px-4 py-2', md:'text-[15px] px-5 py-2.5', lg:'text-base px-7 py-3.5' };
      const variants = { primary:'btn-primary', forest:'btn-forest', outline:'btn-outline', cream:'btn-cream', ghost:'btn-ghost' };
      return <button className={`btn ${variants[variant]||'btn-primary'} ${sizes[size]||sizes.md} ${className}`} {...rest}>{children}</button>;
    }

    function Badge({ roast }) {
      const r = ROAST[roast];
      return (
        <span className={`roast-badge ${r.badge}`}>
          <Icon.Bean s={13} strokeWidth={2} />{roast}
        </span>
      );
    }

    // 원두 사진 + 폴백(그라디언트 + 산지 텍스트). 이미지 로드 실패 시 onError 로 숨김.
    function BeanImage({ bean, className='' }) {
      const [broken, setBroken] = useState(false);
      const r = ROAST[bean.origin ? bean.roast : bean.roast];
      return (
        <div className={`relative overflow-hidden ${className}`} style={{ background: ROAST[bean.roast].grad }}>
          {/* 폴백 레이어 (이미지 실패해도 감성 유지) */}
          <div className="absolute inset-0 flex flex-col items-center justify-center text-white/85 select-none pointer-events-none">
            <div className="text-4xl mb-1 drop-shadow">{bean.flag}</div>
            <div className="font-head text-lg tracking-wide drop-shadow">{bean.origin}</div>
          </div>
          {!broken && (
            <img
              src={bean.img}
              alt={`${bean.origin} ${bean.name} 원두`}
              loading="lazy"
              onError={() => setBroken(true)}
              className="absolute inset-0 w-full h-full object-cover fade-in"
            />
          )}
          {/* 하단 살짝 어둡게 (뱃지 대비) */}
          <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(180deg,rgba(0,0,0,.16) 0%,transparent 34%,transparent 72%,rgba(0,0,0,.12) 100%)'}}></div>
        </div>
      );
    }

    // ========================================
    // 🛒 장바구니 컨텍스트 (localStorage 동기화)
    // ========================================
    const CART_KEY = 'meridian_cart_v1';
    const CartContext = createContext(null);
    const useCart = () => useContext(CartContext);

    function cartReducer(state, action) {
      switch (action.type) {
        case 'ADD': {
          const found = state.find((i) => i.key === action.item.key);
          if (found) return state.map((i) => i.key === action.item.key ? { ...i, qty: i.qty + action.item.qty } : i);
          return [...state, action.item];
        }
        case 'INC':    return state.map((i) => i.key === action.key ? { ...i, qty: i.qty + 1 } : i);
        case 'DEC':    return state.map((i) => i.key === action.key ? { ...i, qty: Math.max(1, i.qty - 1) } : i);
        case 'SET':    return state.map((i) => i.key === action.key ? { ...i, qty: Math.max(1, action.qty) } : i);
        case 'REMOVE': return state.filter((i) => i.key !== action.key);
        case 'CLEAR':  return [];
        default:       return state;
      }
    }

    function CartProvider({ children }) {
      const [items, dispatch] = useReducer(cartReducer, [], () => {
        try { const s = localStorage.getItem(CART_KEY); return s ? JSON.parse(s) : []; }
        catch (e) { return []; }
      });
      const [open, setOpen] = useState(false);

      useEffect(() => {
        try { localStorage.setItem(CART_KEY, JSON.stringify(items)); } catch (e) {}
      }, [items]);

      const count = items.reduce((s, i) => s + i.qty, 0);
      const subtotal = items.reduce((s, i) => s + i.unitPrice * i.qty, 0);

      return (
        <CartContext.Provider value={{ items, dispatch, open, setOpen, count, subtotal }}>
          {children}
        </CartContext.Provider>
      );
    }

    // ========================================
    // 🔐 인증 (Auth) — Context / Provider / Modal / 헤더 영역
    //   백엔드 계약(같은 오리진, 상대경로 /api):
    //     POST /api/signup {email,password} → 201 {token,user}
    //     POST /api/login  {email,password} → 200 {token,user}
    //     GET  /api/me  (Authorization: Bearer) → 200 {user}
    //   user = { id, email, createdAt(epoch ms) }. 토큰은 localStorage 에 보관.
    // ========================================
    const API_BASE = '/api';
    const TOKEN_KEY = 'meridian_auth_token_v1';
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const MIN_PW = 8;

    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    // 버튼 내부 로딩 스피너
    function Spinner({ className = '' }) {
      return <span className={`inline-block w-4 h-4 rounded-full border-2 border-current border-t-transparent animate-spin ${className}`} aria-hidden="true"></span>;
    }

    // 프로필 아바타 — user.profileImage 있으면 ImageKit 이미지, 없거나 로드 실패 시 이메일 이니셜로 폴백.
    //   표시용으로 ImageKit URL 변환(?tr=w..,h..,fo-face)을 붙여 정사각 썸네일 최적화(저장값은 원본, 검증 무관).
    //   2단 폴백: 변환URL 실패→원본URL→이니셜. profileImage 가 바뀌면(업로드 성공) stage 를 0으로 리셋.
    const avatarThumb = (url, px) => {
      if (!url) return url;
      const sep = url.indexOf('?') === -1 ? '?' : '&';
      return `${url}${sep}tr=w-${px},h-${px},fo-face`;
    };

    function Avatar({ user, size = 32, className = '' }) {
      const initial = ((user && user.email) || '?').trim().charAt(0).toUpperCase();
      const raw = (user && user.profileImage) || null;
      const [stage, setStage] = useState(0); // 0=변환썸네일 · 1=원본 · 2=이니셜 폴백
      useEffect(() => { setStage(0); }, [raw]);
      const box = { width: size, height: size };

      if (!raw || stage >= 2) {
        return (
          <span style={box} aria-hidden="true"
                className={`inline-grid place-items-center rounded-full bg-forest text-cream font-bold shrink-0 ${className}`}>
            <span style={{ fontSize: Math.round(size * 0.44), lineHeight: 1 }}>{initial}</span>
          </span>
        );
      }
      const px = Math.max(96, Math.round(size * 2));
      const src = stage === 0 ? avatarThumb(raw, px) : raw;
      return (
        <img src={src} alt="프로필 사진" loading="lazy" onError={() => setStage((s) => s + 1)}
             style={box} className={`rounded-full object-cover bg-forest shrink-0 ${className}`} />
      );
    }

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      // 토큰이 있으면 /api/me 로 세션을 복구하는 동안 booting=true (헤더 깜빡임 방지)
      const [booting, setBooting] = useState(() => {
        try { return !!localStorage.getItem(TOKEN_KEY); } catch (e) { return false; }
      });
      const [modal, setModal] = useState({ open: false, mode: 'login' }); // 'login' | 'signup'
      const [profileOpen, setProfileOpen] = useState(false); // 프로필(사진 변경) 모달

      // 앱 로드 시 세션 복구: 토큰 → GET /api/me. 200이면 로그인 유지, 401이면 토큰 제거.
      useEffect(() => {
        let alive = true;
        let t = null;
        try { t = localStorage.getItem(TOKEN_KEY); } catch (e) {}
        if (!t) { setBooting(false); return; }
        fetch(`${API_BASE}/me`, { headers: { Authorization: `Bearer ${t}` } })
          .then(async (res) => {
            if (!alive) return;
            if (res.ok) {
              const data = await res.json();
              setUser(data.user);
            } else if (res.status === 401) {
              try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
              setUser(null);
            }
            // 그 외(5xx/네트워크)는 토큰 보존 — 다음 로드에서 재시도, 이번 세션은 로그아웃 상태
          })
          .catch(() => { /* 네트워크 오류: 토큰 보존, 조용히 로그아웃 상태 */ })
          .finally(() => { if (alive) setBooting(false); });
        return () => { alive = false; };
      }, []);

      // 로그인/회원가입 공통 호출. 성공 시 토큰 저장 + user 세팅, 실패 시 서버 {error} 로 throw.
      const submit = async (mode, email, password) => {
        const res = await fetch(`${API_BASE}/${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        let data = {};
        try { data = await res.json(); } catch (e) {}
        if (!res.ok) {
          throw new Error(data.error || '요청을 처리하지 못했어요. 잠시 후 다시 시도해 주세요.');
        }
        try { localStorage.setItem(TOKEN_KEY, data.token); } catch (e) {}
        setUser(data.user);
        return data.user;
      };

      const login  = (email, password) => submit('login', email, password);
      const signup = (email, password) => submit('signup', email, password);

      const logout = () => {
        try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
        setUser(null);
      };

      // 인증이 필요한 API 호출용 fetch 래퍼: 저장된 토큰을 Authorization: Bearer 로 주입.
      // (path 는 상대경로 예: '/orders'. 401 처리는 각 호출부에서 판단.)
      const authFetch = (path, options = {}) => {
        let t = null;
        try { t = localStorage.getItem(TOKEN_KEY); } catch (e) {}
        const headers = { ...(options.headers || {}) };
        if (t) headers.Authorization = `Bearer ${t}`;
        return fetch(`${API_BASE}${path}`, { ...options, headers });
      };

      const openAuth  = (mode = 'login') => setModal({ open: true, mode });
      const closeAuth = () => setModal((m) => ({ ...m, open: false }));

      // 프로필 사진 변경 모달 제어 + 업로드 성공 후 user 갱신(헤더 아바타 즉시 반영).
      const openProfile  = () => setProfileOpen(true);
      const closeProfile = () => setProfileOpen(false);
      const updateUser   = (nextUser) => setUser(nextUser);

      return (
        <AuthContext.Provider value={{ user, booting, login, signup, logout, authFetch, openAuth, closeAuth, authModal: modal, updateUser, openProfile, closeProfile, profileOpen }}>
          {children}
          <AuthModal />
          <ProfileModal />
        </AuthContext.Provider>
      );
    }

    // 로그인/회원가입 탭 전환형 단일 모달
    function AuthModal() {
      const { authModal, closeAuth, login, signup } = useAuth();
      const { open, mode: initialMode } = authModal;

      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const emailRef = useRef(null);

      // 열릴 때마다 초기 모드 반영 + 입력 초기화 + 이메일 자동 포커스
      useEffect(() => {
        if (!open) return;
        setMode(initialMode || 'login');
        setEmail(''); setPassword(''); setConfirm(''); setError(''); setSubmitting(false);
        const id = window.setTimeout(() => { if (emailRef.current) emailRef.current.focus(); }, 80);
        return () => window.clearTimeout(id);
      }, [open, initialMode]);

      // ESC 닫기 + 배경 스크롤 잠금
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape' && !submitting) closeAuth(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [open, submitting, closeAuth]);

      if (!open) return null;

      const isLogin = mode === 'login';
      const switchMode = (m) => { setMode(m); setError(''); };

      const submitForm = async (e) => {
        e.preventDefault();
        if (submitting) return;
        const em = email.trim();
        // 클라이언트 검증(서버 검증과 이중 안전망) — 실패해도 서버 에러 메시지를 그대로 노출
        if (!EMAIL_RE.test(em)) { setError('올바른 이메일 형식이 아니에요.'); return; }
        if (password.length < MIN_PW) { setError(`비밀번호는 ${MIN_PW}자 이상이어야 해요.`); return; }
        if (!isLogin && password !== confirm) { setError('비밀번호가 일치하지 않아요.'); return; }

        setSubmitting(true);
        setError('');
        try {
          if (isLogin) await login(em, password);
          else await signup(em, password);
          closeAuth(); // 성공 → 모달 닫힘, 헤더가 즉시 로그인 상태로 갱신
        } catch (err) {
          setError(err.message || '요청을 처리하지 못했어요.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 overflow-y-auto"
             role="dialog" aria-modal="true" aria-labelledby="auth-title">
          {/* 배경 */}
          <div onClick={() => !submitting && closeAuth()} aria-hidden="true"
               className="absolute inset-0 bg-black/50 fade-in" style={{ backdropFilter: 'blur(3px)' }}></div>

          {/* 패널 */}
          <div className="relative w-full max-w-md bg-cream rounded-3xl shadow-2xl overflow-hidden fade-up my-auto">
            {/* 브랜드 헤더 */}
            <div className="hero-bg px-6 pt-7 pb-9 relative">
              <button onClick={() => !submitting && closeAuth()} aria-label="닫기"
                      className="absolute top-4 right-4 p-1.5 rounded-full text-cream/80 hover:text-cream hover:bg-white/10 transition">
                <Icon.Close s={20} />
              </button>
              <div className="flex items-center gap-2.5">
                <span className="grid place-items-center w-9 h-9 rounded-full bg-cream text-espresso"><Icon.Bean s={19} /></span>
                <span className="font-head text-lg tracking-[.14em] text-cream">MERIDIAN</span>
              </div>
              <h2 id="auth-title" className="font-head text-2xl text-cream mt-4 leading-snug">
                {isLogin ? '다시 오신 걸 환영해요' : '메리디안과 함께하기'}
              </h2>
              <p className="text-sm text-[#E4D8C6] mt-1.5">
                {isLogin ? '로그인하고 나만의 원두를 주문하세요.' : '가입하고 신선한 싱글 오리진을 만나보세요.'}
              </p>
            </div>

            {/* 탭 (브랜드 헤더 위로 살짝 겹침) */}
            <div className="px-6 -mt-5 relative z-10">
              <div className="grid grid-cols-2 gap-1 p-1 rounded-full bg-white border border-sand shadow-sm">
                {[['login', '로그인'], ['signup', '회원가입']].map(([m, label]) => (
                  <button key={m} type="button" onClick={() => switchMode(m)} aria-pressed={mode === m}
                          className={`py-2.5 rounded-full text-sm font-semibold transition ${mode === m ? 'bg-espresso text-cream shadow' : 'text-mocha hover:bg-cream2'}`}>
                    {label}
                  </button>
                ))}
              </div>
            </div>

            {/* 폼 */}
            <form onSubmit={submitForm} className="px-6 pt-5 pb-7" noValidate>
              <label className="block">
                <span className="text-xs font-semibold text-mocha ml-1">이메일</span>
                <input ref={emailRef} type="email" autoComplete="email" className="field mt-1.5" placeholder="you@example.com"
                       value={email} onChange={(e) => setEmail(e.target.value)} disabled={submitting} required />
              </label>

              <label className="block mt-4">
                <span className="text-xs font-semibold text-mocha ml-1">비밀번호</span>
                <input type="password" autoComplete={isLogin ? 'current-password' : 'new-password'} className="field mt-1.5" placeholder="8자 이상 입력"
                       value={password} onChange={(e) => setPassword(e.target.value)} disabled={submitting} required />
              </label>

              {!isLogin && (
                <label className="block mt-4">
                  <span className="text-xs font-semibold text-mocha ml-1">비밀번호 확인</span>
                  <input type="password" autoComplete="new-password" className="field mt-1.5" placeholder="비밀번호를 다시 입력"
                         value={confirm} onChange={(e) => setConfirm(e.target.value)} disabled={submitting} required />
                </label>
              )}

              {error && (
                <div role="alert" className="mt-4 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
                  <span className="mt-px shrink-0">⚠️</span><span>{error}</span>
                </div>
              )}

              <Button type="submit" size="lg" variant="primary" disabled={submitting} className="w-full mt-5">
                {submitting ? <React.Fragment><Spinner /> 처리 중…</React.Fragment> : (isLogin ? '로그인' : '회원가입')}
              </Button>

              <p className="text-center text-sm text-mocha mt-4">
                {isLogin ? '아직 회원이 아니신가요? ' : '이미 계정이 있으신가요? '}
                <button type="button" onClick={() => switchMode(isLogin ? 'signup' : 'login')}
                        className="font-semibold text-caramel hover:underline">
                  {isLogin ? '회원가입' : '로그인'}
                </button>
              </p>
            </form>
          </div>
        </div>
      );
    }

    // ========================================
    // 🖼️ 프로필 사진 변경 — ImageKit 서명 업로드 + 서버 저장
    //   흐름: 파일선택 → 클라검증 → GET /api/imagekit/auth(서명) → ImageKit 직접 업로드 → POST /api/profile/photo(저장)
    //   ⚠️ ImageKit 업로드만 외부(절대 URL) 직접 fetch. Content-Type 수동지정 금지(브라우저가 multipart 경계 설정).
    //   나머지 두 호출은 같은 오리진 상대경로 + authFetch(Bearer 자동첨부).
    // ========================================
    const MAX_AVATAR_MB = 5;
    const MAX_AVATAR_BYTES = MAX_AVATAR_MB * 1024 * 1024;
    const ACCEPTED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
    const IMAGEKIT_UPLOAD_URL = 'https://upload.imagekit.io/api/v1/files/upload';
    const AVATAR_FOLDER = '/cbmall_avatars';

    // 업로드 파일명 — 원본명이 안전하면 사용, 아니면 타입 기반 기본명. useUniqueFileName=true 라 서버가 어차피 고유화.
    function safeAvatarFileName(file) {
      const type = file.type || '';
      const ext = type === 'image/jpeg' ? 'jpg' : type === 'image/png' ? 'png'
                : type === 'image/webp' ? 'webp' : type === 'image/gif' ? 'gif' : 'png';
      const orig = (file.name || '').trim();
      if (orig && /\.[a-zA-Z0-9]+$/.test(orig)) {
        const cleaned = orig.replace(/[^\w.\-]/g, '_');
        return (cleaned.length > 80 ? cleaned.slice(-80) : cleaned) || `avatar.${ext}`;
      }
      return `avatar_${Date.now()}.${ext}`;
    }

    // 3단계 업로드. 성공 시 저장된 user 객체 반환. 401 은 err.code='UNAUTHORIZED' 로 던져 호출부가 로그아웃 유도.
    async function uploadProfilePhoto(authFetch, file) {
      // ① 업로드 서명 받기 (Bearer)
      const authRes = await authFetch('/imagekit/auth');
      if (authRes.status === 401) { const e = new Error('로그인이 만료되었어요. 다시 로그인해 주세요.'); e.code = 'UNAUTHORIZED'; throw e; }
      let sig = {};
      try { sig = await authRes.json(); } catch (e) {}
      if (!authRes.ok || !sig.signature) {
        throw new Error(sig.error || '업로드 준비에 실패했어요. 잠시 후 다시 시도해 주세요.');
      }

      // ② ImageKit 로 직접 업로드 (절대 URL · Content-Type 수동지정 금지 · Authorization 헤더도 붙이지 않음)
      const fd = new FormData();
      fd.append('file', file);
      fd.append('fileName', safeAvatarFileName(file));
      fd.append('publicKey', sig.publicKey);
      fd.append('signature', sig.signature);
      fd.append('expire', String(sig.expire));
      fd.append('token', sig.token);
      fd.append('useUniqueFileName', 'true');
      fd.append('folder', AVATAR_FOLDER);

      let upRes;
      try {
        upRes = await fetch(IMAGEKIT_UPLOAD_URL, { method: 'POST', body: fd });
      } catch (e) {
        throw new Error('이미지 업로드 중 네트워크 오류가 발생했어요. 연결을 확인해 주세요.');
      }
      let up = {};
      try { up = await upRes.json(); } catch (e) {}
      if (!upRes.ok || !up.url) {
        throw new Error((up && (up.message || up.error)) || '이미지 업로드에 실패했어요. 다시 시도해 주세요.');
      }

      // ③ 우리 서버에 URL 저장 (Bearer) — 서버가 엔드포인트 allowlist 검증 후 profile_image 저장
      const saveRes = await authFetch('/profile/photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: up.url, fileId: up.fileId }),
      });
      if (saveRes.status === 401) { const e = new Error('로그인이 만료되었어요. 다시 로그인해 주세요.'); e.code = 'UNAUTHORIZED'; throw e; }
      let saved = {};
      try { saved = await saveRes.json(); } catch (e) {}
      if (!saveRes.ok || !saved.user) {
        throw new Error(saved.error || '프로필 사진을 저장하지 못했어요.');
      }
      return saved.user;
    }

    // 프로필 사진 변경 모달 — AuthProvider 가 소유(profileOpen). 현재 사진(크게)+이메일+파일선택/미리보기/업로드.
    function ProfileModal() {
      const { profileOpen, closeProfile, user, updateUser, authFetch, logout, openAuth } = useAuth();
      const [file, setFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState('');
      const [uploading, setUploading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);
      const inputRef = useRef(null);
      const objUrlRef = useRef('');

      const clearSelection = () => {
        if (objUrlRef.current) { URL.revokeObjectURL(objUrlRef.current); objUrlRef.current = ''; }
        setFile(null); setPreviewUrl('');
      };

      // 열릴 때마다 상태 초기화
      useEffect(() => {
        if (!profileOpen) return;
        setError(''); setSuccess(false); setUploading(false);
        clearSelection();
      }, [profileOpen]);

      // 언마운트 시 objectURL 정리(메모리 누수 방지)
      useEffect(() => () => { if (objUrlRef.current) URL.revokeObjectURL(objUrlRef.current); }, []);

      // ESC 닫기(업로드 중 제외) + 배경 스크롤 잠금
      useEffect(() => {
        if (!profileOpen) return;
        const onKey = (e) => { if (e.key === 'Escape' && !uploading) closeProfile(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [profileOpen, uploading, closeProfile]);

      if (!profileOpen) return null;

      const pickFile = () => { if (inputRef.current) inputRef.current.click(); };

      const onFileChange = (e) => {
        setError(''); setSuccess(false);
        const f = e.target.files && e.target.files[0];
        e.target.value = ''; // 같은 파일 재선택도 change 가 발화되도록 리셋
        if (!f) return;
        if (!f.type || !f.type.startsWith('image/') || !ACCEPTED_IMAGE_TYPES.includes(f.type)) {
          setError('JPG · PNG · WEBP · GIF 형식의 이미지만 올릴 수 있어요.'); return;
        }
        if (f.size > MAX_AVATAR_BYTES) {
          setError(`이미지 용량이 너무 커요. 최대 ${MAX_AVATAR_MB}MB까지 올릴 수 있어요.`); return;
        }
        clearSelection();
        const u = URL.createObjectURL(f);
        objUrlRef.current = u;
        setFile(f); setPreviewUrl(u);
      };

      const doUpload = async () => {
        if (!file || uploading) return;
        setUploading(true); setError(''); setSuccess(false);
        try {
          const nextUser = await uploadProfilePhoto(authFetch, file);
          updateUser(nextUser);   // 헤더 아바타 즉시 교체 + 세션 user 갱신
          clearSelection();
          setSuccess(true);
        } catch (err) {
          if (err && err.code === 'UNAUTHORIZED') { closeProfile(); logout(); openAuth('login'); return; }
          setError((err && err.message) || '프로필 사진을 변경하지 못했어요.');
        } finally {
          setUploading(false);
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 overflow-y-auto"
             role="dialog" aria-modal="true" aria-labelledby="profile-title">
          <div onClick={() => !uploading && closeProfile()} aria-hidden="true"
               className="absolute inset-0 bg-black/50 fade-in" style={{ backdropFilter: 'blur(3px)' }}></div>

          <div className="relative w-full max-w-md bg-cream rounded-3xl shadow-2xl overflow-hidden fade-up my-auto">
            {/* 브랜드 헤더 */}
            <div className="hero-bg px-6 py-5 relative">
              <button onClick={() => !uploading && closeProfile()} aria-label="닫기"
                      className="absolute top-4 right-4 p-1.5 rounded-full text-cream/80 hover:text-cream hover:bg-white/10 transition">
                <Icon.Close s={20} />
              </button>
              <div className="flex items-center gap-2.5">
                <span className="grid place-items-center w-9 h-9 rounded-full bg-cream text-espresso"><Icon.User s={19} /></span>
                <div>
                  <div id="profile-title" className="font-head text-lg tracking-[.06em] text-cream leading-none">내 프로필</div>
                  <div className="text-[11px] text-[#E4D8C6] mt-1">프로필 사진을 변경할 수 있어요</div>
                </div>
              </div>
            </div>

            {/* 본문 */}
            <div className="px-6 pt-6 pb-7">
              {/* 현재 사진(또는 선택한 사진 미리보기) */}
              <div className="flex flex-col items-center">
                <div className="relative">
                  {previewUrl ? (
                    <img src={previewUrl} alt="선택한 사진 미리보기"
                         className="w-32 h-32 rounded-full object-cover bg-forest ring-4 ring-white shadow-md" />
                  ) : (
                    <Avatar user={user} size={128} className="ring-4 ring-white shadow-md" />
                  )}
                  <button type="button" onClick={pickFile} disabled={uploading} aria-label="사진 선택"
                          className="absolute bottom-1 right-1 w-9 h-9 rounded-full bg-espresso text-cream grid place-items-center border-2 border-[#FAF6EF] shadow hover:bg-[#43301F] transition disabled:opacity-60">
                    <Icon.Camera s={17} />
                  </button>
                </div>
                <div className="mt-3 text-sm text-mocha break-all text-center max-w-[260px]">{user ? user.email : ''}</div>
                {previewUrl && <div className="mt-1 text-[11px] text-caramel font-semibold">미리보기 · 아직 저장되지 않았어요</div>}
              </div>

              {/* 숨김 파일 입력 (버튼으로 트리거) */}
              <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={onFileChange} disabled={uploading} />

              {/* 상태 메시지 */}
              {success && (
                <div role="status" className="mt-5 flex items-center gap-2 rounded-xl border border-emerald-200 bg-emerald-50 px-3.5 py-2.5 text-sm text-emerald-700">
                  <Icon.Check s={16} /><span>프로필 사진이 변경되었어요.</span>
                </div>
              )}
              {error && (
                <div role="alert" className="mt-5 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
                  <span className="mt-px shrink-0">⚠️</span><span>{error}</span>
                </div>
              )}

              {/* 액션 버튼 — 파일 선택 여부에 따라 전환 */}
              {file ? (
                <div className="mt-5 flex flex-col sm:flex-row gap-2.5">
                  <Button type="button" variant="outline" onClick={clearSelection} disabled={uploading} className="sm:w-32">취소</Button>
                  <Button type="button" variant="primary" onClick={doUpload} disabled={uploading} className="flex-1">
                    {uploading ? <React.Fragment><Spinner /> 업로드 중…</React.Fragment> : '이 사진으로 변경'}
                  </Button>
                </div>
              ) : (
                <div className="mt-5 flex flex-col sm:flex-row gap-2.5">
                  <Button type="button" variant="primary" onClick={pickFile} className="flex-1">
                    <Icon.Camera s={17} /> 사진 선택
                  </Button>
                  <Button type="button" variant="outline" onClick={closeProfile} className="sm:w-32">닫기</Button>
                </div>
              )}

              <p className="mt-4 text-[11px] text-latte text-center leading-relaxed">
                JPG · PNG · WEBP · GIF · 최대 {MAX_AVATAR_MB}MB<br/>
                정사각형에 가까운 이미지가 가장 보기 좋아요.
              </p>
            </div>
          </div>
        </div>
      );
    }

    // 헤더 우측 인증 영역 — 로그아웃 시 버튼 / 로그인 시 아바타(사진 or 이니셜)+이메일+로그아웃

            </button>
            <span className="hidden lg:block text-sm text-coffee max-w-[150px] truncate" title={user.email}>{user.email}</span>
            {/* 주문내역 진입점 (로그인 상태에서만) — 모바일은 아이콘, sm+ 는 텍스트 */}

            <button onClick={logout} className="btn btn-outline text-[13px] px-2.5 sm:px-3 py-1.5" aria-label="로그아웃" title="로그아웃">
              <span className="hidden sm:inline">로그아웃</span>
              <span className="sm:hidden inline-flex"><Icon.Logout s={16} /></span>
            </button>
          </div>
        );
      }

      return (
        <div className="flex items-center gap-1 sm:gap-1.5">
          <button onClick={() => openAuth('login')} className="btn btn-ghost text-[13px] sm:text-sm px-2.5 sm:px-3.5 py-1.5 sm:py-2">로그인</button>
          <button onClick={() => openAuth('signup')} className="btn btn-primary text-[13px] sm:text-sm px-3 sm:px-4 py-1.5 sm:py-2">회원가입</button>
        </div>
      );
    }

            <div className="mt-auto pt-4">
