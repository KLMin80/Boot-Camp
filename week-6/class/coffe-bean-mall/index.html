    // ========================================
    // 💳 TossPayments 결제위젯 v2 — 클라이언트 헬퍼
    //   흐름: (체크아웃 폼) → POST /api/payments/prepare (서버가 금액·orderId 발급)
    //        → 결제위젯 렌더 + setAmount + requestPayment (successUrl 로 전체페이지 redirect)
    //        → /payment/success 복귀 → POST /api/payments/confirm (서버 승인) → 완료 화면
    // ========================================
    const TOSS_SDK_URL = 'https://js.tosspayments.com/v2/standard';

    // 결제 SDK 로더 — 한 번만 로드하고 window.TossPayments 를 캐시. 재진입해도 중복 로드 안 함.
    let _tossSdkPromise = null;
    function loadTossSdk() {
      if (window.TossPayments) return Promise.resolve(window.TossPayments);
      if (_tossSdkPromise) return _tossSdkPromise;
      _tossSdkPromise = new Promise((resolve, reject) => {
        const done = () => window.TossPayments ? resolve(window.TossPayments) : reject(new Error('결제 SDK 초기화에 실패했어요.'));
        const existing = document.querySelector(`script[src="${TOSS_SDK_URL}"]`);
        if (existing) {
          if (window.TossPayments) return resolve(window.TossPayments);
          existing.addEventListener('load', done);
          existing.addEventListener('error', () => reject(new Error('결제 SDK를 불러오지 못했어요.')));
          return;
        }
        const s = document.createElement('script');
        s.src = TOSS_SDK_URL; s.async = true;
        s.onload = done;
        s.onerror = () => { _tossSdkPromise = null; reject(new Error('결제 SDK를 불러오지 못했어요. 네트워크를 확인해 주세요.')); };
        document.head.appendChild(s);
      });
      return _tossSdkPromise;
    }

    // 공개 클라이언트 키를 서버(/api/payments/config)에서 가져와 캐시. 실패는 캐시하지 않아 재시도 가능.
    let _clientKeyPromise = null;
    function fetchTossClientKey() {
      if (_clientKeyPromise) return _clientKeyPromise;
      _clientKeyPromise = fetch(`${API_BASE}/payments/config`)
        .then((r) => r.ok ? r.json() : Promise.reject(new Error('결제 설정을 불러오지 못했어요.')))
        .then((d) => { if (!d || !d.clientKey) throw new Error('결제 설정이 올바르지 않아요.'); return d.clientKey; });
      _clientKeyPromise.catch(() => { _clientKeyPromise = null; });
      return _clientKeyPromise;
    }

    // successUrl/failUrl 복귀 시 쿼리 파싱. 토스는 paymentKey/orderId/amount 를 location.search 에 붙인다.
    // (해시 라우팅 대비: hash 안의 쿼리스트링도 함께 병합 — 이 앱은 실경로 라우팅이라 사실상 search 만 쓰지만 방어적으로.)
    function parsePaymentQuery() {
      const params = new URLSearchParams();
      try {
        new URLSearchParams(window.location.search).forEach((v, k) => params.set(k, v));
      } catch (e) {}
      try {
        const hash = window.location.hash || '';
        const qi = hash.indexOf('?');
        if (qi !== -1) new URLSearchParams(hash.slice(qi + 1)).forEach((v, k) => params.set(k, v));
      } catch (e) {}
      return params;
    }

    // 승인 처리 후 URL 정리: ?paymentKey=... 등 민감 파라미터 제거 + 새로고침 시 재confirm 방지.
    function cleanPaymentUrl() {
      try { window.history.replaceState({}, '', '/'); } catch (e) {}
    }

    // ========================================
    // 📦 주문(Orders) — Context / Provider / 체크아웃 · 주문내역
    //   백엔드 계약(같은 오리진, 상대경로 /api, 모두 Authorization: Bearer 필수):
    //     POST /api/orders {items, recipient, amounts} → 201 {order}
    //     GET  /api/orders → 200 {orders}   (내 주문, 서버가 최신순 정렬)
    //     GET  /api/orders/:id → 200|404 {order}
    //   금액은 정수(원), id 는 문자열, createdAt 은 epoch ms 숫자(new Date() 안전).
    // ========================================
    const OrdersContext = createContext(null);
    const useOrders = () => useContext(OrdersContext);

    function OrdersProvider({ children }) {
      const [checkoutOpen, setCheckoutOpen] = useState(false);
      const [historyOpen, setHistoryOpen] = useState(false);

      const openCheckout  = () => setCheckoutOpen(true);
      const closeCheckout = () => setCheckoutOpen(false);
      const openHistory   = () => setHistoryOpen(true);
      const closeHistory  = () => setHistoryOpen(false);

      return (
        <OrdersContext.Provider value={{ checkoutOpen, openCheckout, closeCheckout, historyOpen, openHistory, closeHistory }}>
          {children}
          <CheckoutModal />
          <OrderHistoryModal />
        </OrdersContext.Provider>
      );
    }

    // 주문 상품 한 줄 (체크아웃 요약 · 주문내역 카드 공통). it: {name, origin, weight, qty, unitPrice?, lineTotal?}
    function OrderItemRow({ it }) {
      const line = (it.lineTotal != null) ? it.lineTotal : (it.unitPrice || 0) * (it.qty || 0);
      return (
        <div className="flex items-start justify-between gap-3 py-2 text-sm">
          <div className="min-w-0">
            <div className="text-espresso font-medium truncate">{it.name}</div>
            <div className="text-[11px] text-latte mt-0.5">
              {it.origin ? `${it.origin} · ` : ''}{it.weight} · {it.qty}개
            </div>
          </div>
          <div className="text-espresso font-semibold whitespace-nowrap">{won(line)}</div>
        </div>
      );
    }

    // 금액 3종(상품금액/배송비/총액) 공통 표기
    function AmountRows({ subtotal, shippingFee, total }) {
      return (
        <div className="space-y-1.5 text-sm">
          <div className="flex justify-between text-mocha"><span>상품 금액</span><span>{won(subtotal)}</span></div>
          <div className="flex justify-between text-mocha"><span>배송비</span><span>{shippingFee === 0 ? '무료' : won(shippingFee)}</span></div>
          <div className="flex justify-between items-baseline pt-2 mt-1 border-t border-sand">
            <span className="font-semibold text-espresso">총 결제금액</span>
            <span className="font-head text-xl text-espresso">{won(total)}</span>
          </div>
        </div>
      );
    }

    // 주문 완료 화면 (체크아웃 성공 후)
    function CheckoutDone({ order, onClose, onHistory }) {
      return (
        <div className="p-7 sm:p-8 text-center overflow-y-auto">
          <div className="mx-auto w-16 h-16 rounded-full bg-forest text-cream grid place-items-center mb-4 fade-up">
            <Icon.Check s={30} />
          </div>
          <h3 className="font-head text-2xl text-espresso">주문해 주셔서 감사합니다</h3>
          <p className="text-mocha mt-2 text-sm leading-relaxed">
            주문이 정상적으로 접수되었어요.<br/>주문 후 로스팅하여 48시간 내 발송해 드릴게요. ☕
          </p>

          <div className="mt-6 rounded-2xl border border-sand bg-white px-5 py-4 text-left max-w-sm mx-auto space-y-2.5">
            <div className="flex justify-between text-sm"><span className="text-latte">주문번호</span><span className="font-semibold text-espresso">{order.id}</span></div>
            <div className="flex justify-between text-sm"><span className="text-latte">주문일시</span><span className="text-espresso">{new Date(order.createdAt).toLocaleString('ko-KR')}</span></div>
            <div className="flex justify-between text-sm"><span className="text-latte">상태</span><span className="text-forest font-semibold">{order.status}</span></div>
            <div className="flex justify-between items-baseline pt-2.5 border-t border-sand">
              <span className="text-latte text-sm">총 결제금액</span>
              <span className="font-head text-xl text-espresso">{won(order.total)}</span>
            </div>
          </div>

          <div className="mt-7 flex flex-col sm:flex-row gap-2.5 justify-center">
            <Button variant="outline" onClick={onHistory}>주문내역 보기</Button>
            <Button variant="primary" onClick={onClose}>계속 쇼핑하기</Button>
          </div>
        </div>
      );
    }

    // 결제수단 선택 단계 — 체크아웃 폼 제출(prepare 완료) 후 진입. 주문요약 + 토스 결제위젯.
    function PaymentStep({ prep, subtotal, shippingFee, onBack }) {
      return (
        <div className="flex-1 overflow-y-auto">
          <div className="p-6">
            {/* 주문 요약(컴팩트) */}
            <div className="rounded-2xl border border-sand bg-white px-5 py-4 mb-5">
              <div className="flex items-center justify-between gap-3">
                <div className="min-w-0">
                  <div className="text-[11px] text-latte">주문명</div>
                  <div className="text-sm font-semibold text-espresso truncate">{prep.orderName}</div>
                </div>
                <div className="text-right shrink-0">
                  <div className="text-[11px] text-latte">결제금액</div>
                  <div className="font-head text-xl text-espresso">{won(prep.amount)}</div>
                </div>
              </div>
              <div className="mt-3 pt-3 border-t border-sand text-[11px] text-latte flex items-center justify-between gap-2">
                <span>상품 {won(subtotal)} · 배송비 {shippingFee === 0 ? '무료' : won(shippingFee)}</span>
                <span className="truncate">주문번호 {prep.orderId}</span>
              </div>
            </div>

            {/* 토스 결제위젯 */}
            <TossPaymentWidget
              customerKey={prep.customerKey}
              amount={prep.amount}
              orderId={prep.orderId}
              orderName={prep.orderName}
              customerEmail={prep.customerEmail}
              customerName={prep.customerName}
              onBack={onBack}
            />
          </div>
        </div>
      );
    }

    // 토스 결제위젯 v2 — SDK 로드 → 위젯 초기화 → 결제수단/약관 렌더(1회) → setAmount → requestPayment.
    // ⚠️ 결제 단계 진입 시 새로 마운트, 뒤로가기/닫기 시 언마운트된다. init/render 가드 ref 와
    //    위젯 DOM 컨테이너가 같은 생명주기를 공유하므로 (가드만 남고 DOM 이 새로 그려져 빈 화면이
    //    되는) 이중렌더 문제가 발생하지 않는다. requestPayment 성공 시 결제창으로 전체페이지 이동.
    // ⚠️⚠️ 컴포넌트 이름을 절대 'PaymentWidget' 으로 바꾸지 말 것! 이 파일은 type="text/babel"
    //    전역 스코프라 top-level function 이 window 전역이 된다. 'PaymentWidget' 은 토스 v1 SDK의
    //    전역명(window.PaymentWidget)과 충돌해, v2 SDK가 "V2 SDK는 V1 SDK와 함께 사용할 수 없어요"
    //    를 던지며 초기화 자체가 실패한다(window.TossPayments 가 안 만들어짐). 그래서 Toss 접두사 사용.
    function TossPaymentWidget({ customerKey, amount, orderId, orderName, customerEmail, customerName, onBack }) {
      const widgetsRef = useRef(null);
      const initedRef = useRef(false);
      const renderedRef = useRef(false);
      const [status, setStatus] = useState('loading'); // 'loading' | 'ready' | 'error'
      const [errMsg, setErrMsg] = useState('');
      const [paying, setPaying] = useState(false);

      // 마운트 시 1회: SDK + 공개 클라이언트키 → 위젯 초기화 → 결제수단/약관 렌더.
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            const [TossPayments, clientKey] = await Promise.all([loadTossSdk(), fetchTossClientKey()]);
            if (!alive) return;
            if (!initedRef.current) {
              const tp = TossPayments(clientKey);
              widgetsRef.current = tp.widgets({ customerKey });
              initedRef.current = true;
            }
            await widgetsRef.current.setAmount({ currency: 'KRW', value: amount });
            if (!renderedRef.current) {
              await widgetsRef.current.renderPaymentMethods({ selector: '#toss-payment-method', variantKey: 'DEFAULT' });
              await widgetsRef.current.renderAgreement({ selector: '#toss-agreement', variantKey: 'AGREEMENT' });
              renderedRef.current = true;
            }
            if (alive) setStatus('ready');
          } catch (e) {
            if (alive) { setErrMsg((e && e.message) || '결제창을 준비하지 못했어요.'); setStatus('error'); }
          }
        })();
        return () => { alive = false; };
      }, []);

      // 금액 변경 시 setAmount 재호출(위젯 재렌더 없이 금액만 갱신).
      useEffect(() => {
        if (initedRef.current && widgetsRef.current) {
          widgetsRef.current.setAmount({ currency: 'KRW', value: amount }).catch(() => {});
        }
      }, [amount]);

      const requestPay = async () => {
        if (!widgetsRef.current || status !== 'ready' || paying) return;
        setErrMsg(''); setPaying(true);
        try {
          await widgetsRef.current.requestPayment({
            orderId,
            orderName,
            successUrl: `${window.location.origin}/payment/success`,
            failUrl: `${window.location.origin}/payment/fail`,
            customerEmail: customerEmail || undefined,
            customerName: customerName || undefined,
          });
          // 성공 시 결제창으로 전체페이지 이동 → 아래 코드는 실행되지 않음.
        } catch (err) {
          setPaying(false);
          if (err && err.code === 'USER_CANCEL') {
            // 사용자가 결제창을 닫음 — 조용히 무시(다시 시도 가능).
          } else {
            setErrMsg((err && err.message) || '결제 요청 중 문제가 발생했어요. 다시 시도해 주세요.');
          }
        }
      };

      return (
        <React.Fragment>
          {status === 'error' && (
            <div role="alert" className="mb-4 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
              <span className="mt-px shrink-0">⚠️</span>
              <div>
                <div>{errMsg}</div>
                <button type="button" onClick={() => window.location.reload()} className="mt-1 font-semibold text-red-800 underline">새로고침 후 다시 시도</button>
              </div>
            </div>
          )}

          {status === 'loading' && (
            <div className="py-10 flex flex-col items-center text-mocha">
              <Spinner className="w-6 h-6 mb-3 text-caramel" />
              <p className="text-sm">결제창을 준비하는 중…</p>
            </div>
          )}

          {/* 결제수단 + 약관 위젯 컨테이너(항상 DOM 에 존재해야 render 가 붙는다) */}
          <div id="toss-payment-method"></div>
          <div id="toss-agreement" className="mt-2"></div>

          {errMsg && status === 'ready' && (
            <div role="alert" className="mt-3 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
              <span className="mt-px shrink-0">⚠️</span><span>{errMsg}</span>
            </div>
          )}

          <div className="mt-5 flex flex-col sm:flex-row gap-2.5">
            <Button type="button" variant="outline" onClick={onBack} disabled={paying} className="sm:w-44">← 배송 정보 수정</Button>
            <Button type="button" variant="primary" size="lg" onClick={requestPay} disabled={status !== 'ready' || paying} className="flex-1">
              {paying ? <React.Fragment><Spinner /> 결제창 여는 중…</React.Fragment> : `${won(amount)} 결제하기`}
            </Button>
          </div>
          <p className="text-[11px] text-latte text-center mt-3 leading-relaxed">
            테스트 환경입니다 · 실제 결제·청구는 일어나지 않아요.<br className="sm:hidden" /> 결제 후 서버 승인을 거쳐 주문이 확정됩니다.
          </p>
        </React.Fragment>
      );
    }

    // 체크아웃(배송정보 입력) 모달 — 1단계: 배송 폼 + 주문요약 / 2단계: 결제수단 선택(토스 위젯).
    // 제출 시 POST /api/payments/prepare 로 결제대기 주문+금액을 발급받아 결제 단계로 전환한다.
    function CheckoutModal() {
      const { checkoutOpen, closeCheckout, openHistory } = useOrders();
      const { user, authFetch, logout, openAuth } = useAuth();
      const { items, subtotal, dispatch } = useCart();

      const EMPTY = { name:'', phone:'', postalCode:'', address:'', addressDetail:'', memo:'' };
      const [form, setForm] = useState(EMPTY);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const [phase, setPhase] = useState('form'); // 'form'(배송정보) | 'pay'(결제수단 선택)
      const [prep, setPrep] = useState(null);      // prepare 응답: { orderId, amount, orderName, customerKey, customerEmail, customerName }
      const nameRef = useRef(null);

      const shippingFee = shippingFor(subtotal);
      const total = subtotal + shippingFee;

      // 열릴 때 초기화 + 첫 필드(수령인) 자동 포커스
      useEffect(() => {
        if (!checkoutOpen) return;
        setForm(EMPTY); setError(''); setSubmitting(false); setPhase('form'); setPrep(null);
        const id = window.setTimeout(() => { if (nameRef.current) nameRef.current.focus(); }, 80);
        return () => window.clearTimeout(id);
      }, [checkoutOpen]);

      // ESC 닫기(제출 중 제외) + 배경 스크롤 잠금
      useEffect(() => {
        if (!checkoutOpen) return;
        const onKey = (e) => { if (e.key === 'Escape' && !submitting) closeCheckout(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [checkoutOpen, submitting, closeCheckout]);

      if (!checkoutOpen) return null;

      const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const submit = async (e) => {
        e.preventDefault();
        if (submitting) return;

        const name = form.name.trim();
        const phone = form.phone.trim();
        const address = form.address.trim();

        // 클라이언트 검증(서버 검증과 이중 안전망) — 필수값·전화 형식
        if (items.length === 0) { setError('장바구니가 비어 있어요. 상품을 담고 다시 시도해 주세요.'); return; }
        if (!name)    { setError('수령인 이름을 입력해 주세요.'); return; }
        if (!phone)   { setError('연락처를 입력해 주세요.'); return; }
        if (!PHONE_RE.test(phone.replace(/[^0-9]/g, ''))) { setError('올바른 연락처 형식이 아니에요. (예: 010-1234-5678)'); return; }
        if (!address) { setError('주소를 입력해 주세요.'); return; }

        const payload = {
          items: mapCartToOrderItems(items),
          recipient: {
            name, phone,
            postalCode: form.postalCode.trim(),
            address,
            addressDetail: form.addressDetail.trim(),
            memo: form.memo.trim(),
          },
          // amounts 는 서버가 권위 있게 재계산한다(위변조 방지). 참고용으로만 함께 전달.
          amounts: { subtotal, shippingFee, total },
        };

        setSubmitting(true); setError('');
        try {
          // 결제 준비: 서버가 결제대기 주문을 만들고 금액·orderId 를 발급한다.
          const res = await authFetch('/payments/prepare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          let data = {};
          try { data = await res.json(); } catch (e) {}

          if (res.status === 401) {                 // 토큰 만료/무효 → 로그아웃 후 로그인 유도
            setSubmitting(false);
            closeCheckout(); logout(); openAuth('login');
            return;
          }
          if (!res.ok) {                            // 400 등 검증 실패 → 서버 {error} 노출
            setError(data.error || '결제를 준비하지 못했어요. 입력값을 확인해 주세요.');
            setSubmitting(false);
            return;
          }
          // 준비 성공 → 결제수단 선택(pay) 단계로. 장바구니는 승인 성공(confirm) 후에만 비운다.
          setPrep({
            orderId: data.orderId,
            amount: data.amount,
            orderName: data.orderName,
            customerKey: data.customerKey,
            customerEmail: data.customerEmail,
            customerName: name,
          });
          setPhase('pay');
          setSubmitting(false);
        } catch (err) {
          setError('네트워크 오류로 결제를 준비하지 못했어요. 연결을 확인하고 다시 시도해 주세요.');
          setSubmitting(false);
        }
      };

      const fieldLabel = (text, required) => (
        <span className="text-xs font-semibold text-mocha ml-1">
          {text}{required ? <span className="text-caramel"> *</span> : <span className="text-latte font-normal"> (선택)</span>}
        </span>
      );

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 overflow-y-auto"
             role="dialog" aria-modal="true" aria-labelledby="checkout-title">
          <div onClick={() => !submitting && closeCheckout()} aria-hidden="true"
               className="absolute inset-0 bg-black/50 fade-in" style={{ backdropFilter:'blur(3px)' }}></div>

          <div className="relative w-full max-w-3xl bg-cream rounded-3xl shadow-2xl overflow-hidden fade-up my-auto max-h-[92vh] flex flex-col">
            {/* 브랜드 헤더 */}
            <div className="hero-bg px-6 py-5 relative shrink-0">
              <button onClick={() => !submitting && closeCheckout()} aria-label="닫기"
                      className="absolute top-4 right-4 p-1.5 rounded-full text-cream/80 hover:text-cream hover:bg-white/10 transition">
                <Icon.Close s={20} />
              </button>
              <div className="flex items-center gap-2.5">
                <span className="grid place-items-center w-9 h-9 rounded-full bg-cream text-espresso"><Icon.Truck s={19} /></span>
                <div>
                  <div id="checkout-title" className="font-head text-lg tracking-[.06em] text-cream leading-none">{phase === 'pay' ? '결제 수단 선택' : '배송 정보 입력'}</div>
                  <div className="text-[11px] text-[#E4D8C6] mt-1">{phase === 'pay' ? '원하시는 결제수단으로 결제를 완료해 주세요' : '받으실 곳의 정보를 입력해 주세요'}</div>
                </div>
              </div>
            </div>

            {phase === 'pay' && prep ? (
              <PaymentStep
                prep={prep}
                subtotal={subtotal}
                shippingFee={shippingFee}
                onBack={() => { setPhase('form'); setPrep(null); }}
              />
            ) : (
              <form onSubmit={submit} className="flex-1 overflow-y-auto grid md:grid-cols-5" noValidate>
                {/* 좌: 배송 폼 */}
                <div className="md:col-span-3 p-6 space-y-4">
                  <label className="block">
                    {fieldLabel('수령인 이름', true)}
                    <input ref={nameRef} className="field mt-1.5" placeholder="받으실 분 성함"
                           value={form.name} onChange={set('name')} disabled={submitting} required />
                  </label>
                  <label className="block">
                    {fieldLabel('연락처', true)}
                    <input className="field mt-1.5" type="tel" inputMode="numeric" placeholder="010-1234-5678"
                           value={form.phone} onChange={set('phone')} disabled={submitting} required />
                  </label>
                  <label className="block">
                    {fieldLabel('우편번호', false)}
                    <input className="field mt-1.5" inputMode="numeric" placeholder="06236"
                           value={form.postalCode} onChange={set('postalCode')} disabled={submitting} />
                  </label>
                  <label className="block">
                    {fieldLabel('주소', true)}
                    <input className="field mt-1.5" placeholder="도로명 또는 지번 주소"
                           value={form.address} onChange={set('address')} disabled={submitting} required />
                  </label>
                  <label className="block">
                    {fieldLabel('상세주소', false)}
                    <input className="field mt-1.5" placeholder="동/호수 등"
                           value={form.addressDetail} onChange={set('addressDetail')} disabled={submitting} />
                  </label>
                  <label className="block">
                    {fieldLabel('배송 메모', false)}
                    <textarea rows={2} placeholder="부재 시 요청사항 등"
                              className="mt-1.5 w-full bg-white border border-[#E2D3BE] rounded-2xl px-4 py-3 text-sm text-coffee resize-none focus:outline-none focus:border-[#B77B3E] focus:ring-[3px] focus:ring-[#B77B3E]/20 disabled:opacity-60"
                              value={form.memo} onChange={set('memo')} disabled={submitting} />
                  </label>

                  {error && (
                    <div role="alert" className="flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
                      <span className="mt-px shrink-0">⚠️</span><span>{error}</span>
                    </div>
                  )}
                </div>

                {/* 우: 주문 요약 + 결제 버튼 (모바일에선 폼 아래로 스택) */}
                <div className="md:col-span-2 bg-cream2 border-t md:border-t-0 md:border-l border-sand p-6 flex flex-col">
                  <div className="font-head text-lg text-espresso mb-1">주문 요약</div>
                  <div className="divide-y divide-sand/70 max-h-52 overflow-y-auto -mx-1 px-1">
                    {items.length === 0 ? (
                      <p className="text-sm text-mocha py-4">장바구니가 비어 있어요.</p>
                    ) : (
                      items.map((it) => (
                        <OrderItemRow key={it.key} it={{ name: it.name, origin: it.origin, weight: it.weightLabel, qty: it.qty, unitPrice: it.unitPrice }} />
                      ))
                    )}
                  </div>
                  <div className="mt-4 pt-4 border-t border-sand">
                    <AmountRows subtotal={subtotal} shippingFee={shippingFee} total={total} />
                  </div>
                  <Button type="submit" size="lg" variant="primary" disabled={submitting || items.length === 0} className="w-full mt-5">
                    {submitting ? <React.Fragment><Spinner /> 결제 준비 중…</React.Fragment> : `${won(total)} · 결제 진행하기`}
                  </Button>
                  <p className="text-[11px] text-latte text-center mt-2.5">다음 단계에서 결제수단을 선택해요 · 주문 후 로스팅하여 48시간 내 발송</p>
                </div>
              </form>
            )}
          </div>
        </div>
      );
    }

    // 주문내역 카드 하나
    function OrderCard({ order }) {
      const items = Array.isArray(order.items) ? order.items : [];
      const r = order.recipient || {};
      return (
        <div className="rounded-2xl border border-sand bg-white overflow-hidden">
          {/* 상단: 주문번호 · 상태 · 일시 */}
          <div className="flex items-center justify-between gap-3 px-4 sm:px-5 py-3 bg-cream2 border-b border-sand">
            <div className="min-w-0">
              <div className="text-[11px] text-latte">주문번호</div>
              <div className="text-sm font-semibold text-espresso truncate">{order.id}</div>
            </div>
            <div className="text-right shrink-0">
              <span className="inline-flex items-center gap-1 text-[11px] font-bold text-forest bg-forest/10 px-2.5 py-1 rounded-full">{order.status}</span>
              <div className="text-[11px] text-latte mt-1">{new Date(order.createdAt).toLocaleString('ko-KR')}</div>
            </div>
          </div>
          {/* 상품 목록 */}
          <div className="px-4 sm:px-5 py-1 divide-y divide-sand/70">
            {items.map((it, idx) => <OrderItemRow key={idx} it={it} />)}
          </div>
          {/* 금액 */}
          <div className="px-4 sm:px-5 py-3 border-t border-sand">
            <AmountRows subtotal={order.subtotal} shippingFee={order.shippingFee} total={order.total} />
          </div>
          {/* 배송지 */}
          <div className="px-4 sm:px-5 py-3 border-t border-sand text-xs text-mocha leading-relaxed">
            <div className="flex items-center gap-1.5 text-espresso font-semibold mb-1"><Icon.Truck s={15} /> 배송지</div>
            <div>{r.name} · {r.phone}</div>
            <div>{r.postalCode ? `(${r.postalCode}) ` : ''}{r.address}{r.addressDetail ? ` ${r.addressDetail}` : ''}</div>
            {r.memo ? <div className="mt-0.5 text-latte">메모: {r.memo}</div> : null}
          </div>
        </div>
      );
    }

    // 주문내역 모달 — 열릴 때 GET /api/orders 조회. 로딩/빈/에러/401 처리.
    function OrderHistoryModal() {
      const { historyOpen, closeHistory } = useOrders();
      const { user, authFetch, logout, openAuth } = useAuth();
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [orders, setOrders] = useState([]);

      useEffect(() => {
        if (!historyOpen) return;
        let alive = true;
        setLoading(true); setError(''); setOrders([]);
        authFetch('/orders')
          .then(async (res) => {
            if (!alive) return;
            if (res.status === 401) {              // 토큰 만료 → 로그아웃 후 로그인 유도
              closeHistory(); logout(); openAuth('login');
              return;
            }
            let data = {};
            try { data = await res.json(); } catch (e) {}
            if (!res.ok) { setError(data.error || '주문 내역을 불러오지 못했어요.'); return; }
            setOrders(Array.isArray(data.orders) ? data.orders : []);
          })
          .catch(() => { if (alive) setError('네트워크 오류로 주문 내역을 불러오지 못했어요.'); })
          .finally(() => { if (alive) setLoading(false); });
        return () => { alive = false; };
      }, [historyOpen]);

      // ESC 닫기 + 배경 스크롤 잠금
      useEffect(() => {
        if (!historyOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') closeHistory(); };
        document.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [historyOpen, closeHistory]);

      if (!historyOpen) return null;

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 overflow-y-auto"
             role="dialog" aria-modal="true" aria-labelledby="history-title">
          <div onClick={closeHistory} aria-hidden="true"
               className="absolute inset-0 bg-black/50 fade-in" style={{ backdropFilter:'blur(3px)' }}></div>

          <div className="relative w-full max-w-2xl bg-cream rounded-3xl shadow-2xl overflow-hidden fade-up my-auto max-h-[92vh] flex flex-col">
            {/* 브랜드 헤더 */}
            <div className="hero-bg px-6 py-5 relative shrink-0">
              <button onClick={closeHistory} aria-label="닫기"
                      className="absolute top-4 right-4 p-1.5 rounded-full text-cream/80 hover:text-cream hover:bg-white/10 transition">
                <Icon.Close s={20} />
              </button>
              <div className="flex items-center gap-2.5">
                <span className="grid place-items-center w-9 h-9 rounded-full bg-cream text-espresso"><Icon.Receipt s={19} /></span>
                <div>
                  <div id="history-title" className="font-head text-lg tracking-[.06em] text-cream leading-none">주문 내역</div>
                  <div className="text-[11px] text-[#E4D8C6] mt-1 max-w-[220px] truncate">{user ? `${user.email} 님의 주문` : ''}</div>
                </div>
              </div>
            </div>

            {/* 본문 */}
            <div className="flex-1 overflow-y-auto p-5 sm:p-6">
              {loading ? (
                <div className="py-20 flex flex-col items-center text-mocha">
                  <Spinner className="w-6 h-6 mb-3 text-caramel" /><p className="text-sm">주문 내역을 불러오는 중…</p>
                </div>
              ) : error ? (
                <div role="alert" className="my-6 flex items-start gap-2 rounded-xl border border-red-200 bg-red-50 px-3.5 py-2.5 text-sm text-red-700">
                  <span className="mt-px shrink-0">⚠️</span><span>{error}</span>
                </div>
              ) : orders.length === 0 ? (
                <div className="py-20 text-center text-mocha">
                  <div className="text-5xl mb-3">🧾</div>
                  <p className="font-semibold text-espresso">주문 내역이 없습니다</p>
                  <p className="text-sm mt-1">마음에 드는 원두를 담아 첫 주문을 시작해 보세요.</p>
                </div>
              ) : (
                <div className="space-y-4">
                  <p className="text-xs text-latte">총 <b className="text-espresso">{orders.length}</b>건의 주문 (최신순)</p>
                  {orders.map((o) => <OrderCard key={o.id} order={o} />)}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 💳 결제 결과 화면 — successUrl(/payment/success) · failUrl(/payment/fail) 복귀 처리
    //   success: 서버 confirm 호출 → 성공 시 주문완료 화면(장바구니 비움) / 실패 시 사유 안내
    //   fail:    토스가 준 code/message 표시 + 재시도 안내
    //   보안: confirm 은 Bearer(authFetch)로 호출, 처리 후 URL 의 민감 파라미터 제거.
    // ========================================
    function PaymentResultScreen({ route, goHome }) {
      const { authFetch } = useAuth();
      const { dispatch } = useCart();
      const { openHistory } = useOrders();
      const [state, setState] = useState('loading'); // 'loading' | 'success' | 'fail'
      const [order, setOrder] = useState(null);
      const [fail, setFail] = useState({ code: '', message: '' });
      const calledRef = useRef(false);

      useEffect(() => {
        if (calledRef.current) return;   // 마운트당 1회만 실행(재confirm 방지)
        calledRef.current = true;

        const query = parsePaymentQuery();

        // 실패 복귀: 토스가 code/message/orderId 를 붙여 보낸다.
        if (route === 'fail') {
          setFail({ code: query.get('code') || '', message: query.get('message') || '결제가 취소되었거나 실패했어요.' });
          setState('fail');
          cleanPaymentUrl();
          return;
        }

        // 성공 복귀: paymentKey/orderId/amount 로 서버 승인 요청.
        const paymentKey = query.get('paymentKey');
        const orderId = query.get('orderId');
        const amount = query.get('amount');
        if (!paymentKey || !orderId || !amount) {
          setFail({ code: 'INVALID_CALLBACK', message: '결제 정보가 올바르지 않습니다. 다시 시도해 주세요.' });
          setState('fail');
          cleanPaymentUrl();
          return;
        }

        (async () => {
          try {
            const res = await authFetch('/payments/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
            });
            let data = {};
            try { data = await res.json(); } catch (e) {}
            cleanPaymentUrl(); // 성공/실패 무관하게 민감 파라미터 제거(새로고침 재confirm 방지)

            if (res.status === 401) {
              setFail({ code: 'UNAUTHORIZED', message: '로그인이 만료되었어요. 다시 로그인 후 주문내역에서 상태를 확인해 주세요.' });
              setState('fail');
              return;
            }
            if (!res.ok) {
              setFail({ code: data.code || 'CONFIRM_FAILED', message: data.error || '결제 승인에 실패했어요.' });
              setState('fail');
              return;
            }
            dispatch({ type: 'CLEAR' });   // 승인 성공 → 장바구니 비움
            setOrder(data.order);
            setState('success');
          } catch (e) {
            cleanPaymentUrl();
            setFail({ code: 'NETWORK', message: '네트워크 오류로 결제 승인을 완료하지 못했어요. 주문내역에서 상태를 확인해 주세요.' });
            setState('fail');
          }
        })();
      }, []);

      return (
        <div className="min-h-screen bg-cream flex flex-col">
          {/* 미니 헤더(로고) */}
          <div className="hero-bg">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center">
              <button onClick={goHome} className="flex items-center gap-2.5" aria-label="홈으로">
                <span className="grid place-items-center w-9 h-9 rounded-full bg-cream text-espresso"><Icon.Bean s={19} /></span>
                <span className="font-head text-xl tracking-[.14em] text-cream">MERIDIAN</span>
              </button>
            </div>
          </div>

          <div className="flex-1 grid place-items-center px-4 py-12">
            <div className="w-full max-w-md">
              {state === 'loading' && (
                <div className="rounded-3xl bg-white border border-sand shadow-sm p-10 text-center">
                  <Spinner className="w-8 h-8 mx-auto mb-4 text-caramel" />
                  <h2 className="font-head text-xl text-espresso">결제 승인 중…</h2>
                  <p className="text-sm text-mocha mt-2">결제를 안전하게 확인하고 있어요. 창을 닫지 말고 잠시만 기다려 주세요.</p>
                </div>
              )}

              {state === 'success' && order && (
                <div className="rounded-3xl bg-white border border-sand shadow-sm overflow-hidden">
                  <CheckoutDone order={order} onClose={goHome} onHistory={() => { goHome(); openHistory(); }} />
                </div>
              )}

              {state === 'fail' && (
                <div className="rounded-3xl bg-white border border-sand shadow-sm p-8 sm:p-10 text-center">
                  <div className="mx-auto w-16 h-16 rounded-full bg-red-100 text-red-600 grid place-items-center mb-4 text-3xl">✕</div>
                  <h2 className="font-head text-2xl text-espresso">결제를 완료하지 못했어요</h2>
                  <p className="text-sm text-mocha mt-2 leading-relaxed">{fail.message}</p>
                  {fail.code && <p className="text-[11px] text-latte mt-2">오류코드: {fail.code}</p>}
                  <div className="mt-7 flex flex-col sm:flex-row gap-2.5 justify-center">
                    <Button variant="outline" onClick={() => { goHome(); openHistory(); }}>주문내역 확인</Button>
                    <Button variant="primary" onClick={goHome}>다시 시도하기</Button>
                  </div>
                  <p className="text-[11px] text-latte mt-4">결제창에서 취소했거나 승인이 만료된 경우예요. 장바구니는 그대로 유지됩니다.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    // 홈(쇼핑몰 본문). 결제 결과 경로가 아니면 이 화면을 보여준다.
    function HomeShell() {
      return (
        <div id="top" className="min-h-screen bg-cream">
          <Header />
          <main>
            <Hero />
            <FeatureStrip />
            <ProductSection />
            <Story />
            <Subscribe />
          </main>
          <Footer />
          <CartDrawer />
        </div>
      );
    }

    // 루트 — successUrl/failUrl 은 실제 경로(/payment/*)로 들어오고 서버가 index.html(SPA 셸)을
    // 내려주므로, 부팅 시 pathname 으로 결제 결과 화면 여부를 결정한다(해시가 아니라 pathname).
    function App() {
      const [route, setRoute] = useState(() => {
        const p = window.location.pathname;
        if (p === '/payment/success') return 'success';
        if (p === '/payment/fail') return 'fail';
        return 'home';
      });
      const goHome = () => { cleanPaymentUrl(); setRoute('home'); };

      return (
        <AuthProvider>
          <CartProvider>
            <OrdersProvider>
              {route === 'home'
                ? <HomeShell />
                : <PaymentResultScreen route={route} goHome={goHome} />}
            </OrdersProvider>
          </CartProvider>
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
