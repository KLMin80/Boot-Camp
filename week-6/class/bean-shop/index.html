    function useHashRoute() {
      const [path, setPath] = useState(readHash);
      useEffect(() => {
        const onHash = () => setPath(readHash());
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      return path;
    }

    function Link({ to, className, children, onClick, ...rest }) {
      return (

      );
    }

    // ========================================
    const CartContext = createContext(null);
    const useCart = () => useContext(CartContext);

    function CartProvider({ children }) {
      const [items, setItems] = useState([]); // { key, beanId, grind, weight, qty }
      const [toast, setToast] = useState(null);
      const toastTimer = useRef(null);

      const showToast = useCallback((msg, tone = 'default') => {
        setToast({ id: Date.now(), msg, tone });
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), 2400);
      }, []);

      const addToCart = useCallback((beanId, grind, weight, qty) => {
        const key = beanId + '|' + grind + '|' + weight;
        setItems((prev) => {
          const idx = prev.findIndex((i) => i.key === key);
          if (idx >= 0) {
            const next = [...prev];
            next[idx] = { ...next[idx], qty: Math.min(99, next[idx].qty + qty) };
            return next;
          }
          return [...prev, { key, beanId, grind, weight, qty }];
        });
        const b = BEAN_MAP[beanId];
        showToast(`${b.name} · ${weight}을(를) 담았어요`, 'success');
      }, [showToast]);

      const updateQty = useCallback((key, delta) => {
        setItems((prev) => prev.map((i) => i.key === key
          ? { ...i, qty: Math.max(1, Math.min(99, i.qty + delta)) } : i));
      }, []);

      const removeItem = useCallback((key) => {
        setItems((prev) => prev.filter((i) => i.key !== key));
      }, []);

      const clearCart = useCallback(() => setItems([]), []);

      const count = useMemo(() => items.reduce((s, i) => s + i.qty, 0), [items]);

      const value = { items, count, addToCart, updateQty, removeItem, clearCart, toast, showToast };
      return <CartContext.Provider value={value}>{children}</CartContext.Provider>;

    function Reveal({ children, className = '', delay = 0 }) {
      const ref = useRef(null);
      const [seen, setSeen] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) { setSeen(true); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return <div ref={ref} style={{ transitionDelay: delay + 'ms' }} className={cx('reveal', seen && 'in', className)}>{children}</div>;
    }

    // ========================================
    // 🖼️ 프로필 아바타 (ImageKit 업로드)
    // ========================================
    // 아바타: 이미지가 있으면 <img>, 없으면 이메일 첫 글자. 이미지 로드 실패 시 첫 글자로 폴백.
    function Avatar({ src, name, size = 40, className = '' }) {
      const [failed, setFailed] = useState(false);
      useEffect(() => { setFailed(false); }, [src]);
      const initial = ((name || '?').trim().charAt(0) || '?').toUpperCase();
      const dim = { width: size, height: size };
      if (src && !failed) {
        return (
          <img src={src} alt="프로필 사진" style={dim} onError={() => setFailed(true)}
            className={cx('rounded-full bg-ecru object-cover', className)} />
        );
      }
      return (
        <span style={{ ...dim, fontSize: Math.round(size * 0.42) }}
          className={cx('inline-flex select-none items-center justify-center rounded-full bg-mocha/15 font-semibold text-mocha', className)}>
          {initial}
        </span>
      );
    }

    // 파일을 ImageKit 에 직접 업로드하고, 저장된 URL 을 서버에 반영한 뒤 갱신된 user 를 반환.
    // 1) 서버에서 HMAC 서명(인증 파라미터) 발급 → 2) ImageKit 업로드 API 직접 호출(멀티파트, 시크릿키 없이)
    //  → 3) 반환된 url 을 PATCH /api/auth/profile-image 로 저장. (이미지 바이트는 우리 서버를 거치지 않음)
    async function uploadAvatar(file, token) {
      const auth = await apiFetch('/api/imagekit/auth', { token }); // { token, expire, signature, publicKey, urlEndpoint }
      const ext = (file.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
      const fd = new FormData();
      fd.append('file', file);
      fd.append('fileName', 'avatar_' + Date.now() + '.' + ext);
      fd.append('publicKey', auth.publicKey);
      fd.append('signature', auth.signature);
      fd.append('expire', String(auth.expire));
      fd.append('token', auth.token);
      fd.append('folder', '/bean-shop/avatars');
      fd.append('useUniqueFileName', 'true');
      let up, data;
      try {
        // Content-Type 은 브라우저가 multipart 경계와 함께 자동 설정 → 직접 지정하지 않는다.
        up = await fetch('https://upload.imagekit.io/api/v1/files/upload', { method: 'POST', body: fd });
        data = await up.json();
      } catch (e) {
        throw new Error('이미지 업로드 서버에 연결할 수 없어요.');
      }
      if (!up.ok || !data || !data.url) {
        throw new Error((data && data.message) || '이미지 업로드에 실패했어요.');
      }
      const saved = await apiFetch('/api/auth/profile-image', { method: 'PATCH', body: { imageUrl: data.url }, token });
      return saved.user;
    }

    // 마이페이지 상단 프로필 카드 — 아바타 + 이메일 + "사진 변경"(파일 선택 → 업로드 → 저장).
    function ProfileCard() {
      const { user, token, updateUser } = useAuth();
      const fileRef = useRef(null);
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState(null); // { tone:'error'|'success', text }
      if (!user) return null;

      const pick = () => { setMsg(null); if (fileRef.current) fileRef.current.click(); };
      const onFile = async (e) => {
        const file = e.target.files && e.target.files[0];
        e.target.value = ''; // 같은 파일 재선택 허용
        if (!file) return;
        if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
          setMsg({ tone: 'error', text: 'JPG · PNG · WEBP 이미지만 올릴 수 있어요.' }); return;
        }
        if (file.size > 5 * 1024 * 1024) {
          setMsg({ tone: 'error', text: '이미지 용량은 5MB 이하여야 해요.' }); return;
        }
        setBusy(true); setMsg(null);
        try {
          const updated = await uploadAvatar(file, token);
          updateUser(updated);
          setMsg({ tone: 'success', text: '프로필 사진이 변경됐어요.' });
        } catch (e2) {
          setMsg({ tone: 'error', text: e2.message || '업로드에 실패했어요.' });
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="mb-8 flex items-center gap-4 rounded-[1.5rem] border border-line bg-paper p-5 sm:p-6">
          <button type="button" onClick={pick} disabled={busy} title="프로필 사진 변경"
            className="relative shrink-0 rounded-full outline-none transition hover:opacity-90 focus-visible:ring-2 focus-visible:ring-mocha/40 disabled:cursor-wait">
            <Avatar src={user.profile_image} name={user.email} size={72} />
            <span className="absolute -bottom-0.5 -right-0.5 flex h-6 w-6 items-center justify-center rounded-full border-2 border-paper bg-mocha text-cream">
              <svg viewBox="0 0 24 24" className="h-3 w-3" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
            </span>
            {busy && (
              <span className="absolute inset-0 flex items-center justify-center rounded-full bg-espresso/45 text-[11px] font-medium text-cream">…</span>
            )}
          </button>
          <div className="min-w-0 flex-1">
            <p className="truncate font-medium text-espresso">{user.email}</p>
            {msg
              ? <p className={cx('mt-0.5 text-[13px]', msg.tone === 'error' ? 'text-red-600' : 'text-green-700')}>{msg.text}</p>
              : <p className="mt-0.5 text-[13px] text-mist">프로필 사진을 등록해 보세요 · JPG·PNG·WEBP · 5MB 이하</p>}
          </div>
          <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" onChange={onFile} className="hidden" />
          <Button variant="secondary" size="sm" onClick={pick} disabled={busy} className="shrink-0">
            {busy ? '변경 중…' : '사진 변경'}
          </Button>
        </div>
      );
    }

      const { items, updateQty, removeItem, clearCart } = useCart();

        const bean = BEAN_MAP[i.beanId];
        const unit = priceFor(bean, i.weight);
        return { ...i, bean, unit, total: unit * i.qty };
      }), [items]);

      const subtotal = lines.reduce((s, l) => s + l.total, 0);
      const FREE = 30000;
      const shipping = subtotal === 0 || subtotal >= FREE ? 0 : 3000;

      const remainForFree = Math.max(0, FREE - subtotal);

    // ========================================
    // 🔌 백엔드 연동 레이어 (API 클라이언트 · 인증 · 주문)
    // ========================================
    const TOKEN_KEY = 'bean_shop_token';
    let LAST_ORDER = null; // 방금 생성한 주문(주문완료 페이지에서 사용)

    // 공통 fetch 래퍼 — { success, data, message } 규약 처리
    async function apiFetch(path, { method = 'GET', body, token } = {}) {
      const headers = {};
      if (body !== undefined) headers['Content-Type'] = 'application/json';
      if (token) headers['Authorization'] = 'Bearer ' + token;
      let res;
      try {
        res = await fetch(path, {
          method, headers,
          body: body !== undefined ? JSON.stringify(body) : undefined,
        });
      } catch (e) {
        throw new Error('네트워크 오류로 서버에 연결할 수 없어요.');
      }
      let json = null;
      try { json = await res.json(); } catch (e) { /* non-JSON */ }
      if (!res.ok || !json || json.success === false) {
        const msg = (json && json.message) || ('요청 처리 중 오류가 발생했어요. (' + res.status + ')');
        const err = new Error(msg);
        err.status = res.status;
        if (json && json.code) err.code = json.code; // 서버/Toss 에러 코드 전달
        throw err;
      }
      return json.data;
    }

    // ── 인증 컨텍스트 ──
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    function AuthProvider({ children }) {
      const [token, setToken] = useState(() => {
        try { return localStorage.getItem(TOKEN_KEY) || null; } catch (e) { return null; }
      });
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);

      // 토큰이 있으면 /me 로 세션 복원
      useEffect(() => {
        let alive = true;
        if (!token) { setUser(null); setReady(true); return; }
        setReady(false);
        apiFetch('/api/auth/me', { token })
          .then((d) => { if (alive) { setUser(d.user); setReady(true); } })
          .catch(() => {
            if (!alive) return;
            setUser(null); setToken(null);
            try { localStorage.removeItem(TOKEN_KEY); } catch (e) {}
            setReady(true);
          });
        return () => { alive = false; };
      }, [token]);

      const persist = (tok, usr) => {
        setUser(usr); setToken(tok);
        try { tok ? localStorage.setItem(TOKEN_KEY, tok) : localStorage.removeItem(TOKEN_KEY); } catch (e) {}
      };
      const login = async (email, password) => {
        const d = await apiFetch('/api/auth/login', { method: 'POST', body: { email, password } });
        persist(d.token, d.user); return d.user;
      };
      const signup = async (email, password) => {
        const d = await apiFetch('/api/auth/signup', { method: 'POST', body: { email, password } });
        persist(d.token, d.user); return d.user;
      };
      const logout = () => persist(null, null);
      const updateUser = (usr) => setUser(usr); // 프로필 이미지 변경 등 부분 갱신

      return (
        <AuthContext.Provider value={{ token, user, ready, login, signup, logout, updateUser }}>
          {children}
        </AuthContext.Provider>
      );
    }

    // ── 카탈로그 동기화: seed BEANS 를 /api/products 데이터로 교체 ──
    // (요청 실패 시 내장 seed 데이터를 그대로 사용 — 오프라인에서도 화면은 뜬다)
    function useCatalogSync(onLoaded) {
      useEffect(() => {
        let alive = true;
        apiFetch('/api/products')
          .then((d) => {
            if (!alive || !d || !Array.isArray(d.products) || d.products.length === 0) return;
            BEANS = d.products;
            BEAN_MAP = Object.fromEntries(BEANS.map((b) => [b.id, b]));
            onLoaded();
          })
          .catch(() => { /* seed 유지 */ });
      }, []);
    }

    // ── 폼 프리미티브 (디자인 시스템에 맞춘 입력/알림) ──
    function Field({ label, type = 'text', value, onChange, placeholder, required, autoComplete, hint }) {
      return (
        <label className="block">
          <span className="mb-1.5 block text-[13px] font-medium text-espresso">
            {label}{required && <span className="text-mocha"> *</span>}
          </span>
          <input
            type={type} value={value} onChange={onChange} placeholder={placeholder}
            required={required} autoComplete={autoComplete}
            className="w-full rounded-xl border border-line bg-paper px-4 py-3 text-[15px] text-espresso outline-none transition-colors placeholder:text-mist focus:border-mocha focus:ring-2 focus:ring-mocha/20"
          />
          {hint && <span className="mt-1 block text-[12px] text-mist">{hint}</span>}
        </label>
      );
    }

    function Notice({ tone = 'error', children }) {
      const tones = {
        error: 'border-red-200 bg-red-50 text-red-700',
        info: 'border-line bg-ecru/60 text-mocha',
      };
      return <div className={cx('rounded-xl border px-4 py-3 text-[13px] leading-relaxed', tones[tone])}>{children}</div>;
    }

    function AuthLayout({ title, subtitle, children, footer }) {
      return (
        <Container className="py-16 sm:py-24">
          <div className="mx-auto w-full max-w-md">
            <div className="text-center">

              {subtitle && <p className="mt-2 text-sm text-stone">{subtitle}</p>}
            </div>
            <div className="mt-8 rounded-[1.5rem] border border-line bg-paper p-6 sm:p-8">{children}</div>
            {footer && <div className="mt-5 text-center text-[13px] text-stone">{footer}</div>}

        </Container>

    // ========================================
    // 📄 로그인 / 회원가입
    // ========================================
    function LoginPage() {

      const [email, setEmail] = useState('');

    function SignupPage() {
      const { signup } = useAuth();
      const [email, setEmail] = useState('');

        <AuthLayout title="회원가입" subtitle="이메일과 비밀번호로 간편하게 시작하세요."

            <Field label="비밀번호" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="8자 이상" required autoComplete="new-password" hint="8자 이상 100자 이하" />
            <Field label="비밀번호 확인" type="password" value={confirm} onChange={(e) => setConfirm(e.target.value)} placeholder="비밀번호 재입력" required autoComplete="new-password" />

    // ========================================
    // 📄 주문서 (체크아웃)
    // ========================================
    function CheckoutPage() {
      const { items } = useCart();
      const { user, token } = useAuth();
      const [form, setForm] = useState({ name: '', phone: '', email: '', address: '', zipcode: '', memo: '' });
      const [phase, setPhase] = useState('form');       // 'form' → 배송정보 입력, 'pay' → 결제
      const [err, setErr] = useState(null);
      const [busy, setBusy] = useState(false);
      const [clientKey, setClientKey] = useState(null); // 서버가 내려준 공개 클라이언트 키
      const [keyError, setKeyError] = useState(false);
      const [widgetReady, setWidgetReady] = useState(false);
      const [pay, setPay] = useState(null);             // { orderNo, amount, orderName } — pending 주문 생성 후

      const widgetsRef = useRef(null);
      const renderedRef = useRef(false);

      useEffect(() => { window.scrollTo({ top: 0 }); }, []);
      useEffect(() => {
        if (user && user.email) setForm((f) => (f.email ? f : { ...f, email: user.email }));
      }, [user]);

      // 공개 클라이언트 키 로드 (시크릿 키는 서버에만 존재)
      useEffect(() => {
        let alive = true;
        apiFetch('/api/payments/config')
          .then((d) => { if (!alive) return; d && d.clientKey ? setClientKey(d.clientKey) : setKeyError(true); })
          .catch(() => { if (alive) setKeyError(true); });
        return () => { alive = false; };
      }, []);

      const lines = useMemo(() => items.map((i) => {
        const bean = BEAN_MAP[i.beanId];
        const unit = bean ? priceFor(bean, i.weight) : 0;
        return { ...i, bean, unit, total: unit * i.qty };
      }), [items]);
      const subtotal = lines.reduce((s, l) => s + l.total, 0);
      const shipping = subtotal === 0 || subtotal >= 30000 ? 0 : 3000;
      const total = subtotal + shipping;

      // 결제위젯 렌더 — pay 단계 + 키/주문 확보 시 1회만 (재렌더 금지, 금액 변경은 setAmount)
      useEffect(() => {
        if (phase !== 'pay' || !pay || !clientKey) return;
        if (!window.TossPayments) {
          setErr('결제 모듈(TossPayments)을 불러오지 못했어요. 네트워크를 확인한 뒤 다시 시도해주세요.');
          return;
        }
        let alive = true;
        (async () => {
          try {
            if (!widgetsRef.current) {
              const tossPayments = window.TossPayments(clientKey);
              const customerKey = user
                ? ('bean_shop_member_' + user.id)
                : (window.TossPayments.ANONYMOUS || ('guest_' + Math.random().toString(36).slice(2)));
              widgetsRef.current = tossPayments.widgets({ customerKey });
            }
            await widgetsRef.current.setAmount({ currency: 'KRW', value: pay.amount });
            if (!renderedRef.current) {
              await Promise.all([
                widgetsRef.current.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' }),
                widgetsRef.current.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' }),
              ]);
              renderedRef.current = true;
            }
            if (alive) setWidgetReady(true);
          } catch (e) {
            if (alive) setErr('결제창을 불러오지 못했어요: ' + ((e && e.message) || e));
          }
        })();
        return () => { alive = false; };
      }, [phase, clientKey, pay, user]);

      if (items.length === 0) {
        return (
          <Container className="py-16 text-center sm:py-24">
            <h1 className="font-kserif text-3xl font-semibold text-espresso">주문 · 결제</h1>
            <p className="mt-4 text-sm text-stone">장바구니가 비어 있어요.</p>
            <div className="mt-6"><Button onClick={() => navigate('/shop')}>원두 둘러보기 <IconArrowRight /></Button></div>
          </Container>
        );
      }

      const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      // 1단계: 서버에 pending 주문 생성 → order_no(=Toss orderId) + total(=결제금액) 확보 → 결제 단계로
      const createOrder = async (e) => {
        e.preventDefault(); setErr(null); setBusy(true);
        try {
          const payload = {
            items: items.map((i) => ({ beanId: i.beanId, grind: i.grind, weight: i.weight, qty: i.qty })),
            customer: {
              name: form.name.trim(), phone: form.phone.trim(), email: form.email.trim(),
              address: form.address.trim(), zipcode: form.zipcode.trim(), memo: form.memo.trim(),
            },
          };
          const d = await apiFetch('/api/orders', { method: 'POST', body: payload, token: token || undefined });
          const order = d.order;
          const first = order.items[0];
          const orderName = order.items.length > 1
            ? (first.product_name + ' 외 ' + (order.items.length - 1) + '건')
            : (first.product_name + ' · ' + first.weight);
          setPay({ orderNo: order.order_no, amount: order.total, orderName });
          setWidgetReady(false);
          setPhase('pay');
        } catch (e2) { setErr(e2.message); }
        finally { setBusy(false); }
      };

      // 2단계: Toss 결제창 호출 → successUrl 로 리다이렉트 (서버 승인은 /payment/success 에서)
      const requestPay = async () => {
        if (!widgetsRef.current || !pay) return;
        setErr(null); setBusy(true);
        try {
          await widgetsRef.current.requestPayment({
            orderId: pay.orderNo,
            orderName: pay.orderName,
            successUrl: window.location.origin + '/payment/success',
            failUrl: window.location.origin + '/payment/fail',
            customerEmail: form.email.trim() || undefined,
            customerName: form.name.trim() || undefined,
          });
          // 정상 흐름에서는 여기로 돌아오지 않음(리다이렉트)
        } catch (e2) {
          const msg = e2 && e2.code === 'USER_CANCEL'
            ? '결제를 취소했어요. 다시 시도할 수 있어요.'
            : ((e2 && e2.message) || '결제 요청 중 오류가 발생했어요.');
          setErr(msg); setBusy(false);
        }
      };

      const backToForm = () => { setErr(null); setPhase('form'); };
      const payAmount = pay ? pay.amount : total;

      return (
        <Container className="py-12 sm:py-16">
          <h1 className="font-kserif text-3xl font-semibold text-espresso sm:text-4xl">주문 · 결제</h1>
          <div className="mt-3 flex items-center gap-2 text-[13px] text-stone">
            <span className={cx(phase === 'form' && 'font-semibold text-espresso')}>1. 배송 정보</span>
            <IconArrowRight className="w-3.5 h-3.5 text-mist" />
            <span className={cx(phase === 'pay' && 'font-semibold text-espresso')}>2. 결제</span>
          </div>

          <div className="mt-8 grid gap-8 lg:grid-cols-3">
            <div className="space-y-4 lg:col-span-2">
              {err && <Notice>{err}</Notice>}

              {/* 배송 정보 — form 단계: 편집 폼 / pay 단계: 요약 */}
              {phase === 'form' ? (
                <form id="checkout-form" onSubmit={createOrder} className="space-y-4">
                  {!user && (
                    <Notice tone="info">
                      비회원으로 주문하시나요? <Link to="/login" className="font-medium underline">로그인</Link>하면 주문 내역이 계정에 저장돼요.
                    </Notice>
                  )}
                  <div className="rounded-[1.5rem] border border-line bg-paper p-6">
                    <h2 className="font-kserif text-lg font-semibold text-espresso">배송 정보</h2>
                    <div className="mt-5 space-y-4">
                      <Field label="받는 분" value={form.name} onChange={set('name')} placeholder="홍길동" required />
                      <Field label="연락처" value={form.phone} onChange={set('phone')} placeholder="010-1234-5678" required />
                      <Field label="이메일" type="email" value={form.email} onChange={set('email')} placeholder="you@example.com" required />
                      <div className="grid grid-cols-3 gap-3">
                        <div className="col-span-1"><Field label="우편번호" value={form.zipcode} onChange={set('zipcode')} placeholder="06000" /></div>
                        <div className="col-span-2"><Field label="주소" value={form.address} onChange={set('address')} placeholder="서울시 강남구 ..." required /></div>
                      </div>
                      <Field label="배송 메모" value={form.memo} onChange={set('memo')} placeholder="문 앞에 놓아주세요 (선택)" />
                    </div>
                  </div>
                </form>
              ) : (
                <div className="rounded-[1.5rem] border border-line bg-paper p-5">
                  <div className="flex items-center justify-between">
                    <h2 className="font-kserif text-lg font-semibold text-espresso">배송 정보</h2>
                    <button type="button" onClick={backToForm} className="text-[13px] text-mocha hover:text-espresso">수정</button>
                  </div>
                  <div className="mt-2.5 space-y-0.5 text-[13.5px] text-stone">
                    <div><span className="font-medium text-espresso">{form.name}</span> · {form.phone}</div>
                    <div>{form.address}{form.zipcode ? ' (' + form.zipcode + ')' : ''}</div>
                    {form.memo && <div className="text-mist">메모: {form.memo}</div>}
                  </div>
                </div>
              )}

              {/* 결제수단 위젯 — 항상 마운트 유지(단계 전환 시 재렌더 방지), pay 단계에서만 표시 */}
              <div className={cx('rounded-[1.5rem] border border-line bg-paper p-3 sm:p-4', phase !== 'pay' && 'hidden')}>
                <div id="payment-method" />
                <div id="agreement" />
                {phase === 'pay' && !widgetReady && !keyError && (
                  <div className="px-3 py-8 text-center text-sm text-stone">결제창을 불러오는 중…</div>
                )}
                {keyError && (
                  <div className="px-3 py-8 text-center text-sm text-red-600">결제 설정을 불러오지 못했어요. 서버의 TOSS_CLIENT_KEY 설정을 확인해주세요.</div>
                )}
              </div>
            </div>

            {/* 주문 요약 (양 단계 공통) */}
            <div className="lg:col-span-1">
              <div className="rounded-[1.5rem] border border-line bg-paper p-6 lg:sticky lg:top-24">
                <h2 className="font-kserif text-xl font-semibold text-espresso">주문 요약</h2>
                <div className="mt-4 space-y-3">
                  {lines.map((l) => (
                    <div key={l.key} className="flex justify-between gap-3 text-sm">
                      <span className="min-w-0">
                        <span className="text-espresso">{l.bean ? l.bean.name : l.beanId}</span>
                        <span className="mt-0.5 block text-[12px] text-mist">{l.grind} · {l.weight} · {l.qty}개</span>
                      </span>
                      <span className="shrink-0 font-medium text-espresso">{won(l.total)}</span>
                    </div>
                  ))}
                </div>
                <dl className="mt-5 space-y-2 border-t border-line pt-4 text-sm">
                  <div className="flex justify-between"><dt className="text-stone">상품 금액</dt><dd className="font-medium text-espresso">{won(subtotal)}</dd></div>
                  <div className="flex justify-between"><dt className="text-stone">배송비</dt><dd className="font-medium text-espresso">{shipping === 0 ? '무료' : won(shipping)}</dd></div>
                </dl>
                <div className="mt-4 flex items-end justify-between border-t border-line pt-4">
                  <span className="text-[15px] font-semibold text-espresso">총 결제금액</span>
                  <span className="font-kserif text-2xl font-semibold text-espresso">{won(payAmount)}</span>
                </div>

                {phase === 'form' ? (
                  <Button type="submit" form="checkout-form" size="lg" className="mt-6 w-full" disabled={busy}>
                    {busy ? '주문 생성 중…' : '결제 진행하기'}
                  </Button>
                ) : (
                  <>
                    <Button size="lg" className="mt-6 w-full" onClick={requestPay} disabled={busy || !widgetReady}>
                      {busy ? '결제창 여는 중…' : (won(payAmount) + ' 결제하기')}
                    </Button>
                    <button type="button" onClick={backToForm} className="mt-3 w-full text-center text-[13px] text-stone hover:text-espresso">← 배송 정보 수정</button>
                  </>
                )}
                <p className="mt-3 text-center text-[12px] text-mist">TossPayments 테스트 결제 — 실제 청구는 없습니다.</p>
              </div>
            </div>
          </div>
        </Container>
      );
    }

    // ========================================
    // 📄 주문 완료
    // ========================================
    function OrderConfirmPage({ orderNo }) {
      const { token } = useAuth();
      const [order, setOrder] = useState(() => (LAST_ORDER && LAST_ORDER.order_no === orderNo ? LAST_ORDER : null));
      const [err, setErr] = useState(null);
      const [loading, setLoading] = useState(!order);

      useEffect(() => { window.scrollTo({ top: 0 }); }, []);
      useEffect(() => {
        if (order) return;
        let alive = true; setLoading(true);
        apiFetch('/api/orders/' + encodeURIComponent(orderNo), { token: token || undefined })
          .then((d) => { if (alive) { setOrder(d.order); setLoading(false); } })
          .catch(() => { if (alive) { setErr('주문 정보를 불러올 수 없어요. 비회원 주문은 주문 직후 화면에서만 확인할 수 있어요.'); setLoading(false); } });
        return () => { alive = false; };
      }, [orderNo]);

      if (loading) return <Container className="py-24 text-center text-stone">주문 정보를 불러오는 중…</Container>;
      if (err || !order) {
        return (
          <Container className="py-24 text-center">
            <p className="text-stone">{err || '주문을 찾을 수 없어요.'}</p>
            <div className="mt-6"><Button onClick={() => navigate('/shop')}>쇼핑 계속하기</Button></div>
          </Container>
        );
      }
      return (
        <Container className="py-12 sm:py-16">
          <div className="mx-auto max-w-2xl">
            <div className="text-center">
              <div className="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-mocha/10 text-mocha"><IconCheck className="h-8 w-8" /></div>
              <h1 className="mt-5 font-kserif text-3xl font-semibold text-espresso">{order.status === 'paid' ? '결제가 완료되었어요' : '주문이 접수되었어요'}</h1>
              <p className="mt-2 text-sm text-stone">주문번호 <span className="font-semibold text-espresso">{order.order_no}</span></p>
              <div className="mt-3 flex items-center justify-center gap-2">
                <Badge tone={statusMeta(order.status).tone}>{statusMeta(order.status).label}</Badge>
                {order.payment_method && <span className="text-[12px] text-stone">결제수단 · {order.payment_method}</span>}
              </div>
            </div>
            <div className="mt-8 rounded-[1.5rem] border border-line bg-paper p-6 sm:p-8">
              <div className="divide-y divide-line">
                {order.items.map((it, idx) => (
                  <div key={idx} className="flex justify-between gap-3 py-3 first:pt-0 last:pb-0">
                    <div>
                      <div className="font-medium text-espresso">{it.product_name}</div>
                      <div className="text-[12.5px] text-stone">{it.grind} · {it.weight} · {it.qty}개</div>
                    </div>
                    <div className="text-right font-medium text-espresso">{won(it.line_total)}</div>
                  </div>
                ))}
              </div>
              <dl className="mt-5 space-y-2 border-t border-line pt-4 text-sm">
                <div className="flex justify-between"><dt className="text-stone">상품 금액</dt><dd className="text-espresso">{won(order.subtotal)}</dd></div>
                <div className="flex justify-between"><dt className="text-stone">배송비</dt><dd className="text-espresso">{order.shipping_fee === 0 ? '무료' : won(order.shipping_fee)}</dd></div>
                <div className="flex justify-between border-t border-line pt-2 text-[15px] font-semibold"><dt className="text-espresso">총 결제금액</dt><dd className="text-espresso">{won(order.total)}</dd></div>
              </dl>
              <div className="mt-5 rounded-xl bg-ecru/50 px-4 py-3 text-[13px] text-stone">
                <div><span className="font-medium text-espresso">{order.customer.name}</span> · {order.customer.phone}</div>
                <div className="mt-0.5">{order.customer.address}{order.customer.zipcode ? ' (' + order.customer.zipcode + ')' : ''}</div>
              </div>
            </div>
            <div className="mt-7 flex justify-center gap-3">
              <Button variant="secondary" onClick={() => navigate('/shop')}>쇼핑 계속하기</Button>
              <Button onClick={() => navigate('/orders')}>주문 내역 <IconArrowRight /></Button>
            </div>
          </div>
        </Container>
      );
    }

    // ========================================
    // 📄 주문 내역 (마이페이지)
    // ========================================
    function OrdersPage() {
      const { token, user, ready } = useAuth();
      const [orders, setOrders] = useState(null);
      const [err, setErr] = useState(null);

      useEffect(() => { window.scrollTo({ top: 0 }); }, []);
      useEffect(() => {
        if (!ready || !token) return;
        let alive = true;
        apiFetch('/api/orders', { token })
          .then((d) => { if (alive) setOrders(d.orders); })
          .catch((e) => { if (alive) setErr(e.message); });
        return () => { alive = false; };
      }, [ready, token]);

      if (ready && !user) {
        return (
          <Container className="py-16 text-center sm:py-24">
            <h1 className="font-kserif text-3xl font-semibold text-espresso">주문 내역</h1>
            <p className="mt-3 text-sm text-stone">주문 내역을 보려면 로그인이 필요해요.</p>
            <div className="mt-6 flex justify-center gap-3">
              <Button onClick={() => navigate('/login')}>로그인</Button>
              <Button variant="secondary" onClick={() => navigate('/signup')}>회원가입</Button>
            </div>
          </Container>
        );
      }
      return (
        <Container className="py-12 sm:py-16">
          <ProfileCard />
          <h1 className="mb-6 font-kserif text-2xl font-semibold text-espresso sm:text-3xl">주문 내역</h1>
          {err && <Notice>{err}</Notice>}
          {orders === null && !err && <p className="text-stone">불러오는 중…</p>}
          {orders && orders.length === 0 && (
            <div className="rounded-[1.5rem] border border-dashed border-line bg-paper py-16 text-center">
              <p className="text-stone">아직 주문이 없어요.</p>
              <div className="mt-5"><Button onClick={() => navigate('/shop')}>원두 둘러보기 <IconArrowRight /></Button></div>
            </div>
          )}
          <div className="space-y-4">
            {orders && orders.map((o) => (
              <div key={o.order_no} className="rounded-[1.5rem] border border-line bg-paper p-5 sm:p-6">
                <div className="flex flex-wrap items-center justify-between gap-2">
                  <div className="flex items-center gap-2">
                    <span className="font-semibold text-espresso">{o.order_no}</span>
                    <Badge tone={statusMeta(o.status).tone}>{statusMeta(o.status).label}</Badge>
                  </div>
                  <span className="text-[13px] text-mist">{new Date(o.created_at).toLocaleString('ko-KR')}</span>
                </div>
                <div className="mt-3 divide-y divide-line border-t border-line pt-1">
                  {o.items.map((it, idx) => (
                    <div key={idx} className="flex justify-between gap-3 py-2 text-sm">
                      <span className="text-stone"><span className="text-espresso">{it.product_name}</span> · {it.grind} · {it.weight} · {it.qty}개</span>
                      <span className="font-medium text-espresso">{won(it.line_total)}</span>
                    </div>
                  ))}
                </div>
                <div className="mt-3 flex justify-end border-t border-line pt-3 text-sm">
                  <span className="text-stone">총 결제금액&nbsp;</span>
                  <span className="font-semibold text-espresso">{won(o.total)}</span>
                </div>
              </div>
            ))}
          </div>
        </Container>
      );
    }

    // ========================================
    // 💳 결제 결과 처리 (Toss successUrl / failUrl 착지)
    // ========================================
    // successUrl/failUrl 로 돌아온 쿼리 파싱. 우리는 해시 없는 실제 경로(/payment/success)를
    // successUrl 로 주므로 값은 location.search 에 붙지만, 혹시 모를 hash 라우팅 충돌까지 막기 위해
    // location.search + hash 안 query 를 모두 병합한다(방어적).
    function readPaymentParams() {
      const params = new URLSearchParams();
      new URLSearchParams(window.location.search).forEach((v, k) => params.set(k, v));
      const hash = window.location.hash;
      const qi = hash.indexOf('?');
      if (qi !== -1) new URLSearchParams(hash.slice(qi + 1)).forEach((v, k) => params.set(k, v));
      return params;
    }

    function PaymentResult({ mode, onExit }) {
      const { token } = useAuth();
      const [state, setState] = useState('processing'); // 'processing' | 'error'
      const [error, setError] = useState(null);          // { code, message }
      const startedRef = useRef(false);

      useEffect(() => {
        if (startedRef.current) return;  // confirm 은 반드시 1회만
        startedRef.current = true;

        const params = readPaymentParams();

        if (mode === 'fail') {
          window.history.replaceState({}, '', window.location.pathname); // 민감 쿼리 제거
          setError({
            code: params.get('code'),
            message: params.get('message') || '결제가 취소되었거나 실패했어요.',
          });
          setState('error');
          return;
        }

        // mode === 'success' → 서버 승인
        const paymentKey = params.get('paymentKey');
        const orderId = params.get('orderId');
        const amount = params.get('amount');
        // 승인 전에 URL 의 민감 파라미터 제거(새로고침 시 재승인/노출 방지)
        window.history.replaceState({}, '', window.location.pathname);

        if (!paymentKey || !orderId || !amount) {
          setError({ code: 'INVALID_CALLBACK', message: '결제 정보가 올바르지 않아요. 다시 시도해주세요.' });
          setState('error');
          return;
        }

        let alive = true;
        apiFetch('/api/payments/confirm', {
          method: 'POST',
          body: { paymentKey, orderId, amount: Number(amount) },
          token: token || undefined,
        })
          .then((d) => {
            if (!alive) return;
            LAST_ORDER = d.order; // 주문완료 페이지가 메모리에서 즉시 표시(비회원 포함)
            onExit('/order/' + encodeURIComponent(d.order.order_no));
          })
          .catch((e) => {
            if (!alive) return;
            setError({ code: e.code, message: e.message || '결제 승인에 실패했어요.' });
            setState('error');
          });
        return () => { alive = false; };
      }, []);

      if (state === 'processing') {
        return (
          <Container className="py-24 text-center">
            <div className="mx-auto flex h-14 w-14 animate-pulse items-center justify-center rounded-full bg-mocha/10 text-mocha"><IconMug className="h-7 w-7" /></div>
            <p className="mt-5 font-kserif text-xl font-semibold text-espresso">결제를 승인하는 중…</p>
            <p className="mt-2 text-sm text-stone">잠시만 기다려 주세요. 창을 닫지 마세요.</p>
          </Container>
        );
      }

      return (
        <Container className="py-20 text-center">
          <div className="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-red-50 text-red-500"><IconClose className="h-8 w-8" /></div>
          <h1 className="mt-5 font-kserif text-2xl font-semibold text-espresso">결제를 완료하지 못했어요</h1>
          <p className="mt-2 text-sm text-stone">{error && error.message}</p>
          {error && error.code && <p className="mt-1 text-[12px] text-mist">오류 코드: {error.code}</p>}
          <div className="mt-7 flex justify-center gap-3">
            <Button variant="secondary" onClick={() => onExit('/cart')}>장바구니로</Button>
            <Button onClick={() => onExit('/shop')}>쇼핑 계속하기</Button>
          </div>
        </Container>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const path = useHashRoute();
      const [, forceCatalog] = useState(0);
      useCatalogSync(() => forceCatalog((n) => n + 1));

      // Toss 리다이렉트 착지 경로(/payment/success|fail) 감지 — 해시가 아니라 실제 pathname.
      const [paymentMode, setPaymentMode] = useState(() => {
        const p = window.location.pathname;
        return p === '/payment/success' ? 'success' : p === '/payment/fail' ? 'fail' : null;
      });

      // 결제 처리 종료 → /payment/* pathname·쿼리를 정리하고 해시 라우트로 복귀.
      // replaceState 로 pathname 을 '/' 로 되돌린 뒤, 같은 배치에서 해시 라우터를 동기화한다.
      const exitPayment = useCallback((hashTarget) => {
        const target = hashTarget || '/';
        window.history.replaceState({}, '', '/#' + target);
        window.dispatchEvent(new Event('hashchange'));
        setPaymentMode(null);
      }, []);

      useEffect(() => { window.scrollTo({ top: 0, behavior: 'auto' }); }, [path]);

      let page;
      if (paymentMode) page = <PaymentResult mode={paymentMode} onExit={exitPayment} />;
      else if (path === '/' || path === '') page = <HomePage />;
      else if (path === '/shop') page = <ShopPage />;
      else if (path.startsWith('/product/')) page = <ProductPage id={decodeURIComponent(path.slice('/product/'.length))} />;
      else if (path === '/cart') page = <CartPage />;
      else if (path === '/login') page = <LoginPage />;
      else if (path === '/signup') page = <SignupPage />;
      else if (path === '/checkout') page = <CheckoutPage />;
      else if (path === '/orders') page = <OrdersPage />;
      else if (path.startsWith('/order/')) page = <OrderConfirmPage orderNo={decodeURIComponent(path.slice('/order/'.length))} />;
      else page = <NotFound />;

      return (
        <div className="relative z-10 flex min-h-screen flex-col bg-cream font-sans text-espresso">
          <Header path={path} />
          <main className="flex-1">{page}</main>
          <Footer />
          <ToastHost />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider><CartProvider><App /></CartProvider></AuthProvider>
    );
  </script>
</body>
</html>
