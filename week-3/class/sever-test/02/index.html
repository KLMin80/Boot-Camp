<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인사 & 시간 응답기</title>
  <!-- Tailwind CSS, React, ReactDOM, Babel (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 가져오기
    // ========================================
    const { useState } = React;

    // ※ 인사말 계산 로직은 이제 클라이언트가 아니라 '서버(server.js)'에 있습니다!
    //    버튼을 누르면 서버의 /api/greeting 을 호출해서 결과를 받아옵니다.

    // ========================================
    // 🎨 디자인 시스템: 버튼 컴포넌트
    // ========================================
    // 화면에 보이는 모습만 담당하는 재사용 버튼입니다.
    function Button({ children, onClick, disabled }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}  // 불러오는 중에는 버튼을 잠가서 중복 클릭을 막습니다.
          className="px-8 py-3 rounded-full text-white text-lg font-semibold
                     bg-gradient-to-r from-indigo-500 to-purple-500
                     shadow-lg hover:shadow-xl hover:scale-105
                     active:scale-95 transition-all duration-200
                     focus:outline-none focus:ring-4 focus:ring-purple-300
                     disabled:opacity-60 disabled:cursor-not-allowed
                     disabled:hover:scale-100 disabled:hover:shadow-lg"
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🚀 App 컴포넌트 (메인 화면)
    // ========================================
    function App() {
      // response: 서버에서 받아온 응답 데이터 ({ greeting, time, hour })
      const [response, setResponse] = useState(null);
      // loading: 서버에 요청을 보내고 응답을 기다리는 중인지 여부
      const [loading, setLoading] = useState(false);
      // error: 요청이 실패했을 때 보여줄 에러 메시지 (없으면 null)
      const [error, setError] = useState(null);

      // 버튼 클릭 시 실행: 서버의 /api/greeting 을 호출해서 인사말 + 시간을 받아옵니다.
      async function handleClick() {
        setLoading(true);   // "불러오는 중..." 상태 켜기
        setError(null);     // 이전 에러 메시지 지우기

        try {
          // 서버에 요청 보내기 (같은 주소이므로 경로만 써도 됩니다)
          const res = await fetch("/api/greeting");

          // 응답 코드가 200대가 아니면 에러로 처리
          if (!res.ok) {
            throw new Error("서버 응답이 올바르지 않습니다.");
          }

          // 서버가 보낸 JSON을 자바스크립트 객체로 변환
          const data = await res.json();
          setResponse(data); // { greeting, time, hour }
        } catch (e) {
          // 네트워크 오류 등으로 실패하면 친절한 한국어 메시지를 보여줍니다.
          console.error(e);
          setError("서버에 연결할 수 없어요. 😢 잠시 후 다시 시도해 주세요.");
          setResponse(null);
        } finally {
          setLoading(false); // 성공하든 실패하든 로딩 상태 끄기
        }
      }

      return (
        // 배경: 부드러운 그라데이션 + 화면 중앙 정렬
        <div className="min-h-screen flex items-center justify-center p-4
                        bg-gradient-to-br from-sky-200 via-indigo-200 to-purple-200">

          {/* 가운데 카드 */}
          <div className="w-full max-w-md bg-white/90 backdrop-blur
                          rounded-3xl shadow-2xl p-8 sm:p-10 text-center">

            <h1 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
              인사 &amp; 시간 응답기
            </h1>
            <p className="text-gray-500 mb-8">
              버튼을 누르면 지금 시간과 인사말을 알려드려요!
            </p>

            {/* 클릭 버튼: 불러오는 중에는 라벨이 바뀌고 버튼이 잠깁니다 */}
            <Button onClick={handleClick} disabled={loading}>
              {loading ? "불러오는 중..." : "👋 클릭하세요"}
            </Button>

            {/* 에러 영역: 요청이 실패했을 때만 나타납니다 */}
            {error && (
              <div className="mt-6 p-4 rounded-2xl
                              bg-red-50 border border-red-200">
                <p className="text-red-600 font-medium">{error}</p>
              </div>
            )}

            {/* 응답 영역: 성공적으로 데이터를 받았을 때만 나타납니다 */}
            {response && !error && (
              <div className="mt-8 p-6 rounded-2xl
                              bg-gradient-to-br from-indigo-50 to-purple-50
                              border border-purple-100">
                <p className="text-xl sm:text-2xl font-semibold text-indigo-700 mb-3">
                  {response.greeting}
                </p>
                <p className="text-gray-600">
                  지금 시각은{" "}
                  <span className="font-mono font-bold text-gray-800">
                    {response.time}
                  </span>{" "}
                  입니다.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
