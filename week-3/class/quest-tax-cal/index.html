<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국형 세금 계산기 · 연봉 실수령액</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out; }
    @keyframes growBar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    .animate-grow-bar { animation: growBar 0.6s cubic-bezier(0.22, 1, 0.36, 1); transform-origin: left; }
    .num-tabular { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ============================================================
    // 2024년 기준 세금 / 4대보험 계산 로직
    //  - 실제 간이세액표가 아닌 연말정산 방식의 근사치 계산입니다.
    //  - 참고용이며 실제 공제액과 다를 수 있습니다.
    // ============================================================

    // 4대보험 요율 (근로자 부담분, 2024년)
    const RATES = {
      국민연금: 0.045,        // 4.5%
      건강보험: 0.03545,      // 3.545%
      장기요양: 0.1295,       // 건강보험료의 12.95%
      고용보험: 0.009,        // 0.9%
    };

    // 국민연금 기준소득월액 상·하한 (2024.07 ~)
    const 연금상한 = 6_170_000;
    const 연금하한 = 390_000;

    // 근로소득공제 (총급여 구간별)
    function 근로소득공제(총급여) {
      if (총급여 <= 5_000_000) return 총급여 * 0.7;
      if (총급여 <= 15_000_000) return 3_500_000 + (총급여 - 5_000_000) * 0.4;
      if (총급여 <= 45_000_000) return 7_500_000 + (총급여 - 15_000_000) * 0.15;
      if (총급여 <= 100_000_000) return 12_000_000 + (총급여 - 45_000_000) * 0.05;
      return Math.min(14_750_000 + (총급여 - 100_000_000) * 0.02, 20_000_000);
    }

    // 종합소득세 누진세율 (과세표준 → 산출세액)
    function 산출세액(과표) {
      if (과표 <= 0) return 0;
      if (과표 <= 14_000_000) return 과표 * 0.06;
      if (과표 <= 50_000_000) return 840_000 + (과표 - 14_000_000) * 0.15;
      if (과표 <= 88_000_000) return 6_240_000 + (과표 - 50_000_000) * 0.24;
      if (과표 <= 150_000_000) return 15_360_000 + (과표 - 88_000_000) * 0.35;
      if (과표 <= 300_000_000) return 37_060_000 + (과표 - 150_000_000) * 0.38;
      if (과표 <= 500_000_000) return 94_060_000 + (과표 - 300_000_000) * 0.40;
      if (과표 <= 1_000_000_000) return 174_060_000 + (과표 - 500_000_000) * 0.42;
      return 384_060_000 + (과표 - 1_000_000_000) * 0.45;
    }

    // 근로소득세액공제 (산출세액 기준, 간이 적용)
    function 근로세액공제(산출) {
      const 공제 = 산출 <= 1_300_000
        ? 산출 * 0.55
        : 715_000 + (산출 - 1_300_000) * 0.30;
      return Math.min(공제, 740_000); // 한도 간이 적용
    }

    function 계산하기({ 연봉, 부양가족, 비과세월 }) {
      const 비과세연 = 비과세월 * 12;
      const 과세대상연봉 = Math.max(연봉 - 비과세연, 0);
      const 월급 = 연봉 / 12;
      const 과세월급 = 과세대상연봉 / 12;

      // --- 4대보험 (월 기준, 과세대상 급여로 산정) ---
      const 연금기준 = Math.min(Math.max(과세월급, 연금하한), 연금상한);
      const 국민연금 = Math.floor((연금기준 * RATES.국민연금) / 10) * 10;
      const 건강보험 = Math.floor((과세월급 * RATES.건강보험) / 10) * 10;
      const 장기요양 = Math.floor((건강보험 * RATES.장기요양) / 10) * 10;
      const 고용보험 = Math.floor((과세월급 * RATES.고용보험) / 10) * 10;
      const 사대보험 = 국민연금 + 건강보험 + 장기요양 + 고용보험;

      // --- 소득세 (연말정산 근사) ---
      const 총급여 = 과세대상연봉;
      const 공제후 = 총급여 - 근로소득공제(총급여);
      const 인적공제 = 1_500_000 * Math.max(부양가족, 1); // 본인 포함 1명 이상
      const 과표 = Math.max(공제후 - 인적공제, 0);
      const 산출 = 산출세액(과표);
      const 결정세액 = Math.max(산출 - 근로세액공제(산출), 0);
      const 소득세월 = Math.floor((결정세액 / 12) / 10) * 10;
      const 지방세월 = Math.floor((소득세월 * 0.1) / 10) * 10;

      const 총공제 = 사대보험 + 소득세월 + 지방세월;
      const 실수령월 = Math.round(월급 - 총공제);

      return {
        월급: Math.round(월급),
        국민연금, 건강보험, 장기요양, 고용보험, 사대보험,
        소득세월, 지방세월,
        총공제,
        실수령월,
        실수령연: 실수령월 * 12,
        과표,
        결정세액,
      };
    }

    // ============================================================
    // 유틸
    // ============================================================
    const won = (n) => n.toLocaleString("ko-KR") + "원";

    // ============================================================
    // UI 컴포넌트
    // ============================================================
    function NumberField({ label, value, onChange, suffix, step = 1, hint }) {
      return (
        <label className="block">
          <span className="text-sm font-medium text-slate-600">{label}</span>
          <div className="mt-1.5 flex items-stretch rounded-xl border border-slate-300 bg-white focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-100 transition">
            <input
              type="number"
              value={value}
              min="0"
              step={step}
              onChange={(e) => onChange(Math.max(0, Number(e.target.value)))}
              className="w-full rounded-xl bg-transparent px-3.5 py-2.5 text-right text-lg font-semibold text-slate-800 num-tabular outline-none"
            />
            {suffix && (
              <span className="flex items-center pr-3.5 text-sm font-medium text-slate-400">{suffix}</span>
            )}
          </div>
          {hint && <span className="mt-1 block text-xs text-slate-400">{hint}</span>}
        </label>
      );
    }

    function Row({ label, value, color = "text-slate-700", strong, sub }) {
      return (
        <div className={"flex items-center justify-between py-2.5 " + (strong ? "" : "border-b border-slate-100")}>
          <span className={"text-sm " + (sub ? "pl-4 text-slate-400" : "text-slate-500")}>
            {sub && <span className="mr-1 text-slate-300">└</span>}{label}
          </span>
          <span className={"num-tabular tracking-tight " + (strong ? "text-lg font-bold " : "font-semibold ") + color}>
            {value}
          </span>
        </div>
      );
    }

    function App() {
      const [연봉만원, set연봉만원] = useState(3600); // 만원 단위 입력
      const [부양가족, set부양가족] = useState(1);
      const [비과세월, set비과세월] = useState(200000); // 식대 등 비과세 (월)

      const result = useMemo(
        () => 계산하기({ 연봉: 연봉만원 * 10000, 부양가족, 비과세월 }),
        [연봉만원, 부양가족, 비과세월]
      );

      const 공제율 = result.월급 > 0 ? (result.총공제 / result.월급) * 100 : 0;

      const breakdown = [
        { label: "국민연금", value: result.국민연금, color: "bg-indigo-400" },
        { label: "건강보험", value: result.건강보험, color: "bg-sky-400" },
        { label: "장기요양", value: result.장기요양, color: "bg-cyan-400" },
        { label: "고용보험", value: result.고용보험, color: "bg-teal-400" },
        { label: "소득세", value: result.소득세월, color: "bg-rose-400" },
        { label: "지방소득세", value: result.지방세월, color: "bg-amber-400" },
      ];

      return (
        <div className="min-h-screen px-4 py-8 sm:py-12">
          <div className="mx-auto max-w-3xl">
            {/* 헤더 */}
            <header className="mb-8 text-center animate-fade-in-up">
              <div className="mb-3 inline-flex items-center gap-2 rounded-full bg-indigo-600 px-4 py-1.5 text-xs font-semibold text-white shadow-sm">
                <span>🇰🇷</span> 2024년 기준
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight text-slate-800 sm:text-4xl">
                연봉 실수령액 계산기
              </h1>
              <p className="mt-2 text-sm text-slate-500">
                4대보험과 소득세를 반영한 한 달 실수령액을 계산해 드려요
              </p>
            </header>

            <div className="grid gap-6 md:grid-cols-5">
              {/* 입력 영역 */}
              <section className="md:col-span-2 animate-fade-in-up" style={{ animationDelay: "0.05s" }}>
                <div className="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="mb-5 text-sm font-bold uppercase tracking-wide text-slate-400">
                    입력 정보
                  </h2>
                  <div className="space-y-5">
                    <NumberField
                      label="연봉"
                      value={연봉만원}
                      onChange={set연봉만원}
                      suffix="만원"
                      step={100}
                      hint={"= " + won(연봉만원 * 10000)}
                    />
                    <NumberField
                      label="부양가족 수 (본인 포함)"
                      value={부양가족}
                      onChange={set부양가족}
                      suffix="명"
                      hint="본인 1명 + 공제 대상 가족"
                    />
                    <NumberField
                      label="월 비과세액"
                      value={비과세월}
                      onChange={set비과세월}
                      suffix="원"
                      step={10000}
                      hint="식대 등 (기본 20만원)"
                    />
                  </div>
                </div>
              </section>

              {/* 결과 영역 */}
              <section className="md:col-span-3 animate-fade-in-up" style={{ animationDelay: "0.1s" }}>
                {/* 핵심 결과 카드 */}
                <div className="rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 p-6 text-white shadow-lg">
                  <p className="text-sm font-medium text-indigo-100">월 예상 실수령액</p>
                  <p className="mt-1 text-4xl font-extrabold tracking-tight num-tabular sm:text-5xl">
                    {won(result.실수령월)}
                  </p>
                  <div className="mt-4 flex items-center justify-between border-t border-white/20 pt-4 text-sm">
                    <span className="text-indigo-100">연 실수령액</span>
                    <span className="font-semibold num-tabular">{won(result.실수령연)}</span>
                  </div>

                  {/* 공제 비율 바 */}
                  <div className="mt-4">
                    <div className="mb-1.5 flex justify-between text-xs text-indigo-100">
                      <span>실수령 {(100 - 공제율).toFixed(1)}%</span>
                      <span>공제 {공제율.toFixed(1)}%</span>
                    </div>
                    <div className="flex h-2.5 overflow-hidden rounded-full bg-white/25">
                      <div
                        className="animate-grow-bar bg-white"
                        style={{ width: (100 - 공제율) + "%" }}
                      />
                    </div>
                  </div>
                </div>

                {/* 공제 내역 */}
                <div className="mt-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                  <Row label="월 급여 (세전)" value={won(result.월급)} color="text-slate-800" />
                  <div className="py-1.5 text-xs font-bold uppercase tracking-wide text-slate-400">
                    공제 항목
                  </div>
                  {breakdown.map((b) => (
                    <Row key={b.label} label={b.label} value={"- " + won(b.value)} color="text-slate-600" sub />
                  ))}
                  <Row label="공제 합계" value={"- " + won(result.총공제)} color="text-rose-500" />
                  <div className="mt-3 flex items-center justify-between rounded-xl bg-indigo-50 px-4 py-3">
                    <span className="text-sm font-bold text-indigo-900">월 실수령액</span>
                    <span className="num-tabular text-xl font-extrabold text-indigo-700">
                      {won(result.실수령월)}
                    </span>
                  </div>
                </div>
              </section>
            </div>

            {/* 안내 문구 */}
            <p className="mt-8 text-center text-xs leading-relaxed text-slate-400">
              ※ 본 계산기는 2024년 4대보험 요율과 연말정산 방식을 적용한 <b>참고용 근사치</b>입니다.<br />
              실제 간이세액표 원천징수액 및 회사 정책에 따라 실수령액은 달라질 수 있습니다.
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
