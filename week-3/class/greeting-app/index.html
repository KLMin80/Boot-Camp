<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인사 받기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useCallback } = React;

    // ========================================
    // API 설정
    // ========================================
    const API_URL = "http://localhost:3000/api/greeting";

    // ISO 시간 문자열을 한국어 형식으로 포맷
    function formatKoreanTime(isoString) {
      try {
        const d = new Date(isoString);
        if (isNaN(d.getTime())) return isoString;
        return d.toLocaleString("ko-KR", {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
        });
      } catch (e) {
        return isoString;
      }
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ children, onClick, disabled, className = "" }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl
            font-semibold text-white shadow-lg transition-all duration-200
            bg-gradient-to-r from-indigo-500 to-purple-600
            hover:from-indigo-600 hover:to-purple-700 hover:shadow-xl hover:-translate-y-0.5
            active:translate-y-0 active:shadow-md
            focus:outline-none focus:ring-4 focus:ring-purple-300
            disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0
            disabled:hover:shadow-lg ${className}`}
        >
          {children}
        </button>
      );
    }

    function Spinner() {
      return (
        <span
          className="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin-slow"
          aria-hidden="true"
        />
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div
          className={`bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-8 sm:p-10 ${className}`}
        >
          {children}
        </div>
      );
    }

    // ========================================
    // 📄 Greeting Page (메인 로직)
    // ========================================
    function GreetingApp() {
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null); // { greeting, time }
      const [error, setError] = useState(null);

      const fetchGreeting = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(API_URL, { method: "GET" });
          if (!res.ok) {
            throw new Error(`서버 응답 오류 (${res.status})`);
          }
          const data = await res.json();
          setResult(data);
        } catch (e) {
          setResult(null);
          setError(
            "인사를 불러오지 못했어요. 서버가 실행 중인지 확인해 주세요.\n" +
              "(my api 폴더에서 node server.js 로 http://localhost:3000 서버를 켜 주세요.)"
          );
        } finally {
          setLoading(false);
        }
      }, []);

      return (
        <div className="min-h-screen w-full flex items-center justify-center px-4 py-10
          bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100">
          <Card className="w-full max-w-md text-center">
            {/* 헤더 */}
            <div className="text-5xl mb-3" aria-hidden="true">👋</div>
            <h1 className="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
              인사 받기
            </h1>
            <p className="text-sm text-gray-500 mb-8">
              버튼을 누르면 서버가 따뜻한 인사를 건네줘요.
            </p>

            {/* 버튼 */}
            <Button
              onClick={fetchGreeting}
              disabled={loading}
              className="w-full"
            >
              {loading ? (
                <>
                  <Spinner />
                  불러오는 중...
                </>
              ) : (
                "인사 받기"
              )}
            </Button>

            {/* 결과 영역 */}
            <div className="mt-8" aria-live="polite">
              {result && !error && (
                <div className="animate-fade-in-up rounded-2xl bg-gradient-to-br
                  from-indigo-50 to-purple-50 border border-purple-100 p-6">
                  <p className="text-xl sm:text-2xl font-bold text-gray-800 leading-relaxed">
                    {result.greeting}
                  </p>
                  {result.time && (
                    <p className="mt-4 text-sm text-gray-500">
                      🕒 {formatKoreanTime(result.time)}
                    </p>
                  )}
                </div>
              )}

              {error && (
                <div className="animate-fade-in-up rounded-2xl bg-red-50 border border-red-200 p-5 text-left">
                  <p className="font-semibold text-red-700 mb-1">😢 문제가 발생했어요</p>
                  <p className="text-sm text-red-600 whitespace-pre-line leading-relaxed">
                    {error}
                  </p>
                </div>
              )}

              {!result && !error && !loading && (
                <p className="text-gray-400 text-sm">
                  아직 인사를 받지 않았어요.
                </p>
              )}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 🚀 App & Rendering
    // ========================================
    function App() {
      return <GreetingApp />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
