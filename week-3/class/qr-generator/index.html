<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- QR code library (davidshimjs/qrcodejs) — exposes a global `QRCode` constructor.
       Renders a <canvas> (+ <img>) into a container element, so PNG download works via canvas.toDataURL().
       Loaded BEFORE React so window.QRCode is ready when components run. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* Subtle entrance animation for the QR result (Tailwind has no built-in fade-in-up) */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.35s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // 🛠️ Utilities
    // ========================================

    // Prepend https:// when the user omitted a protocol.
    // Leaves http:// / https:// untouched.
    function normalizeUrl(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return '';
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return 'https://' + trimmed;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children, type = 'button', ...rest }) {
      const base = 'inline-flex items-center justify-center gap-2 font-semibold rounded-xl transition-all duration-150 focus:outline-none focus:ring-4 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-200 shadow-md shadow-indigo-200',
        secondary: 'bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 focus:ring-indigo-100',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100 focus:ring-slate-100',
        danger: 'bg-rose-500 text-white hover:bg-rose-600 focus:ring-rose-200 shadow-md shadow-rose-200',
      };
      const sizes = {
        sm: 'text-sm px-3 py-1.5',
        md: 'text-sm px-4 py-2.5',
        lg: 'text-base px-5 py-3',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, onKeyDown, placeholder, error, type = 'text', id }) {
      return (
        <div className="w-full">
          {label && (
            <label htmlFor={id} className="block text-sm font-medium text-slate-700 mb-1.5">
              {label}
            </label>
          )}
          <input
            id={id}
            type={type}
            value={value}
            onChange={onChange}
            onKeyDown={onKeyDown}
            placeholder={placeholder}
            aria-invalid={!!error}
            className={`w-full px-4 py-3 rounded-xl border bg-white text-slate-800 placeholder-slate-400 transition-all duration-150 focus:outline-none focus:ring-4 ${
              error
                ? 'border-rose-300 focus:border-rose-400 focus:ring-rose-100'
                : 'border-slate-200 focus:border-indigo-400 focus:ring-indigo-100'
            }`}
          />
          {error && (
            <p className="mt-1.5 text-sm text-rose-500 flex items-center gap-1" role="alert">
              <span aria-hidden="true">⚠️</span>{error}
            </p>
          )}
        </div>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-3xl shadow-xl shadow-indigo-100/60 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧩 QR Code Component (renders URL to a <canvas>)
    // ========================================

    function QrCanvas({ value, onReady }) {
      const containerRef = useRef(null);

      useEffect(() => {
        const el = containerRef.current;
        if (!value || !el) return;

        // window.QRCode comes from the qrcodejs library loaded in <head>.
        if (!window.QRCode) {
          onReady && onReady(false);
          return;
        }

        // qrcodejs draws into the element — clear any previous QR first.
        el.innerHTML = '';
        try {
          new window.QRCode(el, {
            text: value,
            width: 256,
            height: 256,
            colorDark: '#1e1b4b',
            colorLight: '#ffffff',
            correctLevel: window.QRCode.CorrectLevel.M,
          });
          onReady && onReady(true);
        } catch (e) {
          onReady && onReady(false);
        }

        return () => { el.innerHTML = ''; };
      }, [value, onReady]);

      // qrcodejs appends a <canvas> (for PNG export) and a visible <img> here.
      return <div ref={containerRef} className="leading-none" aria-label="생성된 QR 코드" />;
    }

    // ========================================
    // 📄 Main Page Component
    // ========================================

    function QrGeneratorPage() {
      const [url, setUrl] = useState('');
      const [qrValue, setQrValue] = useState(''); // normalized URL actually encoded
      const [error, setError] = useState('');
      const [toast, setToast] = useState('');
      const canvasWrapRef = useRef(null);

      // Live preview: regenerate as the user types (debounced lightly).
      useEffect(() => {
        const handle = setTimeout(() => {
          const trimmed = url.trim();
          if (!trimmed) {
            setQrValue('');
            return;
          }
          setQrValue(normalizeUrl(trimmed));
        }, 250);
        return () => clearTimeout(handle);
      }, [url]);

      // Auto-dismiss toast
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(''), 1800);
        return () => clearTimeout(t);
      }, [toast]);

      const handleGenerate = useCallback(() => {
        const trimmed = url.trim();
        if (!trimmed) {
          setError('URL을 입력해 주세요. 예: https://example.com');
          setQrValue('');
          return;
        }
        setError('');
        setQrValue(normalizeUrl(trimmed));
      }, [url]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter') handleGenerate();
      }, [handleGenerate]);

      const handleChange = useCallback((e) => {
        setUrl(e.target.value);
        if (error) setError('');
      }, [error]);

      const handleDownload = useCallback(() => {
        const wrap = canvasWrapRef.current;
        const canvas = wrap && wrap.querySelector('canvas');
        const img = wrap && wrap.querySelector('img');
        // Prefer the canvas (lossless PNG); fall back to the rendered <img> data URI.
        const dataUrl = canvas ? canvas.toDataURL('image/png') : (img && img.src) || '';
        if (!dataUrl) {
          setToast('먼저 QR 코드를 생성해 주세요');
          return;
        }
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = 'qrcode.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setToast('PNG 이미지를 저장했어요 📥');
      }, []);

      const handleCopy = useCallback(async () => {
        if (!qrValue) {
          setToast('복사할 URL이 없어요');
          return;
        }
        try {
          await navigator.clipboard.writeText(qrValue);
          setToast('URL을 복사했어요 📋');
        } catch (e) {
          // clipboard API can be blocked on file:// — fall back to legacy method
          const ta = document.createElement('textarea');
          ta.value = qrValue;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); setToast('URL을 복사했어요 📋'); }
          catch (_) { setToast('복사에 실패했어요'); }
          document.body.removeChild(ta);
        }
      }, [qrValue]);

      const handleReset = useCallback(() => {
        setUrl('');
        setQrValue('');
        setError('');
      }, []);

      const showNormalizedHint = qrValue && qrValue !== url.trim();

      return (
        <div className="min-h-screen w-full flex items-center justify-center p-4 bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100">
          <div className="w-full max-w-md">
            {/* Header */}
            <header className="text-center mb-6">
              <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 text-white text-2xl shadow-lg shadow-indigo-200 mb-3" aria-hidden="true">
                🔳
              </div>
              <h1 className="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight">
                QR 코드 생성기
              </h1>
              <p className="text-slate-500 mt-1.5 text-sm">
                웹사이트 주소를 입력하면 QR 코드를 만들어 드려요
              </p>
            </header>

            {/* Main Card */}
            <Card className="p-6 sm:p-7">
              {/* Input */}
              <Input
                id="url-input"
                label="웹사이트 URL"
                value={url}
                onChange={handleChange}
                onKeyDown={handleKeyDown}
                placeholder="https://example.com"
                error={error}
              />

              {showNormalizedHint && (
                <p className="mt-2 text-xs text-slate-500 break-all">
                  변환된 주소: <span className="font-medium text-indigo-600">{qrValue}</span>
                </p>
              )}

              {/* Generate button */}
              <div className="mt-4">
                <Button size="lg" className="w-full" onClick={handleGenerate}>
                  <span aria-hidden="true">✨</span> QR 코드 생성
                </Button>
              </div>

              {/* QR result area */}
              <div className="mt-6">
                {qrValue ? (
                  <div className="animate-fade-in-up flex flex-col items-center">
                    <div
                      ref={canvasWrapRef}
                      className="bg-white p-4 rounded-2xl border border-slate-100 shadow-inner"
                    >
                      <QrCanvas value={qrValue} />
                    </div>

                    {/* Action buttons */}
                    <div className="grid grid-cols-2 gap-3 w-full mt-5">
                      <Button variant="primary" onClick={handleDownload}>
                        <span aria-hidden="true">📥</span> 다운로드
                      </Button>
                      <Button variant="secondary" onClick={handleCopy}>
                        <span aria-hidden="true">📋</span> URL 복사
                      </Button>
                    </div>
                    <button
                      onClick={handleReset}
                      className="mt-3 text-sm text-slate-400 hover:text-slate-600 transition-colors"
                    >
                      초기화
                    </button>
                  </div>
                ) : (
                  // Empty state
                  <div className="flex flex-col items-center justify-center py-10 px-4 rounded-2xl border-2 border-dashed border-slate-200 bg-slate-50/60">
                    <div className="text-4xl mb-2 opacity-40" aria-hidden="true">📷</div>
                    <p className="text-slate-400 text-sm text-center">
                      URL을 입력하면 이곳에<br />QR 코드가 나타나요
                    </p>
                  </div>
                )}
              </div>
            </Card>

            <p className="text-center text-xs text-slate-400 mt-5">
              입력한 주소는 브라우저 안에서만 처리되며 서버로 전송되지 않아요.
            </p>
          </div>

          {/* Toast */}
          {toast && (
            <div
              className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-4 py-2.5 rounded-full shadow-lg animate-fade-in-up z-50"
              role="status"
            >
              {toast}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return <QrGeneratorPage />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
