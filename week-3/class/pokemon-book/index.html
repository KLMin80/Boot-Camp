<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포켓몬 도감</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* Tailwind 유틸리티로 처리 불가한 부분만 커스텀 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }

    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0.92) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-pop-in { animation: pop-in 0.22s ease-out; }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }

    /* 스탯 바 채워지는 애니메이션 */
    @keyframes grow-bar {
      from { width: 0; }
    }
    .animate-grow-bar { animation: grow-bar 0.7s cubic-bezier(0.22, 1, 0.36, 1); }

    /* 모바일 스크롤 잠금 시 레이아웃 시프트 방지용 부드러운 스크롤바 */
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    // ========================================
    // 🎨 타입 테마 (정적 클래스 매핑)
    //   Tailwind CDN(JIT)은 런타임 조립 클래스를 인식하지 못하므로
    //   각 타입별 완전한 클래스 문자열을 미리 정의해 키로 조회한다.
    // ========================================
    const TYPE_THEME = {
      "물": {
        label: "물",
        emoji: "💧",
        badge: "bg-blue-500 text-white",
        ring: "ring-blue-300",
        headerGradient: "from-blue-400 to-blue-600",
        cardGlow: "shadow-blue-200",
        bar: "bg-blue-500",
        softBg: "bg-blue-50",
        text: "text-blue-600",
        accentBorder: "border-blue-200",
      },
      "전기": {
        label: "전기",
        emoji: "⚡",
        badge: "bg-yellow-400 text-yellow-900",
        ring: "ring-yellow-300",
        headerGradient: "from-yellow-300 to-amber-500",
        cardGlow: "shadow-yellow-200",
        bar: "bg-yellow-400",
        softBg: "bg-yellow-50",
        text: "text-amber-600",
        accentBorder: "border-yellow-200",
      },
      "불꽃": {
        label: "불꽃",
        emoji: "🔥",
        badge: "bg-orange-500 text-white",
        ring: "ring-orange-300",
        headerGradient: "from-orange-400 to-red-500",
        cardGlow: "shadow-orange-200",
        bar: "bg-orange-500",
        softBg: "bg-orange-50",
        text: "text-orange-600",
        accentBorder: "border-orange-200",
      },
      "풀": {
        label: "풀",
        emoji: "🌱",
        badge: "bg-green-500 text-white",
        ring: "ring-green-300",
        headerGradient: "from-green-400 to-emerald-600",
        cardGlow: "shadow-green-200",
        bar: "bg-green-500",
        softBg: "bg-green-50",
        text: "text-green-600",
        accentBorder: "border-green-200",
      },
      "독": {
        label: "독",
        emoji: "☠️",
        badge: "bg-purple-500 text-white",
        ring: "ring-purple-300",
        headerGradient: "from-purple-400 to-fuchsia-600",
        cardGlow: "shadow-purple-200",
        bar: "bg-purple-500",
        softBg: "bg-purple-50",
        text: "text-purple-600",
        accentBorder: "border-purple-200",
      },
      "노멀": {
        label: "노멀", emoji: "⭐", badge: "bg-stone-400 text-white", ring: "ring-stone-300",
        headerGradient: "from-stone-300 to-stone-500", cardGlow: "shadow-stone-200", bar: "bg-stone-400", softBg: "bg-stone-50", text: "text-stone-600", accentBorder: "border-stone-200",
      },
      "얼음": {
        label: "얼음", emoji: "❄️", badge: "bg-cyan-400 text-cyan-900", ring: "ring-cyan-300",
        headerGradient: "from-cyan-300 to-sky-500", cardGlow: "shadow-cyan-200", bar: "bg-cyan-400", softBg: "bg-cyan-50", text: "text-cyan-600", accentBorder: "border-cyan-200",
      },
      "격투": {
        label: "격투", emoji: "🥊", badge: "bg-red-700 text-white", ring: "ring-red-300",
        headerGradient: "from-red-500 to-rose-700", cardGlow: "shadow-red-200", bar: "bg-red-700", softBg: "bg-red-50", text: "text-red-700", accentBorder: "border-red-200",
      },
      "땅": {
        label: "땅", emoji: "⛰️", badge: "bg-amber-600 text-white", ring: "ring-amber-300",
        headerGradient: "from-amber-500 to-yellow-700", cardGlow: "shadow-amber-200", bar: "bg-amber-600", softBg: "bg-amber-50", text: "text-amber-700", accentBorder: "border-amber-200",
      },
      "비행": {
        label: "비행", emoji: "🕊️", badge: "bg-sky-400 text-white", ring: "ring-sky-300",
        headerGradient: "from-sky-300 to-indigo-400", cardGlow: "shadow-sky-200", bar: "bg-sky-400", softBg: "bg-sky-50", text: "text-sky-600", accentBorder: "border-sky-200",
      },
      "에스퍼": {
        label: "에스퍼", emoji: "🔮", badge: "bg-pink-500 text-white", ring: "ring-pink-300",
        headerGradient: "from-pink-400 to-rose-500", cardGlow: "shadow-pink-200", bar: "bg-pink-500", softBg: "bg-pink-50", text: "text-pink-600", accentBorder: "border-pink-200",
      },
      "벌레": {
        label: "벌레", emoji: "🐛", badge: "bg-lime-500 text-white", ring: "ring-lime-300",
        headerGradient: "from-lime-400 to-green-600", cardGlow: "shadow-lime-200", bar: "bg-lime-500", softBg: "bg-lime-50", text: "text-lime-600", accentBorder: "border-lime-200",
      },
      "바위": {
        label: "바위", emoji: "🪨", badge: "bg-stone-500 text-white", ring: "ring-stone-400",
        headerGradient: "from-stone-400 to-stone-600", cardGlow: "shadow-stone-300", bar: "bg-stone-500", softBg: "bg-stone-100", text: "text-stone-700", accentBorder: "border-stone-300",
      },
      "고스트": {
        label: "고스트", emoji: "👻", badge: "bg-violet-700 text-white", ring: "ring-violet-300",
        headerGradient: "from-violet-600 to-indigo-800", cardGlow: "shadow-violet-200", bar: "bg-violet-700", softBg: "bg-violet-50", text: "text-violet-700", accentBorder: "border-violet-200",
      },
      "드래곤": {
        label: "드래곤", emoji: "🐉", badge: "bg-indigo-600 text-white", ring: "ring-indigo-300",
        headerGradient: "from-indigo-500 to-violet-700", cardGlow: "shadow-indigo-200", bar: "bg-indigo-600", softBg: "bg-indigo-50", text: "text-indigo-600", accentBorder: "border-indigo-200",
      },
      "악": {
        label: "악", emoji: "🌑", badge: "bg-neutral-700 text-white", ring: "ring-neutral-400",
        headerGradient: "from-neutral-600 to-neutral-800", cardGlow: "shadow-neutral-300", bar: "bg-neutral-700", softBg: "bg-neutral-100", text: "text-neutral-700", accentBorder: "border-neutral-300",
      },
      "강철": {
        label: "강철", emoji: "⚙️", badge: "bg-slate-500 text-white", ring: "ring-slate-300",
        headerGradient: "from-slate-400 to-slate-600", cardGlow: "shadow-slate-200", bar: "bg-slate-500", softBg: "bg-slate-100", text: "text-slate-600", accentBorder: "border-slate-300",
      },
      "페어리": {
        label: "페어리", emoji: "🧚", badge: "bg-pink-400 text-white", ring: "ring-pink-200",
        headerGradient: "from-pink-300 to-fuchsia-400", cardGlow: "shadow-pink-200", bar: "bg-pink-400", softBg: "bg-pink-50", text: "text-pink-500", accentBorder: "border-pink-200",
      },
    };

    // 첫 번째(주) 타입 기준 테마 반환 — 없으면 회색 기본값
    const FALLBACK_THEME = {
      label: "노멀",
      emoji: "❔",
      badge: "bg-slate-400 text-white",
      ring: "ring-slate-300",
      headerGradient: "from-slate-400 to-slate-600",
      cardGlow: "shadow-slate-200",
      bar: "bg-slate-400",
      softBg: "bg-slate-50",
      text: "text-slate-600",
      accentBorder: "border-slate-200",
    };

    const themeForType = (type) => TYPE_THEME[type] || FALLBACK_THEME;
    const primaryTheme = (p) => themeForType(p.types[0]);

    // ========================================
    // 🌐 타입 영문 → 한글 매핑 (PokeAPI는 영문 타입명을 반환)
    //   18개 전 타입을 변환해 어떤 포켓몬이 와도 한글 타입명이 표시된다.
    // ========================================
    const TYPE_KO = {
      normal: "노멀", fire: "불꽃", water: "물", electric: "전기",
      grass: "풀", ice: "얼음", fighting: "격투", poison: "독",
      ground: "땅", flying: "비행", psychic: "에스퍼", bug: "벌레",
      rock: "바위", ghost: "고스트", dragon: "드래곤", dark: "악",
      steel: "강철", fairy: "페어리",
    };
    const typeToKo = (en) => TYPE_KO[en] || en;

    // ========================================
    // 📚 데이터 소스 — 전부 PokeAPI에서 실시간으로 불러옴
    //   · 검색 인덱스(전 포켓몬 한글/영문 이름·타입·번호): GraphQL 1회
    //   · 카드 상세(능력치/스프라이트/설명): 화면에 보이는 것만 REST로 지연 로딩
    // ========================================
    const POKEAPI = "https://pokeapi.co/api/v2";
    const POKEAPI_GQL = "https://beta.pokeapi.co/graphql/v1beta";
    const PAGE = 24; // 한 번에 표시 / 추가로 불러올 카드 수

    // 포켓몬 상세(pokemon) + 종(species) 정보를 동시에 받아 화면용 객체로 가공
    async function fetchPokemon(id) {
      const [pRes, sRes] = await Promise.all([
        fetch(`${POKEAPI}/pokemon/${id}`),
        fetch(`${POKEAPI}/pokemon-species/${id}`),
      ]);
      if (!pRes.ok || !sRes.ok) {
        throw new Error(
          `#${id} 정보를 불러오지 못했습니다 (HTTP ${pRes.status}/${sRes.status})`
        );
      }
      const p = await pRes.json();
      const s = await sRes.json();

      // 한글 이름 (없으면 영문명으로 대체)
      const koName =
        (s.names.find((n) => n.language.name === "ko") || {}).name || p.name;

      // 한글 도감 설명 (제어문자 \n\f 등 정리)
      const koFlavor = s.flavor_text_entries.find(
        (e) => e.language.name === "ko"
      );
      const desc = koFlavor
        ? koFlavor.flavor_text.replace(/\s+/g, " ").trim()
        : "도감 설명이 제공되지 않는 포켓몬입니다.";

      // 능력치 (이름 기준 매핑 — 응답 순서와 무관)
      const base = {};
      p.stats.forEach((st) => {
        base[st.stat.name] = st.base_stat;
      });

      // 타입 (슬롯 순서대로, 영문/한글 동시 보관)
      const typesEn = p.types
        .slice()
        .sort((a, b) => a.slot - b.slot)
        .map((t) => t.type.name);

      // 스프라이트 (API가 내려주는 실제 URL을 그대로 사용)
      const sp = p.sprites || {};
      const gen5 =
        sp.versions &&
        sp.versions["generation-v"] &&
        sp.versions["generation-v"]["black-white"].animated;
      const sprites = {
        animated: (gen5 && gen5.front_default) || null,
        artwork:
          (sp.other &&
            sp.other["official-artwork"] &&
            sp.other["official-artwork"].front_default) ||
          null,
        still: sp.front_default || null,
      };

      return {
        id: p.id,
        dex: p.id,
        name: koName,
        eng: p.name.charAt(0).toUpperCase() + p.name.slice(1),
        types: typesEn.map(typeToKo), // 화면/테마용 (한글)
        typesEn, // 검색용 (영문)
        desc,
        stats: {
          hp: base.hp,
          attack: base.attack,
          defense: base.defense,
          speed: base.speed,
        },
        sprites,
      };
    }

    // 검색용 인덱스: 전 포켓몬(약 1025종)의 번호·한글/영문 이름·타입을 GraphQL로 한 번에 가져온다.
    async function fetchIndex() {
      const gqlQuery = `query AllDex {
        pokemon_v2_pokemonspecies(order_by: {id: asc}) {
          id
          name
          pokemon_v2_pokemonspeciesnames(where: {pokemon_v2_language: {name: {_eq: "ko"}}}) { name }
          pokemon_v2_pokemons(where: {is_default: {_eq: true}}, limit: 1) {
            pokemon_v2_pokemontypes(order_by: {slot: asc}) { pokemon_v2_type { name } }
          }
        }
      }`;
      try {
        const res = await fetch(POKEAPI_GQL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: gqlQuery }),
        });
        if (!res.ok) throw new Error("graphql http " + res.status);
        const json = await res.json();
        if (json.errors || !json.data) throw new Error("graphql payload");
        return json.data.pokemon_v2_pokemonspecies.map((sp) => {
          const koEntry = sp.pokemon_v2_pokemonspeciesnames[0];
          const en = sp.name.charAt(0).toUpperCase() + sp.name.slice(1);
          const dflt = sp.pokemon_v2_pokemons[0];
          const typesEn = dflt
            ? dflt.pokemon_v2_pokemontypes.map((t) => t.pokemon_v2_type.name)
            : [];
          return {
            dex: sp.id,
            ko: (koEntry && koEntry.name) || en,
            en,
            typesEn,
            typesKo: typesEn.map(typeToKo),
          };
        });
      } catch (e) {
        // 폴백: REST 종 목록 (영문명·번호만 — 한글/타입 검색은 제한됨)
        const res = await fetch(`${POKEAPI}/pokemon-species?limit=100000`);
        if (!res.ok) {
          throw new Error("도감 목록을 불러오지 못했습니다. 네트워크를 확인해 주세요.");
        }
        const json = await res.json();
        return json.results
          .map((r) => {
            const dex = Number(r.url.split("/").filter(Boolean).pop());
            const en = r.name.charAt(0).toUpperCase() + r.name.slice(1);
            return { dex, ko: en, en, typesEn: [], typesKo: [] };
          })
          .sort((a, b) => a.dex - b.dex);
      }
    }

    // 스탯 메타 (라벨/최대치) — 바 비율 계산에 사용
    const STAT_META = [
      { key: "hp", label: "HP" },
      { key: "attack", label: "공격" },
      { key: "defense", label: "방어" },
      { key: "speed", label: "속도" },
    ];
    const STAT_MAX = 160; // 시각화 기준 최대치 (전 포켓몬 대응)

    // ========================================
    // 🎨 디자인 시스템 컴포넌트
    // ========================================

    // 포켓몬 스프라이트 이미지 (소스 순차 폴백 → 최종 대표 타입 이모지)
    function PokemonSprite({ pokemon, className, emojiClassName }) {
      // 움직이는 도트(GIF) → 공식 일러스트(PNG) → 기본 도트 순으로 시도
      const sources = useMemo(
        () =>
          [
            { url: pokemon.sprites.animated, pixel: true },
            { url: pokemon.sprites.artwork, pixel: false },
            { url: pokemon.sprites.still, pixel: true },
          ].filter((s) => s.url),
        [pokemon]
      );
      const [idx, setIdx] = useState(0);

      // 선택된 포켓몬이 바뀌면 소스 인덱스 초기화
      useEffect(() => {
        setIdx(0);
      }, [pokemon.id]);

      // 모든 이미지 소스 실패(또는 없음) → 대표 타입 이모지로 대체
      if (idx >= sources.length) {
        return (
          <span className={emojiClassName} aria-hidden="true">
            {primaryTheme(pokemon).emoji}
          </span>
        );
      }

      const current = sources[idx];
      return (
        <img
          src={current.url}
          alt={`${pokemon.name} (${pokemon.eng})`}
          onError={() => setIdx((i) => i + 1)}
          draggable={false}
          loading="lazy"
          className={className}
          style={{ imageRendering: current.pixel ? "pixelated" : "auto" }}
        />
      );
    }

    // 타입 배지
    function TypeBadge({ type, size = "md" }) {
      const theme = themeForType(type);
      const sizeCls = size === "sm" ? "text-xs px-2 py-0.5" : "text-xs sm:text-sm px-2.5 py-1";
      return (
        <span
          className={`inline-flex items-center gap-1 rounded-full font-bold tracking-tight shadow-sm ${theme.badge} ${sizeCls}`}
        >
          <span aria-hidden="true">{theme.emoji}</span>
          {type}
        </span>
      );
    }

    // 스탯 바
    function StatBar({ label, value, barColor }) {
      const pct = Math.min(100, Math.round((value / STAT_MAX) * 100));
      return (
        <div className="flex items-center gap-3">
          <span className="w-10 shrink-0 text-sm font-bold text-slate-600">{label}</span>
          <span className="w-8 shrink-0 text-right text-sm font-mono font-semibold text-slate-800">
            {value}
          </span>
          <div className="h-3 flex-1 overflow-hidden rounded-full bg-slate-200">
            <div
              className={`h-full rounded-full animate-grow-bar ${barColor}`}
              style={{ width: pct + "%" }}
              role="progressbar"
              aria-valuenow={value}
              aria-valuemin={0}
              aria-valuemax={STAT_MAX}
              aria-label={label}
            />
          </div>
        </div>
      );
    }

    // 모달 (상세 보기)
    function Modal({ isOpen, onClose, children, labelledBy }) {
      // ESC 닫기 + 배경 스크롤 잠금
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => {
          if (e.key === "Escape") onClose();
        };
        document.addEventListener("keydown", onKey);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = prevOverflow;
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div
          className="fixed inset-0 z-50 flex items-end justify-center bg-black/50 p-0 backdrop-blur-sm animate-fade-in sm:items-center sm:p-4"
          onMouseDown={onClose}
        >
          <div
            role="dialog"
            aria-modal="true"
            aria-labelledby={labelledBy}
            className="relative max-h-[92vh] w-full max-w-lg overflow-y-auto rounded-t-3xl bg-white shadow-2xl animate-pop-in sm:rounded-3xl"
            onMouseDown={(e) => e.stopPropagation()}
          >
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 레이아웃 / 공통 컴포넌트
    // ========================================

    // 헤더
    function Header({ total, shown, loading, hasQuery }) {
      return (
        <header className="relative overflow-hidden bg-gradient-to-br from-red-500 via-rose-500 to-red-600 text-white shadow-lg">
          {/* 장식용 포켓볼 모티프 */}
          <div className="pointer-events-none absolute -right-10 -top-16 h-56 w-56 rounded-full border-[14px] border-white/15" aria-hidden="true" />
          <div className="pointer-events-none absolute -bottom-24 -left-12 h-64 w-64 rounded-full border-[14px] border-white/10" aria-hidden="true" />
          <div className="relative mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10">
            <div className="flex items-center gap-3">
              <div className="flex h-11 w-11 items-center justify-center rounded-full bg-white shadow-inner animate-float">
                <div className="h-5 w-5 rounded-full border-2 border-slate-800 bg-red-500" />
              </div>
              <h1 className="text-3xl font-black tracking-tight drop-shadow-sm sm:text-4xl">
                포켓몬 도감
              </h1>
            </div>
            <p className="mt-2 text-sm font-medium text-white/90 sm:text-base">
              한글 이름 · 영문명 · 타입 · 도감번호로 전체 포켓몬을 검색하고, 카드를 눌러 상세 정보를 확인하세요.
            </p>
            <p className="mt-1 text-xs font-semibold text-white/80">
              {loading
                ? "PokeAPI에서 전국도감을 불러오는 중…"
                : hasQuery
                ? `검색 결과 ${shown}마리 · 전체 ${total}종`
                : `전국도감 ${total}종 수록 · 이름이나 번호로 검색하세요`}
            </p>
          </div>
        </header>
      );
    }

    // 검색창
    function SearchBar({ value, onChange }) {
      const inputRef = useRef(null);
      return (
        <div className="relative">
          <span className="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-lg text-slate-400" aria-hidden="true">
            🔍
          </span>
          <input
            ref={inputRef}
            type="search"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder="포켓몬 검색 (예: 피카츄, Pikachu, 전기, 025)"
            aria-label="포켓몬 검색"
            className="w-full rounded-2xl border border-slate-200 bg-white py-3.5 pl-12 pr-11 text-base text-slate-800 shadow-sm outline-none transition focus:border-red-400 focus:ring-4 focus:ring-red-100"
          />
          {value && (
            <button
              type="button"
              onClick={() => {
                onChange("");
                inputRef.current && inputRef.current.focus();
              }}
              aria-label="검색어 지우기"
              className="absolute right-3 top-1/2 flex h-7 w-7 -translate-y-1/2 items-center justify-center rounded-full bg-slate-100 text-slate-500 transition hover:bg-slate-200 hover:text-slate-700"
            >
              ✕
            </button>
          )}
        </div>
      );
    }

    // 포켓몬 카드
    function PokemonCard({ pokemon, onSelect }) {
      const theme = primaryTheme(pokemon);
      return (
        <button
          type="button"
          onClick={() => onSelect(pokemon)}
          aria-label={`${pokemon.name} 상세 보기`}
          className={`group relative flex w-full flex-col overflow-hidden rounded-3xl border border-white bg-white p-0 text-left shadow-md transition-all duration-200 hover:-translate-y-1.5 hover:shadow-xl focus:outline-none focus-visible:ring-4 ${theme.ring}`}
        >
          {/* 상단 컬러 헤더 + 이모지 */}
          <div className={`relative flex h-32 items-center justify-center bg-gradient-to-br ${theme.headerGradient}`}>
            <div className="pointer-events-none absolute right-2 top-2 rounded-full bg-white/25 px-2 py-0.5 text-xs font-mono font-bold text-white">
              No.{String(pokemon.dex).padStart(3, "0")}
            </div>
            <div className="pointer-events-none absolute -bottom-8 -left-6 h-24 w-24 rounded-full bg-white/10" aria-hidden="true" />
            <div className="flex h-24 w-24 items-center justify-center rounded-full bg-white/20 shadow-inner ring-1 ring-white/30">
              <PokemonSprite
                pokemon={pokemon}
                className="h-20 w-20 object-contain drop-shadow transition-transform duration-300 group-hover:scale-110 group-hover:animate-float"
                emojiClassName="text-5xl drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:animate-float"
              />
            </div>
          </div>

          {/* 본문 */}
          <div className="flex flex-1 flex-col p-4">
            <div className="flex items-baseline justify-between gap-2">
              <h3 className="text-lg font-extrabold text-slate-800">{pokemon.name}</h3>
              <span className="text-sm font-semibold text-slate-400">{pokemon.eng}</span>
            </div>

            <div className="mt-2 flex flex-wrap gap-1.5">
              {pokemon.types.map((t) => (
                <TypeBadge key={t} type={t} size="sm" />
              ))}
            </div>

            <p className="mt-3 line-clamp-2 text-sm leading-relaxed text-slate-500">
              {pokemon.desc}
            </p>

            <span className={`mt-3 inline-flex items-center gap-1 text-sm font-bold ${theme.text}`}>
              상세 보기
              <span className="transition-transform duration-200 group-hover:translate-x-1">→</span>
            </span>
          </div>
        </button>
      );
    }

    // 상세 패널 내용
    function PokemonDetail({ pokemon, onClose }) {
      const theme = primaryTheme(pokemon);
      const titleId = `poke-title-${pokemon.id}`;
      return (
        <div>
          {/* 헤더 영역 */}
          <div className={`relative bg-gradient-to-br ${theme.headerGradient} px-6 pb-8 pt-6 text-white`}>
            <button
              type="button"
              onClick={onClose}
              aria-label="닫기"
              className="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-white/25 text-lg font-bold backdrop-blur transition hover:bg-white/40"
            >
              ✕
            </button>
            <div className="pointer-events-none absolute -right-8 -top-10 h-40 w-40 rounded-full border-[12px] border-white/15" aria-hidden="true" />

            <span className="font-mono text-sm font-bold text-white/90">
              No.{String(pokemon.dex).padStart(3, "0")}
            </span>

            <div className="mt-2 flex items-center gap-4">
              <div className="flex h-28 w-28 shrink-0 items-center justify-center rounded-full bg-white/20 shadow-inner ring-1 ring-white/30">
                <PokemonSprite
                  pokemon={pokemon}
                  className="h-24 w-24 object-contain drop-shadow-lg animate-float"
                  emojiClassName="text-7xl drop-shadow-lg animate-float"
                />
              </div>
              <div>
                <h2 id={titleId} className="text-3xl font-black drop-shadow-sm">
                  {pokemon.name}
                </h2>
                <p className="text-base font-semibold text-white/90">{pokemon.eng}</p>
                <div className="mt-2 flex flex-wrap gap-1.5">
                  {pokemon.types.map((t) => (
                    <span
                      key={t}
                      className="inline-flex items-center gap-1 rounded-full bg-white/25 px-2.5 py-1 text-xs font-bold backdrop-blur"
                    >
                      {themeForType(t).emoji} {t}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* 본문 */}
          <div className="space-y-6 px-6 py-6">
            <section>
              <h3 className="mb-2 text-sm font-bold uppercase tracking-wide text-slate-400">
                도감 설명
              </h3>
              <p className={`rounded-2xl border ${theme.accentBorder} ${theme.softBg} p-4 text-sm leading-relaxed text-slate-700`}>
                {pokemon.desc}
              </p>
            </section>

            <section>
              <h3 className="mb-3 text-sm font-bold uppercase tracking-wide text-slate-400">
                능력치
              </h3>
              <div className="space-y-3">
                {STAT_META.map((s) => (
                  <StatBar
                    key={s.key}
                    label={s.label}
                    value={pokemon.stats[s.key]}
                    barColor={theme.bar}
                  />
                ))}
              </div>
              <p className="mt-3 text-right text-xs font-medium text-slate-400">
                총합 {STAT_META.reduce((sum, s) => sum + pokemon.stats[s.key], 0)}
              </p>
            </section>
          </div>
        </div>
      );
    }

    // 빈 상태
    function EmptyState({ query }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center rounded-3xl border-2 border-dashed border-slate-300 bg-white/60 px-6 py-16 text-center">
          <div className="text-6xl">🔍</div>
          <p className="mt-4 text-lg font-bold text-slate-700">검색 결과가 없습니다</p>
          <p className="mt-1 text-sm text-slate-500">
            {query ? (
              <>‘<span className="font-semibold text-slate-700">{query}</span>’ 에 해당하는 포켓몬을 찾지 못했어요.</>
            ) : (
              <>표시할 포켓몬이 없습니다.</>
            )}
          </p>
          <p className="mt-1 text-sm text-slate-400">이름, 영문명, 타입 또는 도감번호로 다시 검색해 보세요.</p>
        </div>
      );
    }

    // 로딩 스켈레톤 카드 (불러오는 동안 표시)
    function SkeletonCard() {
      return (
        <div className="overflow-hidden rounded-3xl border border-white bg-white shadow-md">
          <div className="h-32 animate-pulse bg-slate-200" />
          <div className="space-y-3 p-4">
            <div className="h-5 w-1/2 animate-pulse rounded bg-slate-200" />
            <div className="h-4 w-1/3 animate-pulse rounded bg-slate-100" />
            <div className="mt-2 h-3 w-full animate-pulse rounded bg-slate-100" />
            <div className="h-3 w-5/6 animate-pulse rounded bg-slate-100" />
          </div>
        </div>
      );
    }

    // 에러 상태 (재시도 버튼 포함)
    function ErrorState({ message, onRetry }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center rounded-3xl border-2 border-dashed border-red-200 bg-white/70 px-6 py-16 text-center">
          <div className="text-6xl">⚠️</div>
          <p className="mt-4 text-lg font-bold text-slate-700">데이터를 불러오지 못했어요</p>
          <p className="mt-1 max-w-sm text-sm text-slate-500">{message}</p>
          <button
            type="button"
            onClick={onRetry}
            className="mt-5 rounded-full bg-red-500 px-5 py-2.5 text-sm font-bold text-white shadow-md transition hover:bg-red-600 focus:outline-none focus-visible:ring-4 focus-visible:ring-red-200"
          >
            다시 시도
          </button>
        </div>
      );
    }

    // 지연 로딩 중 / 실패 카드 (인덱스의 이름·번호·타입은 이미 알고 있어 먼저 보여준다)
    function PendingCard({ entry, error, onRetry }) {
      const theme =
        entry.typesKo && entry.typesKo.length
          ? themeForType(entry.typesKo[0])
          : FALLBACK_THEME;
      return (
        <div className="relative flex flex-col overflow-hidden rounded-3xl border border-white bg-white shadow-md">
          <div className={`relative flex h-32 items-center justify-center bg-gradient-to-br ${theme.headerGradient}`}>
            <div className="absolute right-2 top-2 rounded-full bg-white/25 px-2 py-0.5 text-xs font-mono font-bold text-white">
              No.{String(entry.dex).padStart(3, "0")}
            </div>
            {error ? (
              <span className="text-4xl drop-shadow">⚠️</span>
            ) : (
              <div className="h-20 w-20 animate-pulse rounded-full bg-white/30" />
            )}
          </div>
          <div className="flex flex-1 flex-col p-4">
            <h3 className="text-lg font-extrabold text-slate-800">{entry.ko}</h3>
            <span className="text-sm font-semibold text-slate-400">{entry.en}</span>
            {entry.typesKo && entry.typesKo.length > 0 && (
              <div className="mt-2 flex flex-wrap gap-1.5">
                {entry.typesKo.map((t) => (
                  <TypeBadge key={t} type={t} size="sm" />
                ))}
              </div>
            )}
            {error ? (
              <button
                type="button"
                onClick={onRetry}
                className="mt-3 inline-flex w-fit items-center gap-1 rounded-full bg-slate-100 px-3 py-1 text-sm font-bold text-slate-600 transition hover:bg-slate-200"
              >
                ↻ 다시 시도
              </button>
            ) : (
              <p className="mt-3 text-sm font-medium text-slate-400">불러오는 중…</p>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [query, setQuery] = useState("");
      const [selected, setSelected] = useState(null);
      const [index, setIndex] = useState([]); // 전 포켓몬 검색 인덱스
      const [status, setStatus] = useState("loading"); // loading | ready | error
      const [errorMsg, setErrorMsg] = useState("");
      const [visibleCount, setVisibleCount] = useState(PAGE);
      const [details, setDetails] = useState({}); // dex -> 상세객체 | "error"

      // 최신 details를 effect에서 참조하기 위한 ref + 중복 요청 방지 set
      const detailsRef = useRef(details);
      useEffect(() => {
        detailsRef.current = details;
      }, [details]);
      const inflightRef = useRef(new Set());

      // 검색 인덱스 로드 (GraphQL 1회, 실패 시 REST 폴백)
      const loadIndex = useCallback(async () => {
        setStatus("loading");
        setErrorMsg("");
        try {
          const list = await fetchIndex();
          setIndex(list);
          setStatus("ready");
        } catch (e) {
          setErrorMsg(e.message || "알 수 없는 오류가 발생했습니다.");
          setStatus("error");
        }
      }, []);

      useEffect(() => {
        loadIndex();
      }, [loadIndex]);

      // 단일 포켓몬 상세를 지연 로딩 (중복 요청 방지)
      const loadDetail = useCallback((dex) => {
        if (inflightRef.current.has(dex)) return;
        inflightRef.current.add(dex);
        fetchPokemon(dex)
          .then((d) => setDetails((prev) => ({ ...prev, [dex]: d })))
          .catch(() => setDetails((prev) => ({ ...prev, [dex]: "error" })))
          .finally(() => inflightRef.current.delete(dex));
      }, []);

      // 검색: 한글 이름 / 영문명 / 타입(한글·영문) / 도감번호
      const matches = useMemo(() => {
        const q = query.trim().toLowerCase();
        if (!q) return index;
        const qDigits = q.replace(/\D/g, "");
        return index.filter((e) => {
          const dexStr = String(e.dex);
          const dexPadded = dexStr.padStart(3, "0");
          const hay = [
            e.ko,
            e.en,
            (e.typesEn || []).join(" "),
            (e.typesKo || []).join(" "),
          ]
            .join(" ")
            .toLowerCase();
          const textMatch = hay.includes(q);
          const dexMatch =
            qDigits.length > 0 &&
            (dexStr.includes(qDigits) || dexPadded.includes(qDigits));
          return textMatch || dexMatch;
        });
      }, [query, index]);

      const visible = useMemo(
        () => matches.slice(0, visibleCount),
        [matches, visibleCount]
      );

      // 화면에 보이는 카드의 상세를 지연 로딩 (검색/더보기로 visible이 바뀔 때만)
      useEffect(() => {
        const timer = setTimeout(() => {
          visible.forEach((entry) => {
            if (detailsRef.current[entry.dex] === undefined) loadDetail(entry.dex);
          });
        }, 200);
        return () => clearTimeout(timer);
      }, [visible, loadDetail]);

      const handleQuery = useCallback((v) => {
        setQuery(v);
        setVisibleCount(PAGE); // 검색어가 바뀌면 처음부터
      }, []);
      const handleSelect = useCallback((p) => setSelected(p), []);
      const handleClose = useCallback(() => setSelected(null), []);
      const retryDetail = useCallback(
        (dex) => {
          setDetails((prev) => {
            const next = { ...prev };
            delete next[dex];
            return next;
          });
          loadDetail(dex);
        },
        [loadDetail]
      );

      const hasQuery = query.trim().length > 0;
      const remaining = matches.length - visible.length;

      return (
        <div className="min-h-screen pb-16">
          <Header
            total={index.length}
            shown={matches.length}
            loading={status === "loading"}
            hasQuery={hasQuery}
          />

          <main className="mx-auto max-w-5xl px-4 sm:px-6">
            {/* 검색 영역 (스크롤 시 상단 고정) */}
            <div className="sticky top-0 z-30 -mx-4 mb-2 bg-slate-100/90 px-4 pb-3 pt-4 backdrop-blur sm:-mx-6 sm:px-6">
              <SearchBar value={query} onChange={handleQuery} />
            </div>

            {/* 카드 그리드 */}
            <div className="grid grid-cols-1 gap-5 pt-2 sm:grid-cols-2 lg:grid-cols-3">
              {status === "loading" &&
                Array.from({ length: 6 }).map((_, i) => <SkeletonCard key={i} />)}

              {status === "error" && (
                <ErrorState message={errorMsg} onRetry={loadIndex} />
              )}

              {status === "ready" &&
                (matches.length === 0 ? (
                  <EmptyState query={query.trim()} />
                ) : (
                  visible.map((entry) => {
                    const d = details[entry.dex];
                    if (d && d !== "error") {
                      return (
                        <PokemonCard
                          key={entry.dex}
                          pokemon={d}
                          onSelect={handleSelect}
                        />
                      );
                    }
                    return (
                      <PendingCard
                        key={entry.dex}
                        entry={entry}
                        error={d === "error"}
                        onRetry={() => retryDetail(entry.dex)}
                      />
                    );
                  })
                ))}
            </div>

            {/* 더 보기 */}
            {status === "ready" && remaining > 0 && (
              <div className="mt-8 flex justify-center">
                <button
                  type="button"
                  onClick={() => setVisibleCount((c) => c + PAGE)}
                  className="rounded-full bg-white px-6 py-3 text-sm font-bold text-slate-700 shadow-md ring-1 ring-slate-200 transition hover:-translate-y-0.5 hover:shadow-lg focus:outline-none focus-visible:ring-4 focus-visible:ring-red-200"
                >
                  더 보기 <span className="text-slate-400">· {remaining}마리 남음</span>
                </button>
              </div>
            )}
          </main>

          {/* 상세 모달 */}
          <Modal
            isOpen={!!selected}
            onClose={handleClose}
            labelledBy={selected ? `poke-title-${selected.id}` : undefined}
          >
            {selected && <PokemonDetail pokemon={selected} onClose={handleClose} />}
          </Modal>

          <footer className="mx-auto mt-10 max-w-5xl px-4 text-center text-xs text-slate-400 sm:px-6">
            포켓몬 도감 · 데이터 제공{" "}
            <a
              href="https://pokeapi.co"
              target="_blank"
              rel="noreferrer"
              className="font-semibold text-slate-500 underline-offset-2 hover:underline"
            >
              PokeAPI
            </a>{" "}
            · 전국도감 {index.length || 1025}종 검색 지원
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
