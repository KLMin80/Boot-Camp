      "음, 그 질문은 제가 가진 정보로는 콕 집어 답하기 어렵네요 🤔\n" +
      "이분에 대해서는 **직업·경력, 사는 곳, 가족, AI·자동화 관심사, 재테크, 취미·여행** 등을 알려드릴 수 있어요.\n" +
      "아래 추천 질문을 눌러보시거나 다르게 한 번 물어봐 주세요!";

    // 처음/답변 후 보여줄 추천 질문 칩
    const SUGGESTIONS = [
      "무슨 일 하세요?",
      "어디 살아요?",
      "가족이 어떻게 되나요?",
      "요즘 관심사는?",
      "취미가 뭐예요?",
      "어떤 사람인지 한마디로?",
    ];

    // ========================================
    // 🔎 INTENT 매칭 엔진 (순수 함수, 외부 호출 없음)
    // ========================================
    function normalize(text) {
      // 소문자화 + 공백/특수문자 제거하여 부분일치율을 높임
      return text.toLowerCase().replace(/\s+/g, "").replace(/[?!.,~"'()]/g, "");
    }

    function matchIntent(rawQuery) {
      const q = normalize(rawQuery);
      if (!q) return { intent: null, answer: FALLBACK_ANSWER, score: 0 };

      let best = null;
      let bestScore = 0;

      for (const intent of INTENTS) {
        let score = 0;
        for (const kw of intent.keywords) {
          const k = normalize(kw);
          if (k && q.includes(k)) {
            // 긴 키워드일수록 구체적 → 가중. 신상정보 intent는 강하게 우선.
            const weight = intent.id === "unknown_personal" ? k.length + 4 : k.length;
            score += weight;
          }
        }
        if (score > bestScore) {
          bestScore = score;
          best = intent;
        }
      }

      // 최소 임계치: 2글자 미만 우연 일치 방지
      if (best && bestScore >= 2) {
        return { intent: best.id, answer: best.answer, score: bestScore };
      }
      return { intent: null, answer: FALLBACK_ANSWER, score: bestScore };
    }

    // ========================================
    // 🎨 Design System Components (순수 프레젠테이션)
    // ========================================

    // **굵게** 마크다운 → <strong> 인라인 파서 + 줄바꿈 처리
    function RichText({ text, className = "" }) {
      const lines = text.split("\n");
      return (
        <span className={className}>
          {lines.map((line, li) => {
            const parts = line.split(/(\*\*[^*]+\*\*)/g).filter(Boolean);
            return (
              <React.Fragment key={li}>
                {parts.map((part, pi) => {
                  if (/^\*\*[^*]+\*\*$/.test(part)) {
                    return (
                      <strong key={pi} className="font-bold text-slate-900">
                        {part.slice(2, -2)}
                      </strong>
                    );
                  }
                  return <React.Fragment key={pi}>{part}</React.Fragment>;
                })}
                {li < lines.length - 1 && <br />}
              </React.Fragment>
            );
          })}
        </span>
      );
    }

    function BotAvatar({ size = "md" }) {
      const dim = size === "sm" ? "h-8 w-8 text-base" : "h-10 w-10 text-xl";
      return (
        <div
          className={`${dim} flex-shrink-0 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center shadow-md select-none`}
          aria-hidden="true"
        >
          🧑‍💼
        </div>
      );
    }

    function Chip({ label, onClick, disabled }) {
      return (
        <button
          type="button"
          onClick={onClick}
          disabled={disabled}
          className="px-3.5 py-1.5 rounded-full text-sm font-medium border border-indigo-200 bg-white/80 text-indigo-700
                     hover:bg-indigo-50 hover:border-indigo-300 active:scale-95 transition
                     disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-indigo-400"
        >
          {label}
        </button>
      );
    }

    function Button({ children, variant = "primary", disabled, type = "button", onClick, className = "", ...rest }) {
      const variants = {
        primary:
          "bg-gradient-to-br from-indigo-500 to-violet-500 text-white hover:from-indigo-600 hover:to-violet-600 shadow-md",
        ghost: "bg-transparent text-slate-500 hover:bg-slate-100",
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`inline-flex items-center justify-center rounded-xl px-4 py-2.5 font-semibold transition
                      active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed
                      focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-1 ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🧩 Chat Sub-Components
    // ========================================

    function MessageBubble({ message }) {
      const isBot = message.role === "bot";
      if (isBot) {
        return (
          <div className="flex items-end gap-2.5 animate-fade-in-up">
            <BotAvatar />
            <div
              className="max-w-[78%] rounded-2xl rounded-bl-md bg-white px-4 py-3 text-[15px] leading-relaxed text-slate-700 shadow-sm ring-1 ring-slate-100"
              role="status"
            >
              <RichText text={message.text} />
            </div>
          </div>
        );
      }
      return (
        <div className="flex justify-end animate-fade-in-up">
          <div className="max-w-[78%] rounded-2xl rounded-br-md bg-gradient-to-br from-indigo-500 to-violet-500 px-4 py-3 text-[15px] leading-relaxed text-white shadow-md">
            {message.text}
          </div>
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2.5 animate-fade-in-up" aria-label="답변 작성 중" role="status">
          <BotAvatar />
          <div className="rounded-2xl rounded-bl-md bg-white px-4 py-3.5 shadow-sm ring-1 ring-slate-100">
            <span className="flex gap-1.5">
              <span className="typing-dot h-2 w-2 rounded-full bg-indigo-400" style={{ animationDelay: "0s" }} />
              <span className="typing-dot h-2 w-2 rounded-full bg-indigo-400" style={{ animationDelay: "0.2s" }} />
              <span className="typing-dot h-2 w-2 rounded-full bg-indigo-400" style={{ animationDelay: "0.4s" }} />
            </span>
          </div>
        </div>
      );
    }

    function SuggestionChips({ suggestions, onPick, disabled }) {
      return (
        <div className="flex flex-wrap gap-2 animate-fade-in-up" aria-label="추천 질문">
          {suggestions.map((s) => (
            <Chip key={s} label={s} onClick={() => onPick(s)} disabled={disabled} />
          ))}
        </div>
      );
    }

    // ========================================
    // 📄 ChatApp — 상태 및 대화 로직
    // ========================================
    function ChatApp() {
      const initialBotMessage = {
        id: "init",
        role: "bot",
        text:
          "안녕하세요! 👋 저는 **이분을 소개해 드리는 About Me 챗봇**이에요.\n" +
          "직업, 사는 곳, 가족, 요즘 관심사, 취미 등 궁금한 걸 물어봐 주세요. 아래 추천 질문을 눌러보셔도 좋아요!",
      };

      const [messages, setMessages] = useState([initialBotMessage]);
      const [input, setInput] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const idRef = useRef(1);
      const scrollRef = useRef(null);
      const inputRef = useRef(null);
      const timerRef = useRef(null);

      const nextId = () => `m${idRef.current++}`;

      // 새 메시지/타이핑 변화 시 항상 맨 아래로 스크롤
      useEffect(() => {
        const el = scrollRef.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, [messages, isTyping]);

      // 언마운트 시 타이머 정리
      useEffect(() => {
        return () => {
          if (timerRef.current) clearTimeout(timerRef.current);
        };
      }, []);

      // 백엔드(/api/ask)로 질문을 보내 OpenAI 기반 답변을 받아온다.
      // API_BASE 는 상대경로만 사용(같은 오리진에서 서빙되므로 localhost 하드코딩 금지).
      const API_BASE = "/api";

      const send = useCallback(
        async (rawText) => {
          const text = rawText.trim();
          if (!text || isTyping) return; // 빈 입력 방지 + 생성 중 중복 방지

          const userMsg = { id: nextId(), role: "user", text };
          setMessages((prev) => [...prev, userMsg]);
          setInput("");
          setIsTyping(true); // 타이핑 인디케이터 표시

          let botText;
          try {
            const res = await fetch(`${API_BASE}/ask`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question: text }),
            });

            // JSON 파싱(서버는 성공 시 {answer}, 오류 시 {error} 반환)
            const data = await res.json().catch(() => ({}));

            if (res.ok && data && typeof data.answer === "string") {
              botText = data.answer;
            } else {
              botText =
                (data && data.error) ||
                "앗, 답변을 가져오지 못했어요 😢 잠시 후 다시 시도해 주세요.";
            }
          } catch (err) {
            // 네트워크 단절/서버 미연결 등
            botText = "앗, 답변을 가져오지 못했어요 😢 잠시 후 다시 시도해 주세요.";
          } finally {
            setMessages((prev) => [...prev, { id: nextId(), role: "bot", text: botText }]);
            setIsTyping(false); // 입력 재활성화
            // 답변 후 입력창 포커스 복귀 (접근성/연속 질문 편의)
            if (inputRef.current) inputRef.current.focus();
          }
        },
        [isTyping]
      );

      const handleSubmit = (e) => {
        e.preventDefault();
        send(input);
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send(input);
        }
      };

      const canSend = input.trim().length > 0 && !isTyping;

      return (
        <div className="min-h-screen w-full bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-3 sm:p-6">
          <main
            className="w-full max-w-lg h-[88vh] sm:h-[86vh] flex flex-col rounded-3xl bg-white/70 backdrop-blur shadow-2xl ring-1 ring-white/60 overflow-hidden"
            aria-label="About Me 질문 답변 챗봇"
          >
            {/* ===== 헤더 ===== */}
            <header className="flex items-center gap-3 px-5 py-4 bg-gradient-to-r from-indigo-500 to-violet-500 text-white shadow-md">
              <div className="h-11 w-11 flex-shrink-0 rounded-full bg-white/20 ring-2 ring-white/40 flex items-center justify-center text-2xl select-none" aria-hidden="true">
                🧑‍💼
              </div>
              <div className="min-w-0">
                <h1 className="text-base font-bold leading-tight">About Me · Q&A 봇</h1>
                <p className="text-[12.5px] text-indigo-100 leading-tight truncate">
                  외국계 20년차 구매·글로벌 영업 전문가 · AI 1인 기업 준비 중
                </p>
              </div>
              <span className="ml-auto flex items-center gap-1.5 text-[11px] font-medium bg-white/15 px-2.5 py-1 rounded-full">
                <span className="h-2 w-2 rounded-full bg-emerald-300 animate-pulse" />
                온라인
              </span>
            </header>

            {/* ===== 메시지 스크롤 영역 ===== */}
            <div
              ref={scrollRef}
              className="chat-scroll flex-1 overflow-y-auto px-4 py-5 space-y-4"
              role="log"
              aria-live="polite"
              aria-relevant="additions"
            >
              {messages.map((m) => (
                <MessageBubble key={m.id} message={m} />
              ))}

              {isTyping && <TypingIndicator />}

              {/* 추천 질문: 타이핑 중이 아닐 때 메시지 흐름 끝에 노출 */}
              {!isTyping && (
                <div className="pt-1">
                  <p className="text-[12px] text-slate-400 mb-2 ml-1">💡 이런 걸 물어볼 수 있어요</p>
                  <SuggestionChips suggestions={SUGGESTIONS} onPick={send} disabled={isTyping} />
                </div>
              )}
            </div>

            {/* ===== 입력창 ===== */}
            <form onSubmit={handleSubmit} className="flex items-center gap-2 px-4 py-3 border-t border-slate-200 bg-white/80">
              <label htmlFor="chat-input" className="sr-only">메시지 입력</label>
              <input
                id="chat-input"
                ref={inputRef}
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={isTyping}
                placeholder={isTyping ? "답변을 작성하고 있어요…" : "예: 무슨 일 하세요?"}
                autoComplete="off"
                className="flex-1 rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-[15px] text-slate-800
                           placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
                           disabled:bg-slate-100 disabled:cursor-not-allowed"
              />
              <Button type="submit" disabled={!canSend} className="px-4" aria-label="메시지 전송">
                <span className="hidden sm:inline">전송</span>
                <span className="sm:hidden text-lg leading-none">➤</span>
              </Button>
            </form>
          </main>
        </div>
      );
    }

    // ========================================
    // 🚀 App + Rendering
    // ========================================
    function App() {
      return <ChatApp />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
